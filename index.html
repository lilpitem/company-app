<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
/>

<title>蘊一財務 Pro</title>

<link
  href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
  rel="stylesheet"
/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#0f111a;
  --bg2:#191c29;
  --card:#202434;
  --accent:#7c6af7;
  --accent2:#a78bfa;
  --green:#34d399;
  --red:#f87171;
  --amber:#fbbf24;
  --text:#f4f4ff;
  --muted:#8d92b3;
  --border:rgba(124,106,247,.14);
  --radius:18px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--bg);
  color:var(--text);
  max-width:430px;
  margin:0 auto;
  overflow-x:hidden;
  overscroll-behavior:none;
}

button,input,select{
  font-family:inherit;
}

.screen{
  display:none;
  min-height:100vh;
  padding-bottom:120px;
}

.screen.active{
  display:block;
}

.header{
  padding:56px 20px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(180deg,var(--bg2),transparent);
}

.brand{
  font-size:20px;
  font-weight:700;
  letter-spacing:.5px;
}

.sync{
  font-size:11px;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(255,255,255,.05);
  color:var(--muted);
}

.top-month{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin-bottom:12px;
}

.month-btn{
  width:36px;
  height:36px;
  border:none;
  border-radius:10px;
  background:var(--card);
  color:var(--accent2);
  cursor:pointer;
  font-size:18px;
}

.month-label{
  min-width:120px;
  text-align:center;
  font-weight:600;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  margin:0 16px 14px;
  padding:16px;
}

.card-title{
  font-size:12px;
  color:var(--muted);
  margin-bottom:14px;
}

.chart-box{
  height:220px;
  position:relative;
}

.chart-center{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  pointer-events:none;
}

.net{
  font-size:28px;
  font-weight:700;
}

.legend{
  display:flex;
  justify-content:space-between;
  margin-top:18px;
  gap:10px;
}

.legend-item{
  flex:1;
  text-align:center;
}

.legend-label{
  font-size:11px;
  color:var(--muted);
  margin-bottom:5px;
}

.legend-value{
  font-weight:700;
}

.list-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,.04);
}

.list-row:last-child{
  border-bottom:none;
}

.row-info{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.row-main{
  font-size:15px;
  font-weight:500;
}

.row-sub{
  font-size:11px;
  color:var(--muted);
}

.amount{
  font-size:15px;
  font-weight:700;
}

.empty{
  padding:36px 0;
  text-align:center;
  color:var(--muted);
  font-size:13px;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:430px;
  display:flex;
  align-items:center;
  background:var(--bg2);
  border-top:1px solid var(--border);
  padding:10px 0 calc(14px + env(safe-area-inset-bottom));
  z-index:99;
}

.nav-item{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  color:var(--muted);
  cursor:pointer;
}

.nav-item.active{
  color:var(--accent2);
}

.nav-icon{
  font-size:20px;
}

.nav-label{
  font-size:10px;
}

.fab-wrap{
  flex:.7;
  position:relative;
}

.fab{
  position:absolute;
  top:-32px;
  left:50%;
  transform:translateX(-50%);
  width:58px;
  height:58px;
  border-radius:50%;
  border:none;
  background:var(--accent);
  color:#fff;
  font-size:30px;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(124,106,247,.35);
}

.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:flex-end;
  z-index:999;
}

.modal-overlay.open{
  display:flex;
}

.modal{
  width:100%;
  background:var(--bg2);
  border-radius:26px 26px 0 0;
  padding:22px 20px calc(40px + env(safe-area-inset-bottom));
  max-height:88vh;
  overflow-y:auto;
}

.modal-handle{
  width:42px;
  height:5px;
  border-radius:999px;
  background:rgba(255,255,255,.1);
  margin:0 auto 18px;
}

.field{
  margin-bottom:14px;
}

.field label{
  display:block;
  font-size:11px;
  color:var(--muted);
  margin-bottom:6px;
}

.field input,
.field select{
  width:100%;
  border:none;
  border-radius:12px;
  padding:14px;
  background:rgba(255,255,255,.06);
  color:#fff;
  font-size:15px;
}

.btn{
  width:100%;
  border:none;
  border-radius:14px;
  padding:15px;
  background:var(--accent);
  color:#fff;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
}

.toggle{
  display:flex;
  gap:8px;
  margin-bottom:16px;
}

.toggle button{
  flex:1;
  border:none;
  border-radius:10px;
  padding:12px;
  background:rgba(255,255,255,.05);
  color:var(--muted);
  cursor:pointer;
}

.toggle button.active.expense{
  background:var(--red);
  color:#fff;
}

.toggle button.active.income{
  background:var(--green);
  color:#fff;
}

.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}

.cal-head{
  text-align:center;
  color:var(--muted);
  font-size:11px;
}

.cal-day{
  aspect-ratio:1;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  background:rgba(255,255,255,.02);
  cursor:pointer;
}

.cal-day.active{
  background:var(--accent);
}

.cal-day.today{
  border:1px solid var(--accent2);
}

.dot-wrap{
  position:absolute;
  bottom:6px;
  display:flex;
  gap:3px;
}

.dot{
  width:4px;
  height:4px;
  border-radius:50%;
}

</style>
</head>

<body>

<div class="header">
  <div class="brand">蘊一財務</div>
  <div class="sync" id="syncStatus">本地模式</div>
</div>

<div class="top-month">
  <button class="month-btn" id="prevMonth">‹</button>
  <div class="month-label" id="monthLabel"></div>
  <button class="month-btn" id="nextMonth">›</button>
</div>

<!-- HOME -->
<section class="screen active" id="screen-home">

  <div class="card">

    <div class="card-title">
      本月財務總覽
    </div>

    <div class="chart-box">
      <canvas id="mainChart"></canvas>

      <div class="chart-center">
        <div class="net" id="netValue">$0</div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-label">收入</div>
        <div class="legend-value" id="incomeValue">$0</div>
      </div>

      <div class="legend-item">
        <div class="legend-label">支出</div>
        <div class="legend-value" id="expenseValue">$0</div>
      </div>

      <div class="legend-item">
        <div class="legend-label">薪資</div>
        <div class="legend-value" id="salaryValue">$0</div>
      </div>
    </div>

  </div>

</section>

<!-- CALENDAR -->
<section class="screen" id="screen-calendar">

  <div class="card">
    <div id="calendar"></div>
  </div>

  <div class="card">
    <div class="card-title" id="dayTitle">
      今日明細
    </div>

    <div id="dayList"></div>
  </div>

</section>

<!-- LEDGER -->
<section class="screen" id="screen-ledger">

  <div class="card">
    <div class="card-title">
      本月帳目
    </div>

    <div id="ledgerList"></div>
  </div>

</section>

<!-- STAFF -->
<section class="screen" id="screen-staff">

  <div class="card">
    <div id="staffList"></div>

    <button
      class="btn"
      style="margin-top:16px;background:rgba(124,106,247,.1);color:var(--accent2)"
      id="addStaffBtn"
    >
      ＋ 新增人員
    </button>
  </div>

</section>

<!-- NAV -->
<nav class="bottom-nav">

  <div class="nav-item active" data-screen="home">
    <div class="nav-icon">📊</div>
    <div class="nav-label">總覽</div>
  </div>

  <div class="nav-item" data-screen="calendar">
    <div class="nav-icon">📅</div>
    <div class="nav-label">日曆</div>
  </div>

  <div class="fab-wrap">
    <button class="fab" id="addLedgerBtn">＋</button>
  </div>

  <div class="nav-item" data-screen="ledger">
    <div class="nav-icon">🧾</div>
    <div class="nav-label">帳目</div>
  </div>

  <div class="nav-item" data-screen="staff">
    <div class="nav-icon">👥</div>
    <div class="nav-label">薪資</div>
  </div>

</nav>

<!-- LEDGER MODAL -->
<div class="modal-overlay" id="ledgerModal">

  <div class="modal">

    <div class="modal-handle"></div>

    <div class="toggle">
      <button class="active expense" data-type="expense">
        支出
      </button>

      <button data-type="income">
        收入
      </button>
    </div>

    <div class="field">
      <label>金額</label>
      <input type="number" id="ledgerAmount" />
    </div>

    <div class="field">
      <label>項目</label>
      <input type="text" id="ledgerCategory" />
    </div>

    <div class="field">
      <label>成員</label>
      <select id="ledgerMember"></select>
    </div>

    <div class="field">
      <label>日期</label>
      <input type="date" id="ledgerDate" />
    </div>

    <button class="btn" id="saveLedgerBtn">
      儲存
    </button>

  </div>

</div>

<script>

const state = {
  emp: JSON.parse(localStorage.getItem('yy_emp') || '[]'),
  ldg: JSON.parse(localStorage.getItem('yy_ldg') || '[]'),

  selectedDate: today(),
  currentYear: new Date().getFullYear(),
  currentMonth: new Date().getMonth(),

  ledgerType: 'expense',

  charts: {}
}

const DOM = {
  monthLabel: el('monthLabel'),

  netValue: el('netValue'),
  incomeValue: el('incomeValue'),
  expenseValue: el('expenseValue'),
  salaryValue: el('salaryValue'),

  ledgerList: el('ledgerList'),
  staffList: el('staffList'),
  calendar: el('calendar'),
  dayList: el('dayList'),
  dayTitle: el('dayTitle'),

  ledgerModal: el('ledgerModal'),

  ledgerAmount: el('ledgerAmount'),
  ledgerCategory: el('ledgerCategory'),
  ledgerMember: el('ledgerMember'),
  ledgerDate: el('ledgerDate'),

  mainChart: el('mainChart')
}

function el(id){
  return document.getElementById(id)
}

function today(){
  return new Date().toISOString().slice(0,10)
}

function money(n){
  return '$' + Math.round(n).toLocaleString()
}

function saveLocal(){
  localStorage.setItem('yy_emp',JSON.stringify(state.emp))
  localStorage.setItem('yy_ldg',JSON.stringify(state.ldg))
}

function getCurrentMonthString(){
  return `${state.currentYear}-${String(state.currentMonth+1).padStart(2,'0')}`
}

function getCurrentMonthRecords(){
  return state.ldg.filter(v =>
    v.date.startsWith(getCurrentMonthString())
  )
}

function getDateMap(){

  const map = {}

  getCurrentMonthRecords().forEach(item => {

    if(!map[item.date]){
      map[item.date] = []
    }

    map[item.date].push(item)

  })

  return map
}

function switchScreen(name){

  document.querySelectorAll('.screen').forEach(v => {
    v.classList.remove('active')
  })

  document.querySelectorAll('.nav-item').forEach(v => {
    v.classList.remove('active')
  })

  el(`screen-${name}`).classList.add('active')

  document.querySelector(`[data-screen="${name}"]`)
    ?.classList.add('active')
}

function render(){

  renderMonth()
  renderSummary()
  renderLedger()
  renderStaff()
  renderCalendar()
  renderDayDetail()
  renderMemberOptions()

}

function renderMonth(){

  DOM.monthLabel.textContent =
    `${state.currentYear} 年 ${state.currentMonth + 1} 月`

}

function renderSummary(){

  const records = getCurrentMonthRecords()

  let income = 0
  let expense = 0

  records.forEach(r => {

    if(r.type === 'income'){
      income += r.amount
    }else{
      expense += r.amount
    }

  })

  const salary = state.emp.reduce((a,b)=>
    a + b.salary + b.bonus
  ,0)

  const net = income - expense - salary

  DOM.netValue.textContent = money(net)
  DOM.netValue.style.color =
    net >= 0 ? 'var(--accent2)' : 'var(--red)'

  DOM.incomeValue.textContent = money(income)
  DOM.expenseValue.textContent = money(expense)
  DOM.salaryValue.textContent = money(salary)

  if(!state.charts.main){

    state.charts.main = new Chart(DOM.mainChart,{
      type:'doughnut',

      data:{
        datasets:[{
          data:[expense,salary,income || 1],
          backgroundColor:[
            '#f87171',
            '#fbbf24',
            '#34d399'
          ],
          borderWidth:0
        }]
      },

      options:{
        responsive:true,
        maintainAspectRatio:false,
        cutout:'82%'
      }
    })

  }else{

    state.charts.main.data.datasets[0].data = [
      expense,
      salary,
      income || 1
    ]

    state.charts.main.update()

  }

}

function renderLedger(){

  const records = getCurrentMonthRecords()

  if(!records.length){

    DOM.ledgerList.innerHTML =
      `<div class="empty">本月尚無紀錄</div>`

    return
  }

  DOM.ledgerList.innerHTML = records
    .map((r,index)=>{

      return `
      <div class="list-row">

        <div class="row-info">
          <div class="row-main">${r.category}</div>

          <div class="row-sub">
            ${r.date} ・ ${r.member}
          </div>
        </div>

        <div
          class="amount"
          style="
            color:${
              r.type === 'income'
              ? 'var(--green)'
              : 'var(--red)'
            }
          "
        >
          ${
            r.type === 'income'
            ? '+'
            : '-'
          }
          ${money(r.amount)}
        </div>

      </div>
      `
    })
    .join('')

}

function renderStaff(){

  if(!state.emp.length){

    DOM.staffList.innerHTML =
      `<div class="empty">尚未新增人員</div>`

    return
  }

  DOM.staffList.innerHTML = state.emp
    .map(v=>{

      return `
      <div class="list-row">

        <div class="row-info">
          <div class="row-main">
            ${v.name}
          </div>

          <div class="row-sub">
            預算 ${money(v.salary + v.bonus)}
          </div>
        </div>

      </div>
      `
    })
    .join('')

}

function renderCalendar(){

  const dateMap = getDateMap()

  const firstDay =
    new Date(
      state.currentYear,
      state.currentMonth,
      1
    ).getDay()

  const totalDays =
    new Date(
      state.currentYear,
      state.currentMonth + 1,
      0
    ).getDate()

  let html = `
  <div class="cal-grid">
  `

  ;['日','一','二','三','四','五','六']
    .forEach(v => {

      html += `
      <div class="cal-head">${v}</div>
      `

    })

  for(let i=0;i<firstDay;i++){

    html += `<div></div>`

  }

  const todayStr = today()

  for(let day=1;day<=totalDays;day++){

    const ds = `
      ${getCurrentMonthString()}-${String(day).padStart(2,'0')}
    `.trim()

    const items = dateMap[ds] || []

    const hasIncome =
      items.some(v => v.type === 'income')

    const hasExpense =
      items.some(v => v.type === 'expense')

    html += `
    <div
      class="
        cal-day
        ${state.selectedDate === ds ? 'active':''}
        ${todayStr === ds ? 'today':''}
      "
      onclick="selectDate('${ds}')"
    >

      ${day}

      <div class="dot-wrap">

        ${
          hasIncome
          ? `<div class="dot" style="background:var(--green)"></div>`
          : ''
        }

        ${
          hasExpense
          ? `<div class="dot" style="background:var(--red)"></div>`
          : ''
        }

      </div>

    </div>
    `

  }

  html += `</div>`

  DOM.calendar.innerHTML = html

}

function renderDayDetail(){

  const items = state.ldg.filter(v =>
    v.date === state.selectedDate
  )

  const [y,m,d] =
    state.selectedDate.split('-')

  DOM.dayTitle.textContent =
    `${m} 月 ${d} 日`

  if(!items.length){

    DOM.dayList.innerHTML =
      `<div class="empty">本日沒有紀錄</div>`

    return
  }

  DOM.dayList.innerHTML = items
    .map(v=>{

      return `
      <div class="list-row">

        <div class="row-info">
          <div class="row-main">
            ${v.category}
          </div>

          <div class="row-sub">
            ${v.member}
          </div>
        </div>

        <div
          class="amount"
          style="
            color:${
              v.type === 'income'
              ? 'var(--green)'
              : 'var(--red)'
            }
          "
        >
          ${
            v.type === 'income'
            ? '+'
            : '-'
          }
          ${money(v.amount)}
        </div>

      </div>
      `

    })
    .join('')

}

function renderMemberOptions(){

  DOM.ledgerMember.innerHTML =
    `
    <option value="公司">
      公司帳戶
    </option>
    `
    +
    state.emp.map(v=>`
      <option value="${v.name}">
        ${v.name}
      </option>
    `).join('')

}

function openLedgerModal(){

  DOM.ledgerModal.classList.add('open')

  DOM.ledgerDate.value = state.selectedDate
  DOM.ledgerAmount.value = ''
  DOM.ledgerCategory.value = ''

}

function closeLedgerModal(){

  DOM.ledgerModal.classList.remove('open')

}

function saveLedger(){

  const amount =
    Number(DOM.ledgerAmount.value)

  const category =
    DOM.ledgerCategory.value.trim()

  if(!amount || !category){

    alert('請完整填寫')

    return
  }

  state.ldg.unshift({

    type:state.ledgerType,
    amount,
    category,

    member:DOM.ledgerMember.value,

    date:DOM.ledgerDate.value

  })

  saveLocal()

  render()

  closeLedgerModal()

}

function selectDate(date){

  state.selectedDate = date

  renderCalendar()

  renderDayDetail()

}

document
  .querySelectorAll('.nav-item')
  .forEach(v=>{

    v.addEventListener('click',()=>{

      switchScreen(v.dataset.screen)

    })

  })

el('prevMonth')
  .addEventListener('click',()=>{

    state.currentMonth--

    if(state.currentMonth < 0){

      state.currentMonth = 11
      state.currentYear--

    }

    render()

  })

el('nextMonth')
  .addEventListener('click',()=>{

    state.currentMonth++

    if(state.currentMonth > 11){

      state.currentMonth = 0
      state.currentYear++

    }

    render()

  })

el('addLedgerBtn')
  .addEventListener('click',openLedgerModal)

DOM.ledgerModal
  .addEventListener('click',(e)=>{

    if(e.target === DOM.ledgerModal){

      closeLedgerModal()

    }

  })

document
  .querySelectorAll('.toggle button')
  .forEach(btn=>{

    btn.addEventListener('click',()=>{

      document
        .querySelectorAll('.toggle button')
        .forEach(v=>v.classList.remove('active'))

      btn.classList.add('active')

      state.ledgerType = btn.dataset.type

      btn.classList.add(
        btn.dataset.type
      )

    })

  })

el('saveLedgerBtn')
  .addEventListener('click',saveLedger)

el('addStaffBtn')
  .addEventListener('click',()=>{

    const name =
      prompt('姓名')

    if(!name) return

    const salary =
      Number(prompt('底薪') || 0)

    const bonus =
      Number(prompt('獎金') || 0)

    state.emp.push({
      name,
      salary,
      bonus
    })

    saveLocal()

    render()

  })

render()

</script>

</body>
</html>
