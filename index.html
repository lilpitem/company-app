<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Yun Yi Finance v4.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* ── iOS 標準色彩系統 ── */
:root {
  --bg:#000000; --bg-elevated:#1C1C1E; --card:#1C1C1E; --bg-modal:rgba(44,44,46,0.94);
  --input-bg:#3A3A3C; --accent:#5E5CE6; --green:#32D74B; --red:#FF453A; --amber:#FF9F0A;
  --blue:#0A84FF; --purple:#BF5AF2; --teal:#64D2FF;
  --text:#FFFFFF; --muted:#8E8E93; --border:rgba(255,255,255,0.12);
  --radius-card:14px; --radius-btn:12px;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; outline:none; }
body { font-family:-apple-system,BlinkMacSystemFont,"SF Pro NT","Noto Sans TC",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; max-width:430px; margin:0 auto; overflow-x:hidden; -webkit-font-smoothing:antialiased; }

/* ── 啟動畫面 ── */
#splash-screen { position:fixed; inset:0; background:#000; z-index:9999; display:flex; justify-content:center; align-items:center; transition:opacity 0.6s; }
.splash-logo { width:90px; animation:splashAnim 1.8s forwards; }
@keyframes splashAnim { 0%{opacity:0;transform:scale(0.96)} 30%,85%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(1.02)} }

/* ── Header ── */
.header { padding:56px 20px 10px; display:flex; justify-content:space-between; align-items:center; }
.menu-trigger { padding:10px; margin-left:-10px; cursor:pointer; }
#sync-status { font-size:11px; padding:6px 12px; border-radius:20px; background:var(--input-bg); font-weight:600; cursor:pointer; min-width:80px; text-align:center; }
.sync-ok { color:var(--green); background:rgba(50,215,75,0.1); }
.sync-err { color:var(--red); background:rgba(255,69,58,0.1); }
.syncing { color:var(--amber); }

/* ── 側邊選單 ── */
.drawer-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:4000; opacity:0; transition:0.3s; }
.drawer { position:fixed; top:0; left:-290px; width:290px; height:100%; background:var(--bg-elevated); z-index:4001; transition:0.3s cubic-bezier(0.4,0,0.2,1); padding:60px 0 30px; overflow-y:auto; }
.drawer.open { left:0; }
.drawer-section { padding:8px 20px 4px; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
.drawer-item { display:flex; align-items:center; gap:15px; padding:13px 20px; color:var(--text); font-size:16px; cursor:pointer; }
.drawer-item:hover { background:rgba(255,255,255,0.05); }
.drawer-item svg { width:20px; height:20px; stroke:var(--accent); fill:none; stroke-width:2; flex-shrink:0; }
.drawer-badge { margin-left:auto; background:var(--accent); color:#fff; font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; }

/* ── 月份導航 ── */
.global-nav { display:none; justify-content:center; align-items:center; gap:10px; padding:10px 16px 15px; }
body.nav-active .global-nav { display:flex; }
.m-btn { background:none; border:none; color:var(--accent); font-size:24px; cursor:pointer; width:40px; }
.m-picker-wrapper { position:relative; background:var(--bg-elevated); padding:8px 18px; border-radius:12px; min-width:140px; text-align:center; }
#hdr-m { font-weight:600; color:var(--accent); font-size:17px; }
#m-input { position:absolute; inset:0; opacity:0; width:100%; cursor:pointer; }

/* ── 頁面 ── */
.screen { display:none; min-height:100vh; padding-bottom:140px; }
.screen.active { display:block; }
.card { background:var(--card); border-radius:var(--radius-card); padding:18px; margin:0 16px 12px; }

/* ── 圖表 ── */
.chart-box { position:relative; height:200px; width:100%; display:flex; justify-content:center; align-items:center; margin:10px 0; }
.chart-center { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center; pointer-events:none; }
.chart-val { font-size:24px; font-weight:800; }

/* ── 日曆 ── */
.cal-grid { display:flex; flex-wrap:wrap; width:100%; padding:5px 0; }
.cal-h,.cal-c { width:14.285%; text-align:center; }
.cal-h { font-size:12px; color:var(--muted); padding-bottom:12px; font-weight:700; }
.cal-c { height:52px; display:flex; justify-content:center; align-items:center; }
.cal-d { width:38px; height:38px; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:50%; font-size:17px; position:relative; }
.cal-d.active { background:var(--accent); color:#fff; font-weight:600; }
.dots { display:flex; gap:2.5px; position:absolute; bottom:4px; }
.dot { width:4px; height:4px; border-radius:50%; }

/* ── 個人頁面 ── */
.profile-header { padding:20px 20px 10px; }
.profile-main { display:flex; align-items:center; gap:20px; margin-bottom:18px; }
.avatar-wrap { position:relative; width:82px; height:82px; border-radius:50%; background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); padding:3px; cursor:pointer; flex-shrink:0; }
.avatar { width:100%; height:100%; border-radius:50%; background:#111; border:2px solid #000; display:flex; justify-content:center; align-items:center; font-weight:700; font-size:22px; }
.stats { display:flex; flex:1; justify-content:space-between; text-align:center; }
.stat-val { font-size:16px; font-weight:700; display:block; }
.stat-lab { font-size:12px; color:var(--muted); display:block; }
.profile-bio { margin-bottom:20px; padding:0 4px; }
.bio-name { font-weight:700; font-size:16px; margin-bottom:4px; }
.bio-text { font-size:14px; line-height:1.4; white-space:pre-wrap; color:var(--muted); }

/* ── Bottom Sheet ── */
.action-sheet-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:3000; align-items:flex-end; opacity:0; transition:0.3s; padding:10px; }
.action-sheet-overlay.open { display:flex; opacity:1; }
.action-sheet { width:100%; max-width:410px; margin:0 auto; transform:translateY(100%); transition:0.3s cubic-bezier(0.4,0,0.2,1); }
.action-sheet-overlay.open .action-sheet { transform:translateY(0); }
.as-group { background:var(--bg-modal); backdrop-filter:blur(25px); -webkit-backdrop-filter:blur(25px); border-radius:14px; overflow:hidden; margin-bottom:10px; }
.as-item { padding:18px; text-align:center; font-size:18px; color:#0A84FF; border-bottom:0.5px solid rgba(255,255,255,0.1); cursor:pointer; }
.as-item.add-btn { font-weight:600; color:var(--green); }
.as-cancel { background:#FFFFFF; color:#000; font-weight:600; border-radius:14px; padding:18px; text-align:center; font-size:18px; cursor:pointer; margin-bottom:calc(env(safe-area-inset-bottom) + 5px); }

/* ── 底部導覽 ── */
.bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:rgba(10,10,10,0.92); border-top:0.5px solid var(--border); display:flex; z-index:100; padding:8px 0 calc(env(safe-area-inset-bottom) + 8px); backdrop-filter:blur(20px); }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; color:var(--muted); }
.nav-item.active { color:var(--accent); }
.nav-icon-svg { width:24px; height:24px; stroke:currentColor; stroke-width:2; fill:none; }
.fab { width:56px; height:56px; background:var(--accent); border-radius:50%; display:flex; justify-content:center; align-items:center; border:4px solid #000; margin-top:-32px; box-shadow:0 4px 15px rgba(94,92,230,0.3); }

/* ── Modal ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:5000; align-items:flex-end; opacity:0; transition:0.3s; }
.modal-overlay.open { display:flex; opacity:1; }
.modal { background:var(--bg-elevated); border-radius:20px 20px 0 0; padding:20px 20px calc(20px + env(safe-area-inset-bottom)); width:100%; max-height:90vh; overflow-y:auto; transform:translateY(100%); transition:0.3s; }
.modal-overlay.open .modal { transform:translateY(0); }
.modal-h { width:36px; height:5px; background:var(--muted); border-radius:3px; margin:0 auto 20px; opacity:0.5; }
.field { margin-bottom:18px; }
.field label { font-size:12px; color:var(--muted); display:block; margin-bottom:6px; margin-left:4px; text-transform:uppercase; }
.field input,.field select { width:100%; height:48px; padding:0 16px; background:var(--input-bg); border:none; border-radius:10px; color:#fff; font-size:16px; -webkit-appearance:none; }

.t-toggle { display:flex; background:rgba(118,118,128,0.24); border-radius:9px; padding:2px; margin-bottom:25px; height:38px; }
.t-btn { flex:1; border:none; background:transparent; color:#fff; font-size:14px; font-weight:600; border-radius:7px; cursor:pointer; }
.t-btn.active.exp { background:var(--red); }
.t-btn.active.inc { background:var(--green); }

/* ── 新功能：薪資清冊 ── */
#s-payroll .section-header { padding:0 16px 12px; display:flex; justify-content:space-between; align-items:center; }
#s-payroll .section-title { font-size:22px; font-weight:700; }
.payroll-month-selector { display:flex; gap:8px; overflow-x:auto; padding:0 16px 12px; scrollbar-width:none; }
.payroll-month-selector::-webkit-scrollbar { display:none; }
.pm-chip { padding:6px 16px; border-radius:20px; background:var(--input-bg); color:var(--muted); font-size:14px; font-weight:500; cursor:pointer; white-space:nowrap; flex-shrink:0; }
.pm-chip.active { background:var(--accent); color:#fff; }
.emp-card { background:var(--card); border-radius:var(--radius-card); padding:16px 18px; margin:0 16px 10px; }
.emp-card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.emp-name { font-size:17px; font-weight:600; }
.emp-type { font-size:12px; color:var(--muted); margin-top:2px; }
.emp-total { font-size:20px; font-weight:700; color:var(--green); }
.emp-rows { border-top:0.5px solid var(--border); padding-top:10px; }
.emp-row { display:flex; justify-content:space-between; padding:5px 0; }
.emp-row-label { font-size:14px; color:var(--muted); }
.emp-row-val { font-size:14px; font-weight:500; }
.emp-row-val.pos { color:var(--green); }
.emp-row-val.neg { color:var(--red); }
.payroll-summary { background:linear-gradient(135deg,rgba(94,92,230,0.2),rgba(94,92,230,0.05)); border:0.5px solid rgba(94,92,230,0.3); border-radius:var(--radius-card); padding:18px; margin:0 16px 12px; }
.ps-label { font-size:12px; color:var(--muted); margin-bottom:4px; }
.ps-val { font-size:28px; font-weight:800; color:var(--accent); }

/* ── 新功能：發票收支 ── */
#s-invoice .section-header { padding:0 16px 12px; display:flex; justify-content:space-between; align-items:center; }
.inv-summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:0 16px 12px; }
.inv-sum-card { background:var(--card); border-radius:12px; padding:14px 16px; }
.inv-sum-label { font-size:12px; color:var(--muted); margin-bottom:4px; }
.inv-sum-val { font-size:20px; font-weight:700; }
.inv-sum-val.inc { color:var(--green); }
.inv-sum-val.exp { color:var(--red); }
.inv-sum-val.tax { color:var(--amber); }
.inv-sum-val.profit { color:var(--accent); }
.inv-month-tabs { display:flex; gap:8px; overflow-x:auto; padding:0 16px 12px; scrollbar-width:none; }
.inv-month-tabs::-webkit-scrollbar { display:none; }
.inv-tab { padding:6px 14px; border-radius:20px; background:var(--input-bg); color:var(--muted); font-size:13px; font-weight:500; cursor:pointer; white-space:nowrap; flex-shrink:0; }
.inv-tab.active { background:var(--green); color:#fff; }
.inv-section-title { font-size:13px; font-weight:600; color:var(--muted); padding:0 16px 8px; text-transform:uppercase; letter-spacing:0.5px; }
.inv-item { display:flex; justify-content:space-between; align-items:flex-start; padding:12px 18px; border-bottom:0.5px solid var(--border); }
.inv-item:last-child { border-bottom:none; }
.inv-item-left { flex:1; min-width:0; }
.inv-item-desc { font-size:15px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.inv-item-meta { font-size:12px; color:var(--muted); margin-top:2px; }
.inv-item-tag { display:inline-block; font-size:10px; padding:2px 6px; border-radius:4px; margin-left:6px; font-weight:600; }
.tag-paid { background:rgba(50,215,75,0.15); color:var(--green); }
.tag-unpaid { background:rgba(255,69,58,0.15); color:var(--red); }
.inv-item-amt { font-size:15px; font-weight:600; white-space:nowrap; }
.inv-item-amt.exp { color:var(--red); }
.inv-item-amt.inc { color:var(--green); }

/* ── 新功能：專案大表 ── */
.proj-tab-bar { display:flex; gap:8px; overflow-x:auto; padding:0 16px 12px; scrollbar-width:none; }
.proj-tab-bar::-webkit-scrollbar { display:none; }
.proj-tab { padding:6px 16px; border-radius:20px; background:var(--input-bg); color:var(--muted); font-size:13px; font-weight:500; cursor:pointer; white-space:nowrap; flex-shrink:0; }
.proj-tab.active { background:var(--purple); color:#fff; }
.proj-budget-bar { background:var(--card); border-radius:var(--radius-card); padding:16px 18px; margin:0 16px 12px; }
.pbb-row { display:flex; justify-content:space-between; margin-bottom:10px; }
.pbb-label { font-size:13px; color:var(--muted); }
.pbb-val { font-size:13px; font-weight:600; }
.pbb-track { background:rgba(255,255,255,0.1); border-radius:4px; height:8px; overflow:hidden; margin-bottom:6px; }
.pbb-fill { height:100%; border-radius:4px; transition:width 0.6s ease; }
.pbb-fill.ok { background:var(--green); }
.pbb-fill.warn { background:var(--amber); }
.pbb-fill.over { background:var(--red); }
.proj-item { display:flex; justify-content:space-between; align-items:flex-start; padding:12px 18px; border-bottom:0.5px solid var(--border); }
.proj-item:last-child { border-bottom:none; }
.proj-item-left { flex:1; min-width:0; }
.proj-item-name { font-size:15px; font-weight:500; }
.proj-item-meta { font-size:12px; color:var(--muted); margin-top:3px; display:flex; gap:6px; flex-wrap:wrap; }
.proj-badge { display:inline-block; font-size:10px; padding:2px 6px; border-radius:4px; font-weight:600; }
.pb-ordered { background:rgba(10,132,255,0.15); color:var(--blue); }
.pb-received { background:rgba(50,215,75,0.15); color:var(--green); }
.pb-inv { background:rgba(255,159,10,0.15); color:var(--amber); }
.pb-done { background:rgba(50,215,75,0.15); color:var(--green); }
.pb-pending { background:rgba(142,142,147,0.15); color:var(--muted); }
.proj-item-right { text-align:right; margin-left:12px; flex-shrink:0; }
.proj-item-est { font-size:12px; color:var(--muted); text-decoration:line-through; }
.proj-item-actual { font-size:15px; font-weight:600; }
.proj-section-hdr { font-size:12px; font-weight:700; color:var(--muted); padding:12px 18px 6px; background:rgba(255,255,255,0.03); text-transform:uppercase; letter-spacing:0.5px; }
.proj-filter-bar { display:flex; gap:8px; overflow-x:auto; padding:0 16px 10px; scrollbar-width:none; }
.proj-filter-bar::-webkit-scrollbar { display:none; }
.pf-chip { padding:5px 12px; border-radius:16px; background:var(--input-bg); color:var(--muted); font-size:12px; cursor:pointer; white-space:nowrap; flex-shrink:0; }
.pf-chip.active { background:var(--purple); color:#fff; }

/* ── 通用 ── */
.page-title { font-size:28px; font-weight:700; padding:0 16px 16px; }
.empty-state { text-align:center; padding:60px 20px; color:var(--muted); font-size:15px; }
.divider-label { font-size:12px; color:var(--muted); padding:8px 16px 4px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
.info-pill { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:20px; background:rgba(94,92,230,0.12); color:var(--accent); font-size:12px; font-weight:600; }
</style>
</head>
<body class="nav-active">

<div id="splash-screen"><img src="蘊一記帳小卡.png" class="splash-logo"></div>

<div class="drawer-overlay" id="d-overlay" onclick="toggleDrawer(false)"></div>
<div class="drawer" id="drawer">
  <div class="drawer-section">財務管理</div>
  <div class="drawer-item" onclick="go('ldg');toggleDrawer(false)"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg><span>帳目明細</span></div>
  <div class="drawer-item" onclick="go('pay');toggleDrawer(false)"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>人員管理</span></div>
  <div class="drawer-section">報表中心</div>
  <div class="drawer-item" onclick="go('payroll');toggleDrawer(false)"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg><span>薪資清冊</span><span class="drawer-badge">NEW</span></div>
  <div class="drawer-item" onclick="go('invoice');toggleDrawer(false)"><svg viewBox="0 0 24 24"><path d="M9 14l6-6M9.5 8.5a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm5 5a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/><rect x="3" y="3" width="18" height="18" rx="2"/></svg><span>發票收支</span><span class="drawer-badge">NEW</span></div>
  <div class="drawer-item" onclick="go('project');toggleDrawer(false)"><svg viewBox="0 0 24 24"><path d="M3 3h18v18H3z" stroke="none" fill="none"/><path d="M9 3v18M3 9h18M3 15h18"/></svg><span>專案大表</span><span class="drawer-badge">NEW</span></div>
</div>

<div class="header">
  <div class="menu-trigger" onclick="toggleDrawer(true)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></div>
  <div id="sync-status" onclick="loadCloud()">讀取雲端</div>
</div>

<div class="global-nav">
  <button onclick="shiftMonth(-1)" class="m-btn">‹</button>
  <div class="m-picker-wrapper"><span id="hdr-m"></span><input type="month" id="m-input" onchange="pickMonth(this.value)"></div>
  <button onclick="shiftMonth(1)" class="m-btn">›</button>
</div>

<!-- ===== 原有頁面 ===== -->
<div id="s-home" class="screen active">
  <div class="card"><div class="chart-box"><canvas id="c-main"></canvas><div class="chart-center"><div class="chart-val" id="val-p">$0</div></div></div></div>
</div>

<div id="s-cal" class="screen">
  <div class="card"><div id="cal-grid"></div></div>
  <div class="card"><div id="cal-title" style="color:var(--text);font-size:17px;margin-bottom:10px;"></div><div id="cal-list"></div></div>
</div>

<div id="s-search" class="screen">
  <div class="card"><input type="text" placeholder="搜尋項目、成員或備註..." oninput="handleSearch(this.value)" style="width:100%;background:var(--input-bg);border:none;padding:12px;border-radius:10px;color:#fff;"></div>
  <div class="card"><div id="search-list"></div></div>
</div>

<div id="s-me" class="screen">
  <div class="profile-header">
    <div class="profile-main">
      <div class="avatar-wrap" onclick="openProfilePicker()"><div class="avatar" id="me-avatar-txt">蘊</div></div>
      <div class="stats">
        <div class="stat-item"><span class="stat-val" id="stat-count">0</span><span class="stat-lab">筆數</span></div>
        <div class="stat-item"><span class="stat-val" id="stat-inc">0</span><span class="stat-lab">收入</span></div>
        <div class="stat-item"><span class="stat-val" id="stat-exp">0</span><span class="stat-lab">支出</span></div>
      </div>
    </div>
    <div class="profile-bio"><div class="bio-name" id="me-name">蘊一創意</div><div class="bio-text" id="me-desc"></div></div>
  </div>
</div>

<div id="s-ldg" class="screen"><div class="card" id="ldg-list"></div></div>
<div id="s-pay" class="screen"><div class="card" id="emp-list"></div></div>

<!-- ===== 新功能：薪資清冊 ===== -->
<div id="s-payroll" class="screen">
  <div class="page-title">薪資清冊</div>
  <div class="payroll-month-selector" id="payroll-months"></div>
  <div id="payroll-summary-card" class="payroll-summary"></div>
  <div id="payroll-list"></div>
</div>

<!-- ===== 新功能：發票收支 ===== -->
<div id="s-invoice" class="screen">

      ]},
      { label:"桌上告示牌", items:[
        { name:"桌上告示牌框架", est:1000, actual:244, payer:"一軍", ordered:true, received:true, inv:false, done:false },
      ]}
    ]
  }
};

// ── 狀態 ──
let currentPayrollMonth = Object.keys(PAYROLL_DATA)[0];
let currentInvMonth = Object.keys(INVOICE_DATA)[0];
let currentProject = Object.keys(PROJECT_DATA)[0];
let projFilter = 'all';

// ── 原有功能 ──
const fmtK = n => n >= 1000 ? (n/1000).toFixed(1)+'k' : n;
const fmtN = n => n ? n.toLocaleString() : '0';
const setSync = (txt, cls) => { const s = $('sync-status'); s.textContent = txt; s.className = cls; };

const toggleDrawer = open => {
  const d = $('drawer'), o = $('d-overlay');
  if(open){ o.style.display='block'; setTimeout(()=>{o.style.opacity='1'; d.classList.add('open');},10); }
  else { d.classList.remove('open'); o.style.opacity='0'; setTimeout(()=>o.style.display='none',300); }
};

async function loadCloud() {
  setSync('讀取中...','syncing');
  const cb = '_cb_'+Date.now(), s = document.createElement('script');
  let timeout = setTimeout(()=>{setSync('⚠️ 連線超時','sync-err'); delete window[cb]; s.remove();},7000);
  window[cb] = d => {
    clearTimeout(timeout);
    if(d){ emp = d.emp||[]; ldg = d.ldg||[];
      localStorage.setItem('ye',JSON.stringify(emp)); localStorage.setItem('yl',JSON.stringify(ldg));
      render(); setSync('✅ 雲端同步','sync-ok'); }
    s.remove(); delete window[cb];
  };
  s.src = `${GAS_URL}?callback=${cb}`; document.head.appendChild(s);
}

const go = (p, el) => {
  $$('.screen, .nav-item').forEach(e => e.classList.remove('active'));
  $(`s-${p}`).classList.add('active');
  if(el) el.classList.add('active');
  document.body.classList.toggle('nav-active', p==='home' || p==='cal');
  if(p==='me') updateMeUI();
  if(p==='payroll') renderPayroll();
  if(p==='invoice') renderInvoice();
  if(p==='project') renderProject();
  render();
};

const resetAndGoMe = el => { currentMe = "蘊一創意"; go('me', el); };
const shiftMonth = d => { const dt = new Date(calYear, calMonth+d, 1); calYear=dt.getFullYear(); calMonth=dt.getMonth(); render(); };
const pickMonth = v => { if(!v) return; const [y,m]=v.split('-'); calYear=parseInt(y); calMonth=parseInt(m)-1; render(); };

function updateMeUI() {
  const isDefault = currentMe==="蘊一創意";
  let fLdg = isDefault ? ldg : ldg.filter(r=>r.mem===currentMe);
  let inc=fLdg.filter(r=>r.type==='income').reduce((a,b)=>a+b.amt,0);
  let exp=fLdg.filter(r=>r.type==='expense').reduce((a,b)=>a+b.amt,0);
  $('stat-count').textContent=fLdg.length; $('stat-inc').textContent=fmtK(inc); $('stat-exp').textContent=fmtK(exp);
  if(isDefault){ $('me-avatar-txt').textContent="蘊"; $('me-name').textContent="蘊一創意"; $('me-desc').innerHTML=""; }
  else { $('me-avatar-txt').textContent=currentMe.charAt(0); $('me-name').textContent=currentMe;
    const e=emp.find(x=>x.name===currentMe); $('me-desc').innerHTML=e?`團隊成員\n預算：$${e.salary.toLocaleString()}`:""; }
}

function render() {
  const mStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  $('hdr-m').textContent = `${calYear}年 ${calMonth+1}月`;
  let inc=0, exp=0, dots={};
  ldg.filter(r=>r.date.startsWith(mStr)).forEach(r=>{ if(r.type==='income') inc+=r.amt; else exp+=r.amt; dots[r.date]=true; });
  $('val-p').textContent = `$${(inc-exp).toLocaleString()}`;
  if(charts.m) charts.m.destroy();
  charts.m = new Chart($('c-main'),{type:'doughnut',data:{datasets:[{data:[exp,inc||1],backgroundColor:['#FF453A','#32D74B'],borderWidth:0}]},options:{cutout:'85%',responsive:true,maintainAspectRatio:false}});
  const dInM=new Date(calYear,calMonth+1,0).getDate(), fDay=new Date(calYear,calMonth,1).getDay();
  let calH='<div class="cal-grid">'+['日','一','二','三','四','五','六'].map(w=>`<div class="cal-h">${w}</div>`).join('')+'<div class="cal-c"></div>'.repeat(fDay);
  for(let d=1;d<=dInM;d++){
    const dS=`${mStr}-${String(d).padStart(2,'0')}`;
    calH+=`<div class="cal-c"><div class="cal-d ${dS===selD?'active':''}" onclick="selD='${dS}';render();">${d}${dots[dS]?'<div class="dots"><div class="dot" style="background:var(--accent)"></div></div>':''}</div></div>`;
  }
  $('cal-grid').innerHTML=calH+'</div>';
  $('cal-title').textContent=selD;
  $('cal-list').innerHTML=ldg.filter(r=>r.date===selD).map(r=>`<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border);"><div>${r.cat} <small style="color:var(--muted)">${r.mem}</small></div><b>$${r.amt.toLocaleString()}</b></div>`).join('')||'<div style="padding:20px;text-align:center;color:var(--muted);">本日無紀錄</div>';
  $('ldg-list').innerHTML=ldg.map(r=>`<div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--border);"><div>${r.cat}<br><small style="color:var(--muted)">${r.date} · ${r.mem}</small></div><b>$${r.amt.toLocaleString()}</b></div>`).join('');
  $('emp-list').innerHTML=emp.map(e=>`<div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--border);"><div>${e.name}</div><small>$${e.salary.toLocaleString()}</small></div>`).join('');
}

const openProfilePicker = () => {
  $('as-list').innerHTML=`<div class="as-item" onclick="selectMe('蘊一創意')">蘊一創意 (總覽)</div>`+emp.map(e=>`<div class="as-item" onclick="selectMe('${e.name}')">${e.name}</div>`).join('');
  $('as-picker').classList.add('open');
};
const openAddEmpModal = () => { closeASById(); $('m-add-emp').classList.add('open'); };
const saveEmp = () => {
  const name=$('new-e-name').value.trim(); if(!name) return alert('請輸入名稱');
  emp.push({name,salary:Number($('new-e-salary').value)||0});
  localStorage.setItem('ye',JSON.stringify(emp));
  $('new-e-name').value=''; $('new-e-salary').value='';
  closeMById('m-add-emp'); sync(); render();
};
const selectMe = n => { currentMe=n; updateMeUI(); closeASById(); };
const closeASById = () => $('as-picker').classList.remove('open');
const closeAS = e => { if(e.target===$('as-picker')) closeASById(); };
const prepLdg = () => {
  $('ldg-form').reset(); setT('expense'); $('l-d').value=selD;
  $('l-m').innerHTML='<option value="公司">公司帳戶</option>'+emp.map(e=>`<option value="${e.name}">${e.name}</option>`).join('');
  $('m-ldg').classList.add('open');
};
function setT(t){
  $('l-t').value=t;
  const bE=$('tb-exp'), bI=$('tb-inc');
  bE.classList.toggle('active',t==='expense'); bE.classList.toggle('exp',t==='expense');
  bI.classList.toggle('active',t==='income'); bI.classList.toggle('inc',t==='income');
}
const closeMById = id => $(id).classList.remove('open');
const closeM = (e,id) => { if(e.target===$(id)) $(id).classList.remove('open'); };
async function sync(){ try{ await fetch(GAS_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({emp,ldg})}); }catch(e){} }
function saveLdg(){
  ldg.unshift({date:$('l-d').value,type:$('l-t').value,amt:Number($('l-a').value),cat:$('l-c').value,mem:$('l-m').value,inv:$('l-inv').value,vt:$('l-vt').value,note:$('l-n').value});
  localStorage.setItem('yl',JSON.stringify(ldg)); closeMById('m-ldg'); sync(); render();
}
function handleSearch(v){
  if(!v){$('search-list').innerHTML='';return;}
  $('search-list').innerHTML=ldg.filter(r=>r.cat.includes(v)||r.mem.includes(v)).map(r=>`<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border);"><div>${r.cat}<br><small>${r.date}</small></div><b>$${r.amt.toLocaleString()}</b></div>`).join('');
}

// ── 薪資清冊 ──
function renderPayroll() {
  const months = Object.keys(PAYROLL_DATA);
  $('payroll-months').innerHTML = months.map(m => {
    const [y,mo]=m.split('-'); const label=`${y}年${parseInt(mo)}月`;
    return `<div class="pm-chip ${m===currentPayrollMonth?'active':''}" onclick="switchPayrollMonth('${m}')">${label}</div>`;
  }).join('');
  const data = PAYROLL_DATA[currentPayrollMonth];
  const allPeople = [...data.employees, ...data.temps];
  const totalPayroll = allPeople.reduce((s,e)=>s+(e.total||0),0);
  const [y,mo]=currentPayrollMonth.split('-');
  $('payroll-summary-card').innerHTML = `
    <div class="ps-label">${y}年${parseInt(mo)}月　薪資總額</div>
    <div class="ps-val">$${totalPayroll.toLocaleString()}</div>
    <div style="margin-top:12px;display:flex;gap:20px">
      <div><div style="font-size:11px;color:var(--muted)">正職人員</div><div style="font-size:15px;font-weight:600">${data.employees.length}人</div></div>
      <div><div style="font-size:11px;color:var(--muted)">臨時工</div><div style="font-size:15px;font-weight:600">${data.temps.length}人</div></div>
    </div>`;
  let html = '';
  if(data.employees.length){
    html += '<div class="divider-label">正式員工</div>';
    data.employees.forEach(e => {
      html += `<div class="emp-card">
        <div class="emp-card-header">
          <div><div class="emp-name">${e.name}</div><div class="emp-type">匯款日：${e.payDate||'-'}</div></div>
          <div class="emp-total">$${e.total.toLocaleString()}</div>
        </div>
        <div class="emp-rows">
          <div class="emp-row"><span class="emp-row-label">勞務薪資</span><span class="emp-row-val">$${(e.base||0).toLocaleString()}</span></div>
          ${e.meal?`<div class="emp-row"><span class="emp-row-label">免稅伙食</span><span class="emp-row-val pos">+$${e.meal.toLocaleString()}</span></div>`:''}
          ${e.bonus?`<div class="emp-row"><span class="emp-row-label">獎金</span><span class="emp-row-val pos">+$${e.bonus.toLocaleString()}</span></div>`:''}
        </div>
      </div>`;
    });
  }
  if(data.temps.length){
    html += '<div class="divider-label">臨時工（勞報單）</div>';
    data.temps.forEach(e => {
      html += `<div class="emp-card">
        <div class="emp-card-header">
          <div><div class="emp-name">${e.name}</div><div class="emp-type">匯款日：${e.payDate||'-'}</div></div>
          <div class="emp-total" style="color:var(--amber)">$${e.total.toLocaleString()}</div>
        </div>
        <div class="emp-rows">
          <div class="emp-row"><span class="emp-row-label">勞務費用</span><span class="emp-row-val">$${(e.base||0).toLocaleString()}</span></div>
        </div>
      </div>`;
    });
  }
  $('payroll-list').innerHTML = html;
}

function switchPayrollMonth(m){ currentPayrollMonth=m; renderPayroll(); }

// ── 發票收支 ──
function renderInvoice() {
  const months = Object.keys(INVOICE_DATA);
  $('inv-month-tabs').innerHTML = months.map(m => {
    const [y,mo]=m.split('-'); const label=`${y.slice(2)}/${mo}月`;
    return `<div class="inv-tab ${m===currentInvMonth?'active':''}" onclick="switchInvMonth('${m}')">${label}</div>`;
  }).join('');
  const d = INVOICE_DATA[currentInvMonth];
  $('inv-summary-grid').innerHTML = `
    <div class="inv-sum-card"><div class="inv-sum-label">📥 銷項收入</div><div class="inv-sum-val inc">$${(d.totalIn||0).toLocaleString()}</div></div>
    <div class="inv-sum-card"><div class="inv-sum-label">📤 進項支出</div><div class="inv-sum-val exp">$${(d.totalOut||0).toLocaleString()}</div></div>
    <div class="inv-sum-card"><div class="inv-sum-label">🏦 應繳營業稅(估)</div><div class="inv-sum-val tax">$${(d.taxEst||0).toLocaleString()}</div></div>
    <div class="inv-sum-card"><div class="inv-sum-label">💰 真實毛利(估)</div><div class="inv-sum-val profit">$${(d.grossProfit||0).toLocaleString()}</div></div>`;
  let html = '';
  if(d.income && d.income.length){
    html += `<div class="inv-section-title" style="padding:12px 16px 6px">🌟 銷項收入</div><div class="card" style="padding:0;overflow:hidden;margin:0 16px 12px">`;
    d.income.forEach(item => {
      html += `<div class="inv-item">
        <div class="inv-item-left">
          <div class="inv-item-desc">${item.company||''}</div>
          <div class="inv-item-meta">${item.date} · ${item.desc}<span class="inv-item-tag ${item.booked?'tag-paid':'tag-unpaid'}">${item.booked?'已入帳':'未入帳'}</span></div>
          ${item.note?`<div class="inv-item-meta" style="margin-top:2px">${item.note}</div>`:''}
        </div>
        <div class="inv-item-amt inc">+$${(item.amt||0).toLocaleString()}</div>
      </div>`;
    });
    html += '</div>';
  }
  if(d.expenses && d.expenses.length){
    html += `<div class="inv-section-title" style="padding:12px 16px 6px">📋 進項支出</div><div class="card" style="padding:0;overflow:hidden;margin:0 16px 12px">`;
    d.expenses.forEach(item => {
      html += `<div class="inv-item">
        <div class="inv-item-left">
          <div class="inv-item-desc">${item.desc}</div>
          <div class="inv-item-meta">${item.date} · 付款：${item.payer} · ${item.inv}<span class="inv-item-tag ${item.paid?'tag-paid':'tag-unpaid'}">${item.paid?'已交給一軍':'未繳'}</span></div>
        </div>
        <div class="inv-item-amt exp">-$${(item.cost||0).toLocaleString()}</div>
      </div>`;
    });
    html += '</div>';
  }
  $('inv-content').innerHTML = html;
}

function switchInvMonth(m){ currentInvMonth=m; renderInvoice(); }

// ── 專案大表 ──
function renderProject() {
  const projects = Object.keys(PROJECT_DATA);
  $('proj-tabs').innerHTML = projects.map(p =>
    `<div class="proj-tab ${p===currentProject?'active':''}" onclick="switchProject('${p.replace(/'/g,"\\'")}')">📦 ${p}</div>`
  ).join('');
  const proj = PROJECT_DATA[currentProject];
  const totalEst = proj.sections.flatMap(s=>s.items).reduce((s,i)=>s+(i.est||0),0);
  const totalActual = proj.sections.flatMap(s=>s.items).reduce((s,i)=>s+(i.actual||0),0);
  const remaining = proj.budget - totalActual;
  const pct = Math.min(100, Math.round(totalActual/proj.budget*100));
  const fillClass = pct>100?'over':pct>80?'warn':'ok';
  $('proj-budget-section').innerHTML = `<div class="proj-budget-bar">
    <div class="pbb-row"><span class="pbb-label">📅 ${proj.period}</span><span class="pbb-val" style="color:var(--purple)">總預算 $${proj.budget.toLocaleString()}</span></div>
    <div class="pbb-track"><div class="pbb-fill ${fillClass}" style="width:${pct}%"></div></div>
    <div class="pbb-row"><span class="pbb-label">實際支出 $${totalActual.toLocaleString()} (${pct}%)</span><span class="pbb-val ${remaining>=0?'':''}">剩餘 <span style="color:${remaining>=0?'var(--green)':'var(--red)'}">$${remaining.toLocaleString()}</span></span></div>
  </div>`;
  const filters = ['all','未完成','已下訂','已取貨'];
  $('proj-filters').innerHTML = filters.map(f =>
    `<div class="pf-chip ${projFilter===f?'active':''}" onclick="switchProjFilter('${f}')">${f==='all'?'全部':f}</div>`
  ).join('');
  let html = '';
  proj.sections.forEach(sec => {
    let items = sec.items;
    if(projFilter==='已下訂') items=items.filter(i=>i.ordered);
    else if(projFilter==='已取貨') items=items.filter(i=>i.received);
    else if(projFilter==='未完成') items=items.filter(i=>!i.done);
    if(!items.length) return;
    html += `<div class="proj-section-hdr">${sec.label}</div>`;
    items.forEach(item => {
      const badges = [];
      if(item.ordered) badges.push(`<span class="proj-badge pb-ordered">已下訂</span>`);
      if(item.received) badges.push(`<span class="proj-badge pb-received">已取貨</span>`);
      if(item.inv) badges.push(`<span class="proj-badge pb-inv">有發票</span>`);
      if(item.done) badges.push(`<span class="proj-badge pb-done">已結清</span>`);
      html += `<div class="proj-item">
        <div class="proj-item-left">
          <div class="proj-item-name">${item.name}</div>
          <div class="proj-item-meta">
            ${item.payer&&item.payer!=='-'?`<span>👤 ${item.payer}</span>`:''}
            ${badges.join('')}
          </div>
          ${item.note?`<div style="font-size:11px;color:var(--muted);margin-top:3px">${item.note}</div>`:''}
        </div>
        <div class="proj-item-right">
          ${item.est?`<div class="proj-item-est">預$${item.est.toLocaleString()}</div>`:''}
          <div class="proj-item-actual" style="color:${item.actual>item.est&&item.est?'var(--red)':'var(--text)'}">$${(item.actual||0).toLocaleString()}</div>
        </div>
      </div>`;
    });
  });
  $('proj-list').innerHTML = html || '<div class="empty-state">無符合條件的項目</div>';
}

function switchProject(p){ currentProject=p; renderProject(); }
function switchProjFilter(f){ projFilter=f; renderProject(); }

window.onload = () => {
  loadCloud(); render();
  setTimeout(()=>{ $('splash-screen').style.opacity='0'; setTimeout(()=>$('splash-screen').style.display='none',600); },1500);
};
</script>
