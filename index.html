<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Yun Yi Finance v5.3</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* ── iOS 標準色彩系統 ── */
:root {
  --bg:#000000; --bg-elevated:#1C1C1E; --card:#1C1C1E; --bg-modal:rgba(44,44,46,0.94);
  --input-bg:#3A3A3C; --accent:#5E5CE6; --green:#32D74B; --red:#FF453A; --amber:#FF9F0A;
  --blue:#0A84FF; --purple:#BF5AF2; --teal:#64D2FF;
  --text:#FFFFFF; --muted:#8E8E93; --border:rgba(255,255,255,0.12);
  --radius-card:14px;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; outline:none; }
body { font-family:-apple-system,BlinkMacSystemFont,"SF Pro NT","Noto Sans TC",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; max-width:430px; margin:0 auto; overflow-x:hidden; -webkit-font-smoothing:antialiased; }

/* ── 瘦身共用 Utility Classes ── */
.flex-sb { display:flex; justify-content:space-between; align-items:center; }
.list-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:0.5px solid var(--border); }
.list-row:last-child { border-bottom:none; }
.c-mut { color:var(--muted); } .c-grn { color:var(--green); } .c-red { color:var(--red); } .c-wht { color:#fff; }
.fs-12 { font-size:12px; } .fs-14 { font-size:14px; } .fs-15 { font-size:15px; } .fw-6 { font-weight:600; }
.card { background:var(--card); border-radius:var(--radius-card); padding:18px; margin:0 16px 12px; }
.empty-state { text-align:center; padding:60px 20px; color:var(--muted); font-size:15px; }
.page-title { display:flex; justify-content:space-between; align-items:center; font-size:28px; font-weight:700; padding:0 16px 16px; }
.icon-btn { background:var(--input-bg); color:var(--accent); border:none; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }

/* ── 啟動與 Header ── */
#splash-screen { position:fixed; inset:0; background:#000; z-index:9999; display:flex; justify-content:center; align-items:center; transition:opacity 0.6s; pointer-events:none; }
.splash-logo { width:90px; animation:splashAnim 1.2s forwards; }
@keyframes splashAnim { 0%{opacity:0;transform:scale(0.96)} 30%,85%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(1.02)} }
.header { padding:56px 20px 10px; display:flex; justify-content:space-between; align-items:center; }
.menu-trigger { padding:10px; margin-left:-10px; cursor:pointer; }
#sync-status { font-size:11px; padding:6px 12px; border-radius:20px; background:var(--input-bg); font-weight:600; cursor:pointer; min-width:80px; text-align:center; transition: 0.3s; }
.sync-ok { color:var(--green); background:rgba(50,215,75,0.1) !important; } .sync-err { color:var(--red); background:rgba(255,69,58,0.1) !important; } .syncing { color:var(--amber); }

/* ── 側邊與導覽 ── */
.drawer-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:4000; opacity:0; transition:0.3s; }
.drawer { position:fixed; top:0; left:-290px; width:290px; height:100%; background:var(--bg-elevated); z-index:4001; transition:0.3s cubic-bezier(0.4,0,0.2,1); padding:60px 0 30px; overflow-y:auto; }
.drawer.open { left:0; }
.drawer-section { padding:8px 20px 4px; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
.drawer-item { display:flex; align-items:center; gap:15px; padding:13px 20px; color:var(--text); font-size:16px; cursor:pointer; } .drawer-item:hover { background:rgba(255,255,255,0.05); } .drawer-item svg { width:20px; height:20px; stroke:var(--accent); fill:none; stroke-width:2; flex-shrink:0; }
.global-nav { display:none; justify-content:center; align-items:center; gap:10px; padding:10px 16px 15px; } body.nav-active .global-nav { display:flex; }
.m-btn { background:none; border:none; color:var(--accent); font-size:24px; cursor:pointer; width:40px; }
.m-picker-wrapper { position:relative; background:var(--bg-elevated); padding:8px 18px; border-radius:12px; min-width:140px; text-align:center; } #hdr-m { font-weight:600; color:var(--accent); font-size:17px; } #m-input { position:absolute; inset:0; opacity:0; width:100%; cursor:pointer; }
.screen { display:none; min-height:100vh; padding-bottom:140px; } .screen.active { display:block; }

/* ── 圖表與日曆 ── */
.chart-box { position:relative; height:200px; width:100%; display:flex; justify-content:center; align-items:center; margin:10px 0; }
.chart-center { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center; pointer-events:none; } .chart-val { font-size:24px; font-weight:800; }
.cal-grid { display:flex; flex-wrap:wrap; width:100%; padding:5px 0; } .cal-h,.cal-c { width:14.285%; text-align:center; } .cal-h { font-size:12px; color:var(--muted); padding-bottom:12px; font-weight:700; } .cal-c { height:52px; display:flex; justify-content:center; align-items:center; }
.cal-d { width:38px; height:38px; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:50%; font-size:17px; position:relative; } .cal-d.active { background:var(--accent); color:#fff; font-weight:600; }
.dots { display:flex; gap:2.5px; position:absolute; bottom:4px; } .dot { width:4px; height:4px; border-radius:50%; background:var(--accent); }

/* ── 個人頁面 ── */
.profile-header { padding:20px 20px 10px; } .profile-main { display:flex; align-items:center; gap:20px; margin-bottom:18px; }
.avatar-wrap { position:relative; width:82px; height:82px; border-radius:50%; background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); padding:3px; cursor:pointer; flex-shrink:0; } .avatar { width:100%; height:100%; border-radius:50%; background:#111; border:2px solid #000; display:flex; justify-content:center; align-items:center; font-weight:700; font-size:22px; }
.stats { display:flex; flex:1; justify-content:space-between; text-align:center; } .stat-val { font-size:16px; font-weight:700; display:block; } .stat-lab { font-size:12px; color:var(--muted); display:block; }
.profile-bio { margin-bottom:20px; padding:0 4px; } .bio-name { font-weight:700; font-size:16px; margin-bottom:4px; } .bio-text { font-size:14px; line-height:1.4; white-space:pre-wrap; color:var(--muted); }

/* ── Bottom Nav & Sheets ── */
.action-sheet-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:3000; align-items:flex-end; opacity:0; transition:0.3s; padding:10px; } .action-sheet-overlay.open { display:flex; opacity:1; }
.action-sheet { width:100%; max-width:410px; margin:0 auto; transform:translateY(100%); transition:0.3s cubic-bezier(0.4,0,0.2,1); } .action-sheet-overlay.open .action-sheet { transform:translateY(0); }
.as-group { background:var(--bg-modal); backdrop-filter:blur(25px); -webkit-backdrop-filter:blur(25px); border-radius:14px; overflow:hidden; margin-bottom:10px; } .as-item { padding:18px; text-align:center; font-size:18px; color:#0A84FF; border-bottom:0.5px solid rgba(255,255,255,0.1); cursor:pointer; } .as-cancel { background:#FFFFFF; color:#000; font-weight:600; border-radius:14px; padding:18px; text-align:center; font-size:18px; cursor:pointer; margin-bottom:calc(env(safe-area-inset-bottom) + 5px); }
.bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:rgba(10,10,10,0.92); border-top:0.5px solid var(--border); display:flex; z-index:100; padding:8px 0 calc(env(safe-area-inset-bottom) + 8px); backdrop-filter:blur(20px); }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; color:var(--muted); transition: color 0.2s; } .nav-item.active { color:var(--accent); } .nav-icon-svg { width:24px; height:24px; stroke:currentColor; stroke-width:2; fill:none; } .fab { width:56px; height:56px; background:var(--accent); border-radius:50%; display:flex; justify-content:center; align-items:center; border:4px solid #000; margin-top:-32px; box-shadow:0 4px 15px rgba(94,92,230,0.3); }

/* ── Modals ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:5000; align-items:flex-end; opacity:0; transition:0.3s; } .modal-overlay.open { display:flex; opacity:1; }
.modal { background:var(--bg-elevated); border-radius:20px 20px 0 0; padding:20px 20px calc(20px + env(safe-area-inset-bottom)); width:100%; max-height:90vh; overflow-y:auto; transform:translateY(100%); transition:0.3s; } .modal-overlay.open .modal { transform:translateY(0); }
.modal-h { width:36px; height:5px; background:var(--muted); border-radius:3px; margin:0 auto 20px; opacity:0.5; }
.field { margin-bottom:18px; } .field label { font-size:12px; color:var(--muted); display:block; margin-bottom:6px; margin-left:4px; text-transform:uppercase; } .field input,.field select { width:100%; height:48px; padding:0 16px; background:var(--input-bg); border:none; border-radius:10px; color:#fff; font-size:16px; -webkit-appearance:none; } .field.row-group { display:flex; gap:10px; }
.t-toggle { display:flex; background:rgba(118,118,128,0.24); border-radius:9px; padding:2px; margin-bottom:25px; height:38px; } .t-btn { flex:1; border:none; background:transparent; color:#fff; font-size:14px; font-weight:600; border-radius:7px; cursor:pointer; transition:0.2s; } .t-btn.active.exp { background:var(--red); } .t-btn.active.inc { background:var(--green); }

/* ── 發票 & 專案 & 薪資組件 ── */
.scroll-bar { display:flex; gap:8px; overflow-x:auto; padding:0 16px 12px; scrollbar-width:none; align-items:center; } .scroll-bar::-webkit-scrollbar { display:none; }
.chip { padding:6px 16px; border-radius:20px; background:var(--input-bg); color:var(--muted); font-size:13px; font-weight:500; cursor:pointer; white-space:nowrap; flex-shrink:0; } .chip.active { background:var(--accent); color:#fff; }
.inv-summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:0 16px 12px; } .inv-sum-card { background:var(--card); border-radius:12px; padding:14px 16px; }
.tag-badge { display:inline-block; font-size:10px; padding:2px 6px; border-radius:4px; font-weight:600; margin-left:4px; } .t-paid { background:rgba(50,215,75,0.15); color:var(--green); } .t-exp { background:rgba(255,69,58,0.15); color:var(--red); } .t-inv { background:rgba(255,159,10,0.15); color:var(--amber); }
.pbb-track { background:rgba(255,255,255,0.1); border-radius:4px; height:8px; overflow:hidden; margin-bottom:6px; margin-top:8px;} .pbb-fill { height:100%; border-radius:4px; transition:width 0.6s; } .pbb-fill.ok { background:var(--green); } .pbb-fill.warn { background:var(--amber); } .pbb-fill.over { background:var(--red); }
.section-hdr { font-size:12px; font-weight:700; color:var(--muted); padding:12px 18px 6px; background:rgba(255,255,255,0.03); text-transform:uppercase; }
.payroll-summary { background:linear-gradient(135deg,rgba(94,92,230,0.2),rgba(94,92,230,0.05)); border:0.5px solid rgba(94,92,230,0.3); border-radius:var(--radius-card); padding:18px; margin:0 16px 12px; }

/* ── 政府列印格式 ── */
.gov-table-wrapper { background:#fff; color:#000; padding:15px; border-radius:8px; font-family:"標楷體", "MingLiU", serif; overflow-x:auto; } .gov-table { width:100%; border-collapse:collapse; font-size:13px; text-align:center; min-width:400px; } .gov-table th, .gov-table td { border:1px solid #000; padding:8px 4px; } .gov-table th { background:#f2f2f2; font-weight:bold; }

/* ── Apple 原生长按防誤觸 ── */
.long-pressable {
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  cursor: pointer;
  transition: opacity 0.2s;
}
@media (hover: none) {
  .long-pressable:active { opacity: 0.6; }
}
</style>
</head>

    </form>
  </div>
</div>

<div class="modal-overlay" id="m-add-emp" onclick="closeM(event,'m-add-emp')">

    <div class="field"><label>名稱</label><input type="text" id="new-e-name" placeholder="請輸入姓名"></div><div class="field"><label>身分證</label><input type="text" id="new-e-id" placeholder="報稅使用"></div><div class="field"><label>月薪預算</label><input type="number" id="new-e-salary" placeholder="$0" inputmode="numeric"></div>

<div class="modal-overlay" id="m-emp-detail" onclick="closeM(event,'m-emp-detail')">

    </div>

    <div id="emp-detail-list" style="flex:1; overflow-y:auto; margin-bottom:20px;"></div>
  </div>
</div>

<div class="modal-overlay" id="m-gov-payroll" onclick="closeM(event,'m-gov-payroll')">
  <div class="modal" style="background:#f2f2f7;"><div class="modal-h" style="background:#c7c7cc;"></div>
    <div class="flex-sb" style="margin-bottom:15px;"><h3 style="color:#000;margin:0;">列印預覽</h3><button onclick="closeMById('m-gov-payroll')" style="background:var(--accent);color:#fff;border:none;padding:6px 12px;border-radius:8px;font-weight:600;">關閉</button></div>

</div>

  <div class="action-sheet"><div class="as-group"><div class="as-item fw-6 c-red" onclick="executeDeleteEmp()">刪除此人員</div></div><div class="as-cancel" onclick="closeMById('as-delete-emp')">取消</div></div>
</div>

<script>
/* ── JS 邏輯：保留穩定的直覺綁定，確保 Apple 原生防滑防點功能運作 ── */
const $ = id => document.getElementById(id), $$ = s => document.querySelectorAll(s);
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzsCdf4E4p52LOIvRM7n_UMoAcMz05kTAM4zKf72KIzFPzcTi5ShA1xMAOlDoghhKR-/exec';

// 將繁雜的長按防止誤觸事件統一為常數字串，維持 HTML 乾淨
const LP_EVTS = 'onpointerup="cancelLP()" onpointercancel="cancelLP()" onpointerleave="cancelLP()" ontouchmove="cancelLP()" oncontextmenu="event.preventDefault()"';

let emp = JSON.parse(localStorage.getItem('ye') || '[]');
let ldg = JSON.parse(localStorage.getItem('yl') || '[]');
let projs = JSON.parse(localStorage.getItem('yp')) || {
  "水晶(1-2月)": { period:"2026/01-2026/02", budget:433000, sections:[] },
  "蠟燭(3-4月)": { period:"2026/03-2026/04", budget:451250, sections:[] },
  "香包(5-6月)": { period:"2026/05-2026/06", budget:481500, sections:[] }
};
let charts = {}, calYear = new Date().getFullYear(), calMonth = new Date().getMonth();
let selD = new Date().toISOString().split('T')[0], currentMe = "蘊一創意";
let currentPayrollMonth = selD.slice(0,7), currentInvMonth = selD.slice(0,7), currentProject = Object.keys(projs)[0] || "";
let projFilters = new Set(['all']), invFilterSet = new Set(['inc', 'exp']), invSortBy = 'date', invSortDesc = true;

const fmtK = n => n >= 1000 ? (n/1000).toFixed(1)+'k' : n;
const setSync = (t, c) => { const s = $('sync-status'); s.textContent = t; s.className = c; };
const toggleDrawer = o => { const d=$('drawer'), v=$('d-overlay'); if(o){v.style.display='block';setTimeout(()=>{v.style.opacity='1';d.classList.add('open')},10);}else{d.classList.remove('open');v.style.opacity='0';setTimeout(()=>v.style.display='none',300);} };
const closeMById = id => $(id).classList.remove('open');
const closeM = (e,id) => { if(e.target===$(id)) closeMById(id); };

// ── 穩定的獨立長按機制 (Apple Native Feel) ──
let lpTimer = null, preventClick = false;
let delIdx = null, delProj = null, delEmpIdx = null;

function startLP(idx) {
  cancelLP(); preventClick = false;
  lpTimer = setTimeout(() => { preventClick = true; if(navigator.vibrate) navigator.vibrate(50); delIdx = idx; $('as-delete').classList.add('open'); }, 500);
}
function startLPProj(pName) {
  cancelLP(); preventClick = false;
  lpTimer = setTimeout(() => { preventClick = true; if(navigator.vibrate) navigator.vibrate(50); delProj = pName; $('as-delete-proj').classList.add('open'); }, 500);
}
function startLPEmp(idx) {
  cancelLP(); preventClick = false;
  lpTimer = setTimeout(() => { preventClick = true; if(navigator.vibrate) navigator.vibrate(50); delEmpIdx = idx; $('as-delete-emp').classList.add('open'); }, 500);
}
function cancelLP() { if(lpTimer) clearTimeout(lpTimer); }

// ── 獨立執行刪除 ──
function executeDelete() {
  if(delIdx !== null) { ldg.splice(delIdx, 1); localStorage.setItem('yl', JSON.stringify(ldg)); sync(); fullRender(); closeMById('as-delete'); delIdx = null; }
}
function executeDeleteProj() {
  if(delProj !== null) { ldg.forEach(r => { if(r.proj === delProj) r.proj = ''; }); localStorage.setItem('yl', JSON.stringify(ldg)); delete projs[delProj]; localStorage.setItem('yp', JSON.stringify(projs)); if(currentProject === delProj) { const r = Object.keys(projs); currentProject = r.length ? r[0] : ""; } sync(); fullRender(); closeMById('as-delete-proj'); delProj = null; }
}
function executeDeleteEmp() {
  if(delEmpIdx !== null) { emp.splice(delEmpIdx, 1); localStorage.setItem('ye', JSON.stringify(emp)); sync(); fullRender(); closeMById('as-delete-emp'); delEmpIdx = null; }
}

async function loadCloud() {
  render(); setSync('同步中...','syncing');
  const cb = '_cb_'+Date.now(), s = document.createElement('script');
  let to = setTimeout(()=>{ setSync('⚠️ 離線(本機)','sync-err'); delete window[cb]; s.remove(); }, 15000); 
  window[cb] = d => { clearTimeout(to); if(d){ emp=d.emp||emp; ldg=d.ldg||ldg; localStorage.setItem('ye',JSON.stringify(emp)); localStorage.setItem('yl',JSON.stringify(ldg)); fullRender(); setSync('✅ 已同步','sync-ok'); } s.remove(); delete window[cb]; };
  s.src = `${GAS_URL}?callback=${cb}`; document.head.appendChild(s);
}

function fullRender() { render(); if($('s-payroll').classList.contains('active')) renderPayroll(); if($('s-invoice').classList.contains('active')) renderInvoice(); if($('s-project').classList.contains('active')) renderProject(); let q=$$('#s-search input')[0]; if($('s-search').classList.contains('active')&&q.value) handleSearch(q.value); }
const go = (p,el) => { $$('.screen,.nav-item').forEach(e=>e.classList.remove('active')); $(`s-${p}`).classList.add('active'); if(el)el.classList.add('active'); document.body.classList.toggle('nav-active',p==='home'||p==='cal'); if(p==='me')updateMeUI(); if(p==='payroll')renderPayroll(); if(p==='invoice')renderInvoice(); if(p==='project')renderProject(); render(); };
const resetAndGoMe = el => { currentMe="蘊一創意"; go('me',el); };
const shiftMonth = d => { const dt = new Date(calYear, calMonth+d, 1); calYear=dt.getFullYear(); calMonth=dt.getMonth(); render(); };
const pickMonth = v => { if(!v)return; let [y,m]=v.split('-'); calYear=parseInt(y); calMonth=parseInt(m)-1; render(); };

function updateMeUI() {
  const d = currentMe==="蘊一創意"; let fl = d?ldg:ldg.filter(r=>r.mem===currentMe);
  let i=0,e=0; fl.forEach(r=>r.type==='income'?i+=r.amt:e+=r.amt);
  $('stat-count').textContent=fl.length; $('stat-inc').textContent=fmtK(i); $('stat-exp').textContent=fmtK(e);
  $('me-avatar-txt').textContent=d?"蘊":currentMe.charAt(0); $('me-name').textContent=currentMe;
  $('me-desc').innerHTML=d?"":(emp.find(x=>x.name===currentMe)?`團隊成員\n預算：$${(emp.find(x=>x.name===currentMe).salary||0).toLocaleString()}`:"");
}

function render() {
  const mS = `${calYear}-${String(calMonth+1).padStart(2,'0')}`; $('hdr-m').textContent = `${calYear}年 ${calMonth+1}月`;
  let inc=0, exp=0, dots={}; ldg.filter(r=>r.date.startsWith(mS)).forEach(r=>{ r.type==='income'?inc+=r.amt:exp+=r.amt; dots[r.date]=true; });
  $('val-p').textContent = `$${(inc-exp).toLocaleString()}`;
  if(charts.m) charts.m.destroy(); charts.m = new Chart($('c-main'),{type:'doughnut',data:{datasets:[{data:[exp,inc||1],backgroundColor:['#FF453A','#32D74B'],borderWidth:0}]},options:{cutout:'85%',responsive:true,maintainAspectRatio:false}});
  const dInM=new Date(calYear,calMonth+1,0).getDate(), fD=new Date(calYear,calMonth,1).getDay();
  let cH='<div class="cal-grid">'+'日一二三四五六'.split('').map(w=>`<div class="cal-h">${w}</div>`).join('')+'<div class="cal-c"></div>'.repeat(fD);
  for(let d=1;d<=dInM;d++){ let dS=`${mS}-${String(d).padStart(2,'0')}`; cH+=`<div class="cal-c"><div class="cal-d ${dS===selD?'active':''}" onclick="selD='${dS}';render();">${d}${dots[dS]?'<div class="dots"><div class="dot"></div></div>':''}</div></div>`; }
  $('cal-grid').innerHTML=cH+'</div>'; $('cal-title').textContent=selD;
  
  const lR = (inr, idx) => `<div class="list-row long-pressable" onpointerdown="startLP(${idx})" ${LP_EVTS}>${inr}</div>`;
  const fA = r => `<b class="${r.type==='income'?'c-grn':'c-wht'}">${r.type==='income'?'+':'-'}$${r.amt.toLocaleString()}</b>`;
  
  $('cal-list').innerHTML = ldg.map((r,i)=>({...r,_o:i})).filter(r=>r.date===selD).map(r=>lR(`<div>${r.cat} <small class="c-mut">${r.mem}</small></div>${fA(r)}`, r._o)).join('')||'<div class="empty-state">本日無紀錄</div>';
  $('ldg-list').innerHTML = ldg.map((r,i)=>lR(`<div>${r.cat}<br><small class="c-mut">${r.date} · ${r.mem} ${r.proj?`[${r.proj}]`:''}</small></div>${fA(r)}`, i)).join('');
  
  // 人員名單：支援長按刪除，與防誤觸的查看明細
  $('emp-list').innerHTML = emp.map((e,i)=>`<div class="list-row long-pressable" onpointerdown="startLPEmp(${i})" ${LP_EVTS} onclick="if(!preventClick) openEmpDetail(${i})"><div>${e.name}<br><small class="c-mut">${e.idNo||'未填寫'}</small></div><div style="text-align:right"><small>$${(e.salary||0).toLocaleString()}</small><br><small style="color:var(--accent);font-size:11px;">查看明細 ></small></div></div>`).join('');
}

const openProfilePicker = () => { $('as-list').innerHTML=`<div class="as-item" onclick="selectMe('蘊一創意')">蘊一創意</div>`+emp.map(e=>`<div class="as-item" onclick="selectMe('${e.name}')">${e.name}</div>`).join(''); $('as-picker').classList.add('open'); };
const openAddEmpModal = () => { closeMById('as-picker'); $('m-add-emp').classList.add('open'); };
const saveEmp = () => { let n=$('new-e-name').value.trim(); if(!n)return alert('請輸入名稱'); emp.push({name:n,idNo:$('new-e-id').value.trim(),salary:Number($('new-e-salary').value)||0}); localStorage.setItem('ye',JSON.stringify(emp)); $('new-e-name').value='';$('new-e-id').value='';$('new-e-salary').value=''; closeMById('m-add-emp'); sync(); fullRender(); };
const selectMe = n => { currentMe=n; updateMeUI(); closeMById('as-picker'); };

const prepLdg = () => { $('ldg-form').reset(); setT('expense'); $('l-d').value=selD; $('l-m').innerHTML='<option value="公司">公司帳戶</option>'+emp.map(e=>`<option value="${e.name}">${e.name}</option>`).join(''); $('l-proj').innerHTML='<option value="">無</option>'+Object.keys(projs).map(p=>`<option value="${p}">${p}</option>`).join(''); $('m-ldg').classList.add('open'); };
function setT(t){ $('l-t').value=t; $('tb-exp').className=`t-btn ${t==='expense'?'active exp':''}`; $('tb-inc').className=`t-btn ${t==='income'?'active inc':''}`; }
async function sync(){ try{ await fetch(GAS_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({emp,ldg})}); }catch(e){} }
function saveLdg(){ ldg.unshift({date:$('l-d').value,type:$('l-t').value,amt:Number($('l-a').value),cat:$('l-c').value,mem:$('l-m').value,proj:$('l-proj').value,inv:$('l-inv').value,vt:$('l-vt').value}); localStorage.setItem('yl',JSON.stringify(ldg)); closeMById('m-ldg'); sync(); fullRender(); }
function handleSearch(v){ if(!v)return $('search-list').innerHTML=''; $('search-list').innerHTML=ldg.map((r,i)=>({...r,_o:i})).filter(r=>r.cat.includes(v)||r.mem.includes(v)).map(r=>`<div class="list-row long-pressable" onpointerdown="startLP(${r._o})" ${LP_EVTS}><div>${r.cat}<br><small class="c-mut">${r.date}</small></div><b class="${r.type==='income'?'c-grn':'c-wht'}">$${r.amt.toLocaleString()}</b></div>`).join(''); }

// ── 人員明細查看 ──
function openEmpDetail(i) {
  const p = emp[i], pl = ldg.filter(r => r.mem === p.name); let inc=0, exp=0; pl.forEach(r => r.type==='income'?inc+=r.amt:exp+=r.amt); $('emp-detail-name').textContent = p.name;
  $('emp-detail-stats').innerHTML = `<div style="flex:1;background:var(--input-bg);padding:10px;border-radius:10px;text-align:center;"><div class="fs-11 c-mut">身分證</div><div class="fs-14 fw-6" style="margin-top:4px;">${p.idNo||'-'}</div></div><div style="flex:1;background:var(--input-bg);padding:10px;border-radius:10px;text-align:center;"><div class="fs-11 c-mut">月薪</div><div class="fs-14 fw-6" style="margin-top:4px;">$${(p.salary||0).toLocaleString()}</div></div><div style="flex:1;background:var(--input-bg);padding:10px;border-radius:10px;text-align:center;"><div class="fs-11 c-mut">總經手</div><div class="fs-14 fw-6" style="margin-top:4px;white-space:nowrap;"><span class="c-grn">+${fmtK(inc)}</span> / <span class="c-red">-${fmtK(exp)}</span></div></div>`;
  $('emp-detail-list').innerHTML = pl.map(r => `<div class="list-row"><div>${r.cat}<br><small class="c-mut">${r.date} ${r.proj?`[${r.proj}]`:''}</small></div><b class="${r.type==='income'?'c-grn':'c-wht'}">${r.type==='income'?'+':'-'}$${r.amt.toLocaleString()}</b></div>`).join('') || '<div class="empty-state">尚無帳目紀錄</div>';
  $('m-emp-detail').classList.add('open');
}

// ── 專案大表 ──
function saveProj() { let n=$('new-p-name').value.trim(), s=$('new-p-start').value, e=$('new-p-end').value, b=Number($('new-p-budget').value)||0; if(!n)return; projs[n]={period:`${s.replace(/-/g,'/')}-${e.replace(/-/g,'/')}`,budget:b,sections:[]}; localStorage.setItem('yp',JSON.stringify(projs)); currentProject=n; $('proj-form').reset(); closeMById('m-add-proj'); renderProject(); }
function toggleProjFilter(f) { if(f==='all'){projFilters.clear();projFilters.add('all');}else{projFilters.delete('all');projFilters.has(f)?projFilters.delete(f):projFilters.add(f);if(projFilters.size===0)projFilters.add('all');} $$('#proj-filters .chip').forEach(e=>e.classList.toggle('active',projFilters.has(e.innerText)||(e.id==='pf-all'&&projFilters.has('all')))); renderProject(); }

function renderProject() {
  let pK = Object.keys(projs); if(pK.length && !pK.includes(currentProject)) currentProject = pK[0];
  // 專案 Tab 支援長按刪除整包專案
  $('proj-tabs').innerHTML = pK.map(p => `<div class="chip ${p===currentProject?'active':''} long-pressable" onpointerdown="startLPProj('${p.replace(/'/g,"\\'")}')" ${LP_EVTS} onclick="if(!preventClick) {currentProject='${p.replace(/'/g,"\\'")}';renderProject();}">📦 ${p}</div>`).join('');
  if(!currentProject) return $('proj-budget-section').innerHTML='', $('proj-list').innerHTML='<div class="empty-state">無專案</div>';
  let pj = projs[currentProject], rl = ldg.map((r,i)=>({...r,_o:i})).filter(r=>r.proj===currentProject), tA = rl.filter(r=>r.type==='expense').reduce((s,i)=>s+i.amt,0), rM = pj.budget-tA, pT = pj.budget>0?Math.min(100,Math.round(tA/pj.budget*100)):100;
  $('proj-budget-section').innerHTML = `<div class="card"><div class="flex-sb fs-14"><span class="c-mut">📅 ${pj.period}</span><span class="fw-6" style="color:var(--purple)">預算 $${pj.budget.toLocaleString()}</span></div><div class="pbb-track"><div class="pbb-fill ${pT>100?'over':pT>80?'warn':'ok'}" style="width:${pT}%"></div></div><div class="flex-sb fs-14"><span class="c-mut">支出 $${tA.toLocaleString()}</span><span class="fw-6">剩餘 <span class="${rM>=0?'c-grn':'c-red'}">$${rM.toLocaleString()}</span></span></div></div>`;
  if(!projFilters.has('all') && projFilters.has('完成')) rl = rl.filter(i=>true);
  $('proj-list').innerHTML = rl.length ? `<div class="section-hdr">實際項目</div>`+rl.map(i => `<div class="list-row long-pressable" onpointerdown="startLP(${i._o})" ${LP_EVTS}><div><div class="fs-15 fw-6 ${i.type==='income'?'c-grn':''}">${i.cat}</div><div class="fs-12 c-mut" style="margin-top:3px;">📅 ${i.date} 👤 ${i.mem} ${i.vt!=='無憑證'?`<span class="tag-badge t-inv">發票</span>`:''}</div></div><div class="fs-15 fw-6 ${i.type==='income'?'c-grn':''}">${i.type==='income'?'+':'-'}$${i.amt.toLocaleString()}</div></div>`).join('') : '<div class="empty-state">無紀錄</div>';
}

function toggleInvFilter(t) { invFilterSet.has(t)?invFilterSet.delete(t):invFilterSet.add(t); $(`f-${t}`).classList.toggle('active',invFilterSet.has(t)); renderInvoice(); }
function setInvSort(t) { if(invSortBy===t)invSortDesc=!invSortDesc; else{invSortBy=t;invSortDesc=true;} $('s-date').innerText='按日期 '+(invSortBy==='date'?(invSortDesc?'↓':'↑'):''); $('s-inv').innerText='按序號 '+(invSortBy==='inv'?(invSortDesc?'↓':'↑'):''); $('s-date').style.color=invSortBy==='date'?'var(--blue)':'var(--muted)'; $('s-date').style.borderColor=invSortBy==='date'?'var(--blue)':'transparent'; $('s-inv').style.borderColor=invSortBy==='inv'?'var(--blue)':'var(--border)'; renderInvoice(); }
function switchInvMonth(m){ if(m){currentInvMonth=m;renderInvoice();} }
function renderInvoice() {
  $('inv-month-picker').value = currentInvMonth; let dM = ldg.map((r,i)=>({...r,_o:i})).filter(r=>r.date.startsWith(currentInvMonth)&&r.vt&&r.vt!=='無憑證');
  let tI=0,tO=0; dM.forEach(r=>r.type==='income'?tI+=r.amt:tO+=r.amt); let tX=Math.max(0,Math.round((tI-tO)*0.05)), gP=tI-tO;
  $('inv-summary-grid').innerHTML = `<div class="inv-sum-card"><div class="fs-12 c-mut">📥 銷項(含稅)</div><div class="fs-20 fw-6 c-grn" style="margin-top:4px;">$${tI.toLocaleString()}</div></div><div class="inv-sum-card"><div class="fs-12 c-mut">📤 進項(含稅)</div><div class="fs-20 fw-6 c-red" style="margin-top:4px;">$${tO.toLocaleString()}</div></div><div class="inv-sum-card"><div class="fs-12 c-mut">🏦 預估稅額</div><div class="fs-20 fw-6 c-amb" style="margin-top:4px;">$${tX.toLocaleString()}</div></div><div class="inv-sum-card"><div class="fs-12 c-mut">💰 毛利</div><div class="fs-20 fw-6 c-acc" style="margin-top:4px;">$${gP.toLocaleString()}</div></div>`;
  let dL = dM.filter(r=>(r.type==='income'&&invFilterSet.has('inc'))||(r.type==='expense'&&invFilterSet.has('exp'))).sort((a,b)=>invSortBy==='date'?(invSortDesc?b.date.localeCompare(a.date):a.date.localeCompare(b.date)):(invSortDesc?(b.inv||'').localeCompare(a.inv||''):(a.inv||'').localeCompare(b.inv||'')));
  $('inv-content').innerHTML = dL.map(i=>`<div class="list-row long-pressable" onpointerdown="startLP(${i._o})" ${LP_EVTS}><div style="flex:1;min-width:0;"><div class="fs-15 fw-6" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${i.cat}</div><div class="fs-12 c-mut" style="margin-top:3px;">${i.date} · ${i.vt} ${i.inv?`<span style="color:#fff">[${i.inv}]</span>`:''}<span class="tag-badge ${i.type==='income'?'t-paid':'t-exp'}">${i.type==='income'?'銷項':'進項'}</span></div></div><div class="fs-15 fw-6 ${i.type==='income'?'c-grn':'c-red'}">${i.type==='income'?'+':'-'}$${i.amt.toLocaleString()}</div></div>`).join('') || '<div class="empty-state">無憑證</div>';
}

function renderPayroll() {
  const [y,m] = currentPayrollMonth.split('-'); let pD=[], tP=0;
  emp.forEach(e => { let eA=ldg.filter(r=>r.mem===e.name&&r.type==='expense'&&r.date.startsWith(currentPayrollMonth)).reduce((s,i)=>s+i.amt,0); if(eA>0||e.salary>0){ let t=eA>0?eA:e.salary; pD.push({n:e.name,id:e.idNo,b:e.salary||0,t}); tP+=t; } });
  $('payroll-summary-card').innerHTML = `<div class="fs-12 c-mut" style="margin-bottom:4px;">${y}年${m}月 給付總額</div><div class="fs-28 fw-7 c-acc">$${tP.toLocaleString()}</div><div style="margin-top:12px;"><div class="fs-11 c-mut">計薪</div><div class="fs-15 fw-6">${pD.length}人</div></div>`;
  $('payroll-list').innerHTML = pD.map(e=>`<div class="card"><div class="flex-sb" style="margin-bottom:12px;"><div><div class="fs-17 fw-6">${e.n}</div><div class="fs-12 c-mut">${e.id||'未設身分證'}</div></div><div class="fs-20 fw-7 c-grn">$${e.t.toLocaleString()}</div></div><div style="border-top:0.5px solid var(--border);padding-top:10px;"><div class="flex-sb fs-14" style="padding:4px 0;"><span class="c-mut">設定月薪</span><span>$${e.b.toLocaleString()}</span></div><div class="flex-sb fs-14" style="padding:4px 0;"><span class="c-mut">帳目領取</span><span class="c-grn">$${e.t.toLocaleString()}</span></div></div></div>`).join('') || '<div class="empty-state">無紀錄</div>';
}

function buildGovTable() {
  const [y,m]=currentPayrollMonth.split('-'); let t=0, h='';
  emp.forEach((e,i) => { let a=ldg.filter(r=>r.mem===e.name&&r.type==='expense'&&r.date.startsWith(currentPayrollMonth)).reduce((s,r)=>s+r.amt,0)||e.salary||0; if(a>0){t+=a; h+=`<tr><td>${i+1}</td><td>${e.name}</td><td>${e.idNo||''}</td><td>${a.toLocaleString()}</td><td>0</td><td>${a.toLocaleString()}</td><td></td></tr>`;} });
  $('gov-table-container').innerHTML = `<div style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:10px;">蘊一創意 員工薪資印領清冊</div><div style="text-align:right;margin-bottom:5px;font-size:13px;font-weight:bold;">中華民國 ${parseInt(y)-1911} 年 ${m} 月</div><table class="gov-table"><thead><tr><th width="10%">編號</th><th width="15%">姓名</th><th width="20%">身分證</th><th width="15%">總額</th><th width="15%">代扣稅</th><th width="15%">實領</th><th width="10%">簽收</th></tr></thead><tbody>${h}<tr style="font-weight:bold;background:#f9f9f9;"><td colspan="3" style="text-align:right;">合計</td><td>${t.toLocaleString()}</td><td>0</td><td>${t.toLocaleString()}</td><td></td></tr></tbody></table><div class="flex-sb" style="margin-top:20px;font-size:14px;font-weight:bold;"><span>負責人：林柏衡</span><span>會計：侯淑芬</span><span>製表：______</span></div>`;
}

window.onload = () => { if(!ldg.length&&!emp.length)emp.push({name:"林柏衡",idNo:"A123456789",salary:37100}); loadCloud(); setTimeout(()=>$('splash-screen').style.opacity='0',1200); };
</script>
</body>
