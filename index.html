<style>
/* ── iOS 系統色彩與基礎 ── */
:root { --bg:#000000; --bg-elevated:#1C1C1E; --card:#1C1C1E; --bg-modal:rgba(44,44,46,0.94); --input-bg:#3A3A3C; --accent:#5E5CE6; --green:#32D74B; --red:#FF453A; --amber:#FF9F0A; --blue:#0A84FF; --purple:#BF5AF2; --text:#FFFFFF; --muted:#8E8E93; --border:rgba(255,255,255,0.12); --radius-card:14px; }
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; outline:none; }
body { font-family:-apple-system,BlinkMacSystemFont,"SF Pro NT","Noto Sans TC",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; max-width:430px; margin:0 auto; overflow-x:hidden; -webkit-font-smoothing:antialiased; }

/* ── 瘦身核心：Utility Classes (微型類別) ── */
.flex { display:flex; } .flex-col { display:flex; flex-direction:column; } .jc-sb { justify-content:space-between; } .ai-c { align-items:center; }
.t-c { text-align:center; } .t-r { text-align:right; }
.fw-5 { font-weight:500; } .fw-6 { font-weight:600; } .fw-7 { font-weight:700; }
.fs-10 { font-size:10px; } .fs-11 { font-size:11px; } .fs-12 { font-size:12px; } .fs-13 { font-size:13px; } .fs-14 { font-size:14px; } .fs-15 { font-size:15px; } .fs-17 { font-size:17px; } .fs-20 { font-size:20px; } .fs-28 { font-size:28px; }
.c-mut { color:var(--muted); } .c-grn { color:var(--green); } .c-red { color:var(--red); } .c-amb { color:var(--amber); } .c-acc { color:var(--accent); } .c-wht { color:#fff; } .c-blu { color:var(--blue); }
.mt-1 { margin-top:4px; } .mt-2 { margin-top:10px; } .mb-1 { margin-bottom:5px; } .mb-2 { margin-bottom:12px; }

/* ── 共用 UI 佈局區塊 ── */
.screen { display:none; min-height:100vh; padding-bottom:140px; } .screen.active { display:block; }
.card { background:var(--card); border-radius:var(--radius-card); padding:18px; margin:0 16px 12px; }
.page-title { display:flex; justify-content:space-between; align-items:center; font-size:28px; font-weight:700; padding:0 16px 16px; }
.empty { text-align:center; padding:60px 20px; color:var(--muted); font-size:15px; }
.list-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:0.5px solid var(--border); } .list-row:last-child { border-bottom:none; }
.icon-btn { background:var(--input-bg); color:var(--accent); border:none; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
.divider-label { font-size:12px; color:var(--muted); padding:8px 16px 4px; font-weight:600; text-transform:uppercase; }

/* ── 核心手感與長按防誤觸 (Apple Native Feel) ── */
.lp { -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; transition:opacity 0.2s, background-color 0.2s; cursor:pointer; }
@media(hover:none){ .lp:active { opacity:0.6; background-color:rgba(255,255,255,0.05); } }

/* ── 啟動與 Header ── */
#splash-screen { position:fixed; inset:0; background:#00; z-index:9999; display:flex; justify-content:center; align-items:center; transition:opacity 0.6s; pointer-events:none; }
.splash-logo { width:90px; animation:splashAnim 1.2s forwards; } @keyframes splashAnim { 0%{opacity:0;transform:scale(0.96)} 30%,85%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(1.02)} }
.header { padding:56px 20px 10px; display:flex; justify-content:space-between; align-items:center; } .menu-trigger { padding:10px; margin-left:-10px; cursor:pointer; }
#sync-status { font-size:11px; padding:6px 12px; border-radius:20px; background:var(--input-bg); font-weight:600; cursor:pointer; text-align:center; transition:0.3s; }
.sync-ok { color:var(--green); background:rgba(50,215,75,0.1) !important; } .sync-err { color:var(--red); background:rgba(255,69,58,0.1) !important; } .syncing { color:var(--amber); }

/* ── 側邊選單與全域導覽 ── */
.drawer-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:4000; opacity:0; transition:0.3s; }
.drawer { position:fixed; top:0; left:-290px; width:290px; height:100%; background:var(--bg-elevated); z-index:4001; transition:0.3s cubic-bezier(0.4,0,0.2,1); padding:60px 0 30px; overflow-y:auto; } .drawer.open { left:0; }
.drawer-section { padding:8px 20px 4px; font-size:11px; color:var(--muted); text-transform:uppercase; font-weight:600; }
.drawer-item { display:flex; align-items:center; gap:15px; padding:13px 20px; color:var(--text); font-size:16px; cursor:pointer; } .drawer-item:hover { background:rgba(255,255,255,0.05); } .drawer-item svg { width:20px; height:20px; stroke:var(--accent); fill:none; stroke-width:2; flex-shrink:0; }
.global-nav { display:none; justify-content:center; align-items:center; gap:10px; padding:10px 16px 15px; } body.nav-active .global-nav { display:flex; }
.m-btn { background:none; border:none; color:var(--accent); font-size:24px; cursor:pointer; width:40px; } .m-picker-wrapper { position:relative; background:var(--bg-elevated); padding:8px 18px; border-radius:12px; min-width:140px; text-align:center; } #m-input { position:absolute; inset:0; opacity:0; width:100%; cursor:pointer; }
.bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:rgba(10,10,10,0.92); border-top:0.5px solid var(--border); display:flex; z-index:100; padding:8px 0 calc(env(safe-area-inset-bottom) + 8px); backdrop-filter:blur(20px); }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; color:var(--muted); transition: color 0.2s; } .nav-item.active { color:var(--accent); } .nav-icon-svg { width:24px; height:24px; stroke:currentColor; stroke-width:2; fill:none; } .fab { width:56px; height:56px; background:var(--accent); border-radius:50%; display:flex; justify-content:center; align-items:center; border:4px solid #000; margin-top:-32px; box-shadow:0 4px 15px rgba(94,92,230,0.3); }

/* ── 圖表與日曆 ── */
.chart-box { position:relative; height:200px; width:100%; display:flex; justify-content:center; align-items:center; margin:10px 0; } .chart-center { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center; pointer-events:none; }
.cal-grid { display:flex; flex-wrap:wrap; width:100%; padding:5px 0; } .cal-h,.cal-c { width:14.285%; text-align:center; } .cal-h { font-size:12px; color:var(--muted); padding-bottom:12px; font-weight:700; } .cal-c { height:52px; display:flex; justify-content:center; align-items:center; } .cal-d { width:38px; height:38px; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:50%; font-size:17px; position:relative; } .cal-d.active { background:var(--accent); color:#fff; font-weight:600; } .dots { display:flex; gap:2.5px; position:absolute; bottom:4px; } .dot { width:4px; height:4px; border-radius:50%; background:var(--accent); }

/* ── 個人、發票、標籤與專案 ── */
.avatar-wrap { position:relative; width:82px; height:82px; border-radius:50%; background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); padding:3px; cursor:pointer; flex-shrink:0; } .avatar { width:100%; height:100%; border-radius:50%; background:#111; border:2px solid #000; display:flex; justify-content:center; align-items:center; font-weight:700; font-size:22px; }
.scroll-tabs { display:flex; gap:8px; overflow-x:auto; padding:0 16px 12px; scrollbar-width:none; align-items:center; } .scroll-tabs::-webkit-scrollbar { display:none; }
.chip { padding:6px 16px; border-radius:20px; background:var(--input-bg); color:var(--muted); font-size:13px; font-weight:500; cursor:pointer; white-space:nowrap; flex-shrink:0; } .chip.active { background:var(--accent); color:#fff; } .chip.pf-chip.active { background:var(--purple); } .chip.sort { background:transparent; border:1px solid var(--border); } .chip.sort.active { background:var(--blue); border-color:var(--blue); }
.tag { display:inline-block; font-size:10px; padding:2px 6px; border-radius:4px; font-weight:600; margin-left:6px; } .tag-inc { background:rgba(50,215,75,0.15); color:var(--green); } .tag-exp { background:rgba(255,69,58,0.15); color:var(--red); } .tag-inv { background:rgba(255,159,10,0.15); color:var(--amber); }
.pbb-track { background:rgba(255,255,255,0.1); border-radius:4px; height:8px; overflow:hidden; margin-bottom:6px; margin-top:10px; } .pbb-fill { height:100%; border-radius:4px; transition:width 0.6s ease; } .pbb-fill.ok { background:var(--green); } .pbb-fill.warn { background:var(--amber); } .pbb-fill.over { background:var(--red); }

/* ── Modal & Action Sheet 通用 ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:5000; align-items:flex-end; opacity:0; transition:0.3s; padding:10px; } .modal-overlay.open { display:flex; opacity:1; }
.modal { background:var(--bg-elevated); border-radius:20px 20px 0 0; padding:20px 20px calc(20px + env(safe-area-inset-bottom)); width:100%; max-height:90vh; overflow-y:auto; transform:translateY(100%); transition:0.3s; display:flex; flex-direction:column; } .modal-overlay.open .modal { transform:translateY(0); } .modal-h { width:36px; height:5px; background:var(--muted); border-radius:3px; margin:0 auto 20px; opacity:0.5; flex-shrink:0;}
.action-sheet { width:100%; max-width:410px; margin:0 auto; transform:translateY(100%); transition:0.3s cubic-bezier(0.4,0,0.2,1); } .modal-overlay.open .action-sheet { transform:translateY(0); }
.as-group { background:var(--bg-modal); backdrop-filter:blur(25px); -webkit-backdrop-filter:blur(25px); border-radius:14px; overflow:hidden; margin-bottom:10px; } .as-item { padding:18px; text-align:center; font-size:18px; color:var(--blue); border-bottom:0.5px solid rgba(255,255,255,0.1); cursor:pointer; } .as-cancel { background:#FFFFFF; color:#000; font-weight:600; border-radius:14px; padding:18px; text-align:center; font-size:18px; cursor:pointer; margin-bottom:calc(env(safe-area-inset-bottom) + 5px); }
.field { margin-bottom:18px; } .field label { font-size:12px; color:var(--muted); display:block; margin-bottom:6px; margin-left:4px; text-transform:uppercase; } .field input,.field select { width:100%; height:48px; padding:0 16px; background:var(--input-bg); border:none; border-radius:10px; color:#fff; font-size:16px; -webkit-appearance:none; }
.t-toggle { display:flex; background:rgba(118,118,128,0.24); border-radius:9px; padding:2px; margin-bottom:25px; height:38px; } .t-btn { flex:1; border:none; background:transparent; color:#fff; font-size:14px; font-weight:600; border-radius:7px; cursor:pointer; transition:0.2s; } .t-btn.active.exp { background:var(--red); } .t-btn.active.inc { background:var(--green); }

/* ── 政府列印格式 ── */
.gov-table-wrapper { background:#fff; color:#000; padding:15px; border-radius:8px; font-family:"標楷體", "MingLiU", serif; overflow-x:auto; } .gov-table { width:100%; border-collapse:collapse; font-size:13px; text-align:center; min-width:400px; } .gov-table th, .gov-table td { border:1px solid #000; padding:8px 4px; } .gov-table th { background:#f2f2f2; font-weight:bold; }
</style>
</head>

<div class="modal-overlay" id="m-add-emp">
  <div class="modal"><div class="modal-h"></div>
    <div class="flex jc-sb mb-2"><button onclick="closeM('m-add-emp')" style="background:none;border:none;color:var(--accent);font-size:17px;">取消</button><b class="fs-17">新增人員</b><button onclick="saveEmp()" style="background:none;border:none;color:var(--accent);font-size:17px;font-weight:700;">完成</button></div>
    <div class="field"><label>姓名</label><input type="text" id="new-e-name" placeholder="輸入姓名"></div><div class="field"><label>身分證</label><input type="text" id="new-e-id" placeholder="報稅使用"></div><div class="field"><label>月薪預算</label><input type="number" id="new-e-salary" placeholder="$0" inputmode="numeric"></div>
  </div>
</div>

<div class="modal-overlay" id="m-add-proj">
  <div class="modal"><div class="modal-h"></div>
    <div class="flex jc-sb mb-2"><button onclick="closeM('m-add-proj')" style="background:none;border:none;color:var(--accent);font-size:17px;">取消</button><b class="fs-17">新增專案</b><button onclick="$('proj-form').requestSubmit()" style="background:none;border:none;color:var(--accent);font-size:17px;font-weight:700;">完成</button></div>
    <form id="proj-form" onsubmit="event.preventDefault();saveProj();">
      <div class="field"><label>專案名稱</label><input type="text" id="new-p-name" placeholder="名稱" required></div>
      <div class="field flex" style="gap:10px;"><div style="flex:1"><label>開始</label><input type="date" id="new-p-start" required></div><div style="flex:1"><label>結束</label><input type="date" id="new-p-end" required></div></div>
      <div class="field"><label>預算</label><input type="number" id="new-p-budget" placeholder="$0" required inputmode="numeric"></div>
    </form>
  </div>
</div>

<div class="modal-overlay" id="m-emp-detail">
  <div class="modal" style="height:90vh;"><div class="modal-h"></div>
    <div class="flex jc-sb ai-c mb-2" style="flex-shrink:0;"><button onclick="closeM('m-emp-detail')" style="background:none;border:none;color:var(--accent);font-size:17px;">關閉</button><b class="fs-17" id="emp-detail-name">明細</b><div style="width:34px;"></div></div>
    <div id="emp-detail-stats" class="flex mb-2" style="gap:10px;flex-shrink:0;"></div>
    <div class="divider-label" style="padding-left:0;">帳目細項</div><div id="emp-detail-list" style="flex:1;overflow-y:auto;"></div>
  </div>
</div>

<div class="modal-overlay" id="m-gov-payroll">
  <div class="modal" style="background:#f2f2f7;"><div class="modal-h" style="background:#c7c7cc;"></div>
    <div class="flex jc-sb mb-2"><h3 style="color:#000;margin:0;">列印預覽</h3><button onclick="closeM('m-gov-payroll')" style="background:var(--accent);color:#fff;border:none;padding:6px 12px;border-radius:8px;font-weight:600;">關閉</button></div>
    <div class="gov-table-wrapper" id="gov-table-container"></div>
  </div>
</div>

<div class="modal-overlay" id="as-picker">
  <div class="action-sheet"><div class="as-group" id="as-list"></div><div class="as-group"><div class="as-item c-grn fw-6" data-ck="addEmp|">➕ 新增人員</div></div><div class="as-cancel" onclick="closeM('as-picker')">取消</div></div>
</div>

<div class="modal-overlay" id="as-c">
  <div class="action-sheet"><div class="as-group"><div class="as-item c-red fw-6" id="as-c-txt" onclick="executeConfirm()">刪除</div></div><div class="as-cancel" onclick="closeM('as-c')">取消</div></div>
</div>

<script>
/* ── 極限瘦身 JS 邏輯 ── */
const $ = id => document.getElementById(id), $$ = s => document.querySelectorAll(s);
const GAS = 'https://script.google.com/macros/s/AKfycbzsCdf4E4p52LOIvRM7n_UMoAcMz05kTAM4zKf72KIzFPzcTi5ShA1xMAOlDoghhKR-/exec';
const LS = localStorage, JStr = JSON.stringify, JPar = JSON.parse;

let emp=JPar(LS.getItem('ye')||'[]'), ldg=JPar(LS.getItem('yl')||'[]');
let projs=JPar(LS.getItem('yp'))||{"水晶(1-2月)":{period:"2026/01-2026/02",budget:433000}};
let charts={}, calY=new Date().getFullYear(), calM=new Date().getMonth();
let selD=new Date().toISOString().split('T')[0], cMe="蘊一創意", cPayM=selD.slice(0,7), cInvM=selD.slice(0,7), cProj=Object.keys(projs)[0]||"";
let pFils=new Set(['all']), iFils=new Set(['inc','exp']), iSort='date', iDesc=true;

const fmtK = n => n>=1000?(n/1000).toFixed(1)+'k':n;
const syncUI = (t, c) => { const s=$('sync-status'); s.textContent=t; s.className=c; };
const closeM = id => $(id).classList.remove('open');
const togDrawer = o => { const d=$('drawer'), v=$('d-overlay'); if(o){v.style.display='block';setTimeout(()=>{v.style.opacity='1';d.classList.add('open')},10);} else {d.classList.remove('open');v.style.opacity='0';setTimeout(()=>v.style.display='none',300);} };
const saveDB = () => { LS.setItem('ye',JStr(emp)); LS.setItem('yl',JStr(ldg)); LS.setItem('yp',JStr(projs)); sync(); fullRender(); };

// 全域事件代理：完美處理長按、點擊、背景關閉
let lpTmr=null, preventClick=false, delTgt=[];
document.addEventListener('pointerdown', e => {
  const t = e.target.closest('.lp'); if(!t) return;
  clearTimeout(lpTmr); preventClick=false;
  lpTmr = setTimeout(()=>{
    preventClick=true; if(navigator.vibrate) navigator.vibrate(50);
    delTgt = t.dataset.lp.split('|'); $('as-c-txt').textContent=delTgt[2]; $('as-c').classList.add('open');
  }, 500);
});
['pointerup','pointercancel','pointerleave','touchmove','contextmenu'].forEach(ev => {
  document.addEventListener(ev, e => { if(ev==='contextmenu' && e.target.closest('.lp')) e.preventDefault(); clearTimeout(lpTmr); });
});
document.addEventListener('click', e => {
  const m = e.target.closest('.modal-overlay'); if(m && e.target===m) closeM(m.id);
  const t = e.target.closest('[data-ck]');
  if(t && !preventClick) {
    const [act, val] = t.dataset.ck.split('|');
    if(act==='emp') openEmpDetail(val);
    if(act==='proj') { cProj=val; renderProject(); }
    if(act==='me') { cMe=val; updateMeUI(); closeM('as-picker'); }
    if(act==='addEmp') { closeM('as-picker'); $('m-add-emp').classList.add('open'); }
  }
});

function executeConfirm() {
  const [type, id] = delTgt;
  if(type==='ldg') ldg.splice(id, 1);
  else if(type==='proj') { ldg.forEach(r=>{if(r.proj===id)r.proj=''}); delete projs[id]; if(cProj===id) cProj=Object.keys(projs)[0]||""; }
  else if(type==='emp') emp.splice(id, 1);
  closeM('as-c'); saveDB();
}

async function loadCloud() {
  render(); syncUI('同步中...','syncing');
  const cb='_cb_'+Date.now(), s=document.createElement('script'); let to=setTimeout(()=>{ syncUI('⚠️ 離線模式','sync-err'); delete window[cb]; s.remove(); }, 15000); 
  window[cb] = d => { clearTimeout(to); if(d){ emp=d.emp||emp; ldg=d.ldg||ldg; saveDB(); syncUI('✅ 已同步','sync-ok'); } s.remove(); delete window[cb]; };
  s.src=`${GAS}?callback=${cb}`; document.head.appendChild(s);
}

function fullRender() { render(); if($('s-payroll').classList.contains('active')) renderPayroll(); if($('s-invoice').classList.contains('active')) renderInvoice(); if($('s-project').classList.contains('active')) renderProject(); const s=$$('#s-search input')[0]; if($('s-search').classList.contains('active')&&s&&s.value) handleSearch(s.value); }
const go = (p, el) => { $$('.screen, .nav-item').forEach(e=>e.classList.remove('active')); $(`s-${p}`).classList.add('active'); if(el) el.classList.add('active'); document.body.classList.toggle('nav-active', p==='home'||p==='cal'); if(p==='me'){ updateMeUI(); $('as-list').innerHTML=`<div class="as-item" data-ck="me|蘊一創意">蘊一創意</div>`+emp.map(e=>`<div class="as-item" data-ck="me|${e.name}">${e.name}</div>`).join(''); } if(p==='payroll') renderPayroll(); if(p==='invoice') renderInvoice(); if(p==='project') renderProject(); render(); };
const shiftMonth = d => { calM+=d; if(calM>11){calM=0;calY++;}else if(calM<0){calM=11;calY--;} render(); };
const pickMonth = v => { if(!v) return; const [y,m]=v.split('-'); calY=parseInt(y); calM=parseInt(m)-1; render(); };
const resetAndGoMe = el => { cMe="蘊一創意"; go('me', el); };

function updateMeUI() {
  const d = cMe==="蘊一創意"; let fl = d ? ldg : ldg.filter(r=>r.mem===cMe);
  let inc=fl.filter(r=>r.type==='income').reduce((s,i)=>s+i.amt,0), exp=fl.filter(r=>r.type==='expense').reduce((s,i)=>s+i.amt,0);
  $('stat-count').textContent=fl.length; $('stat-inc').textContent=fmtK(inc); $('stat-exp').textContent=fmtK(exp);
  $('me-avatar-txt').textContent=d?"蘊":cMe.charAt(0); $('me-name').textContent=cMe;
  $('me-desc').innerHTML=d?"":(emp.find(x=>x.name===cMe)?`團隊成員\n預算：$${(emp.find(x=>x.name===cMe).salary||0).toLocaleString()}`:"");
}

function render() {
  const mS=`${calY}-${String(calM+1).padStart(2,'0')}`; $('hdr-m').textContent=`${calY}年 ${calM+1}月`;
  let inc=0, exp=0, dots={}; ldg.filter(r=>r.date.startsWith(mS)).forEach(r=>{ r.type==='income'?inc+=r.amt:exp+=r.amt; dots[r.date]=true; });
  $('val-p').textContent=`$${(inc-exp).toLocaleString()}`;
  if(charts.m) charts.m.destroy(); charts.m = new Chart($('c-main'),{type:'doughnut',data:{datasets:[{data:[exp,inc||1],backgroundColor:['#FF453A','#32D74B'],borderWidth:0}]},options:{cutout:'85%',responsive:true,maintainAspectRatio:false}});
  const dInM=new Date(calY,calM+1,0).getDate(), fDay=new Date(calY,calM,1).getDay();
  let calH='<div class="cal-grid">'+'日一二三四五六'.split('').map(w=>`<div class="cal-h">${w}</div>`).join('')+'<div class="cal-c"></div>'.repeat(fDay);
  for(let d=1;d<=dInM;d++){ const dS=`${mS}-${String(d).padStart(2,'0')}`; calH+=`<div class="cal-c"><div class="cal-d ${dS===selD?'active':''}" onclick="selD='${dS}';render();">${d}${dots[dS]?'<div class="dots"><div class="dot"></div></div>':''}</div></div>`; }
  $('cal-grid').innerHTML=calH+'</div>'; $('cal-title').textContent=selD;
  
  const gAmt = r => `<b class="${r.type==='income'?'c-grn':'c-wht'}">${r.type==='income'?'+':'-'}$${r.amt.toLocaleString()}</b>`;
  $('cal-list').innerHTML=ldg.map((r,i)=>({...r,_o:i})).filter(r=>r.date===selD).map(r=>`<div class="list-row lp" data-lp="ldg|${r._o}|刪除此筆"><div>${r.cat} <small class="c-mut">${r.mem}</small></div>${gAmt(r)}</div>`).join('')||'<div class="empty">本日無紀錄</div>';
  $('ldg-list').innerHTML=ldg.map((r,i)=>`<div class="list-row lp" data-lp="ldg|${i}|刪除此筆"><div>${r.cat}<br><small class="c-mut">${r.date} · ${r.mem} ${r.proj?`[${r.proj}]`:''}</small></div>${gAmt(r)}</div>`).join('');
  $('emp-list').innerHTML=emp.map((e,i)=>`<div class="list-row lp" data-lp="emp|${i}|刪除此人員" data-ck="emp|${i}"><div>${e.name}<br><small class="c-mut">${e.idNo||'未填寫'}</small></div><div class="t-r"><small>$${(e.salary||0).toLocaleString()}</small><br><small class="c-acc fs-11">查看明細 ></small></div></div>`).join('');
}

const saveEmp = () => { const n=$('new-e-name').value.trim(); if(!n) return alert('輸入名稱'); emp.push({name:n, idNo:$('new-e-id').value.trim(), salary:Number($('new-e-salary').value)||0}); $('new-e-name').value=''; $('new-e-id').value=''; $('new-e-salary').value=''; closeM('m-add-emp'); saveDB(); };
const prepLdg = () => { $('ldg-form').reset(); setT('expense'); $('l-d').value=selD; $('l-m').innerHTML='<option value="公司">公司帳戶</option>'+emp.map(e=>`<option value="${e.name}">${e.name}</option>`).join(''); $('l-proj').innerHTML='<option value="">無</option>'+Object.keys(projs).map(p=>`<option value="${p}">${p}</option>`).join(''); $('m-ldg').classList.add('open'); };
function setT(t){ $('l-t').value=t; $('tb-exp').className=`t-btn ${t==='expense'?'active exp':''}`; $('tb-inc').className=`t-btn ${t==='income'?'active inc':''}`; }
async function sync(){ try{ await fetch(GAS,{method:'POST',mode:'no-cors',body:JStr({emp,ldg})}); }catch(e){} }
function saveLdg(){ ldg.unshift({date:$('l-d').value, type:$('l-t').value, amt:Number($('l-a').value), cat:$('l-c').value, mem:$('l-m').value, proj:$('l-proj').value, inv:$('l-inv').value, vt:$('l-vt').value}); closeM('m-ldg'); saveDB(); }
function handleSearch(v){ if(!v) return $('search-list').innerHTML=''; $('search-list').innerHTML=ldg.map((r,i)=>({...r,_o:i})).filter(r=>r.cat.includes(v)||r.mem.includes(v)).map(r=>`<div class="list-row lp" data-lp="ldg|${r._o}|刪除此筆"><div>${r.cat}<br><small class="c-mut">${r.date}</small></div><b class="${r.type==='income'?'c-grn':'c-wht'}">$${r.amt.toLocaleString()}</b></div>`).join(''); }

function openEmpDetail(i) {
  const p = emp[i], pl = ldg.filter(r => r.mem === p.name); let inc=0, exp=0; pl.forEach(r => r.type==='income'?inc+=r.amt:exp+=r.amt); $('emp-detail-name').textContent = p.name;
  $('emp-detail-stats').innerHTML = `<div class="t-c" style="flex:1;background:var(--input-bg);padding:10px;border-radius:10px;"><div class="fs-11 c-mut">身分證</div><div class="fs-14 fw-5 mt-1">${p.idNo||'-'}</div></div><div class="t-c" style="flex:1;background:var(--input-bg);padding:10px;border-radius:10px;"><div class="fs-11 c-mut">月薪</div><div class="fs-14 fw-5 mt-1">$${(p.salary||0).toLocaleString()}</div></div><div class="t-c" style="flex:1;background:var(--input-bg);padding:10px;border-radius:10px;"><div class="fs-11 c-mut">經手</div><div class="fs-13 fw-6 mt-1"><span class="c-grn">+${fmtK(inc)}</span> / <span class="c-red">-${fmtK(exp)}</span></div></div>`;
  $('emp-detail-list').innerHTML = pl.map(r => `<div class="list-row"><div>${r.cat}<br><small class="c-mut">${r.date} ${r.proj?`[${r.proj}]`:''}</small></div><b class="${r.type==='income'?'c-grn':'c-wht'}">${r.type==='income'?'+':'-'}$${r.amt.toLocaleString()}</b></div>`).join('') || '<div class="empty">無紀錄</div>'; $('m-emp-detail').classList.add('open');
}

function saveProj() { const n=$('new-p-name').value.trim(), s=$('new-p-start').value, e=$('new-p-end').value, b=Number($('new-p-budget').value)||0; if(!n) return alert('輸入名稱'); projs[n]={period:`${s.replace(/-/g,'/')} - ${e.replace(/-/g,'/')}`,budget:b,sections:[]}; cProj=n; $('proj-form').reset(); closeM('m-add-proj'); saveDB(); }
function togProjF(f) { if(f==='all'){pFils.clear();pFils.add('all');}else{pFils.delete('all'); pFils.has(f)?pFils.delete(f):pFils.add(f); if(pFils.size===0)pFils.add('all');} $$('#proj-filters .chip').forEach(e=>e.classList.toggle('active',pFils.has(e.innerText)||(e.id==='pf-all'&&pFils.has('all')))); renderProject(); }

function renderProject() {
  const pKs = Object.keys(projs); if(pKs.length && !pKs.includes(cProj)) cProj = pKs[0];
  $('proj-tabs').innerHTML = pKs.map(p => `<div class="chip ${p===cProj?'active':''} lp" data-ck="proj|${p.replace(/'/g,"\\'")}" data-lp="proj|${p.replace(/'/g,"\\'")}|刪除此專案">📦 ${p}</div>`).join('');
  if(!cProj) return $('proj-budget-section').innerHTML='', $('proj-list').innerHTML='<div class="empty">無專案</div>';
  const pj=projs[cProj]; let rl=ldg.map((r,i)=>({...r,_o:i})).filter(r=>r.proj===cProj), ta=rl.filter(r=>r.type==='expense').reduce((s,i)=>s+i.amt,0), rm=pj.budget-ta, pt=pj.budget>0?Math.min(100,Math.round(ta/pj.budget*100)):100;
  $('proj-budget-section').innerHTML = `<div class="card p-2"><div class="flex jc-sb"><span class="fs-13 c-mut">📅 ${pj.period}</span><span class="fs-13 fw-6 c-pur">預算 $${pj.budget.toLocaleString()}</span></div><div class="pbb-track"><div class="pbb-fill ${pt>100?'over':pt>80?'warn':'ok'}" style="width:${pt}%"></div></div><div class="flex jc-sb fs-13"><span class="c-mut">支出 $${ta.toLocaleString()}</span><span class="fw-6">剩餘 <span class="${rm>=0?'c-grn':'c-red'}">$${rm.toLocaleString()}</span></span></div></div>`;
  $('proj-list').innerHTML = rl.length ? `<div class="divider-label">實際項目</div>`+rl.map(i => `<div class="list-row lp" data-lp="ldg|${i._o}|刪除此筆"><div><div class="fs-15 fw-5 ${i.type==='income'?'c-grn':''}">${i.cat}</div><div class="fs-12 c-mut mt-1">📅 ${i.date} 👤 ${i.mem} ${i.vt!=='無憑證'?`<span class="tag tag-inv">發票</span>`:''}</div></div><div class="fs-15 fw-6 ${i.type==='income'?'c-grn':''}">${i.type==='income'?'+':'-'}$${i.amt.toLocaleString()}</div></div>`).join('') : '<div class="empty">無紀錄</div>';
}

function togInvF(t) { iFils.has(t)?iFils.delete(t):iFils.add(t); $(`f-${t}`).classList.toggle('active',iFils.has(t)); renderInvoice(); }
function setInvS(t) { if(iSort===t)iDesc=!iDesc; else{iSort=t;iDesc=true;} $('s-date').innerText='按日期 '+(iSort==='date'?(iDesc?'↓':'↑'):''); $('s-inv').innerText='按序號 '+(iSort==='inv'?(iDesc?'↓':'↑'):''); $('s-date').classList.toggle('active',iSort==='date'); $('s-inv').classList.toggle('active',iSort==='inv'); renderInvoice(); }
function renderInvoice() {
  $('inv-month-picker').value=cInvM; let dm = ldg.map((r,i)=>({...r,_o:i})).filter(r=>r.date.startsWith(cInvM)&&r.vt&&r.vt!=='無憑證');
  let ti=0,to=0; dm.forEach(r=>r.type==='income'?ti+=r.amt:to+=r.amt); let tx=Math.max(0,Math.round((ti-to)*0.05)), gp=ti-to;
  $('inv-summary-grid').innerHTML = `<div class="card p-2"><div class="fs-12 c-mut">📥 銷項(含稅)</div><div class="fs-20 fw-7 c-grn mt-1">$${ti.toLocaleString()}</div></div><div class="card p-2"><div class="fs-12 c-mut">📤 進項(含稅)</div><div class="fs-20 fw-7 c-red mt-1">$${to.toLocaleString()}</div></div><div class="card p-2"><div class="fs-12 c-mut">🏦 預估稅額</div><div class="fs-20 fw-7 c-amb mt-1">$${tx.toLocaleString()}</div></div><div class="card p-2"><div class="fs-12 c-mut">💰 毛利</div><div class="fs-20 fw-7 c-acc mt-1">$${gp.toLocaleString()}</div></div>`;
  let dl = dm.filter(r=>(r.type==='income'&&iFils.has('inc'))||(r.type==='expense'&&iFils.has('exp'))).sort((a,b)=>iSort==='date'?(iDesc?b.date.localeCompare(a.date):a.date.localeCompare(b.date)):(iDesc?(b.inv||'').localeCompare(a.inv||''):(a.inv||'').localeCompare(b.inv||'')));
  $('inv-content').innerHTML = dl.map(i=>`<div class="list-row lp" data-lp="ldg|${i._o}|刪除憑證"><div style="flex:1;min-width:0;"><div class="fs-15 fw-5" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${i.cat}</div><div class="fs-12 c-mut mt-1">${i.date} · ${i.vt} ${i.inv?`<span class="c-wht">[${i.inv}]</span>`:''}<span class="tag ${i.type==='income'?'tag-inc':'tag-exp'}">${i.type==='income'?'銷項':'進項'}</span></div></div><div class="fs-15 fw-6 ${i.type==='income'?'c-grn':'c-red'}">${i.type==='income'?'+':'-'}$${i.amt.toLocaleString()}</div></div>`).join('') || '<div class="empty">無憑證</div>';
}

function renderPayroll() {
  $('pay-month-picker').value=cPayM; const [y,m]=cPayM.split('-'); let pd=[], tp=0;
  emp.forEach(e => { let ea=ldg.filter(r=>r.mem===e.name&&r.type==='expense'&&r.date.startsWith(cPayM)).reduce((s,i)=>s+i.amt,0); if(ea>0||e.salary>0){ let tt=ea>0?ea:e.salary; pd.push({n:e.name,id:e.idNo,b:e.salary||0,t:tt}); tp+=tt; } });
  $('payroll-summary-card').innerHTML = `<div class="fs-12 c-mut mb-1">${y}年${m}月 給付總額</div><div class="fs-28 fw-7 c-acc">$${tp.toLocaleString()}</div><div class="mt-2"><div class="fs-11 c-mut">計薪</div><div class="fs-15 fw-6">${pd.length}人</div></div>`;
  $('payroll-list').innerHTML = pd.map(e=>`<div class="card p-2"><div class="flex jc-sb mb-2"><div><div class="fs-17 fw-6">${e.n}</div><div class="fs-12 c-mut">${e.id||'未設身分證'}</div></div><div class="fs-20 fw-7 c-grn">$${e.t.toLocaleString()}</div></div><div style="border-top:0.5px solid var(--border);padding-top:10px;"><div class="flex jc-sb fs-14 mb-1"><span class="c-mut">設定月薪</span><span>$${e.b.toLocaleString()}</span></div><div class="flex jc-sb fs-14"><span class="c-mut">帳目領取</span><span class="c-grn">$${e.t.toLocaleString()}</span></div></div></div>`).join('') || '<div class="empty">無紀錄</div>';
}

function buildGovTable() {
  const [y,m]=cPayM.split('-'); let tt=0;
  let tBody = emp.map((e,i) => { let a=ldg.filter(r=>r.mem===e.name&&r.type==='expense'&&r.date.startsWith(cPayM)).reduce((s,r)=>s+r.amt,0)||e.salary||0; if(a>0){tt+=a; return `<tr><td>${i+1}</td><td>${e.name}</td><td>${e.idNo||''}</td><td>${a.toLocaleString()}</td><td>0</td><td>${a.toLocaleString()}</td><td></td></tr>`; } return ''; }).join('');
  $('gov-table-container').innerHTML = `<div class="t-c fs-17 fw-7 mb-2">蘊一創意有限公司 員工薪資印領清冊</div><div class="t-r fs-13 fw-6 mb-1">中華民國 ${parseInt(y)-1911} 年 ${m} 月</div><table class="gov-table"><thead><tr><th width="10%">編號</th><th width="15%">姓名</th><th width="20%">身分證</th><th width="15%">給付總額</th><th width="15%">代扣稅</th><th width="15%">實領</th><th width="10%">簽收</th></tr></thead><tbody>${tBody}<tr style="background:#f9f9f9" class="fw-7"><td colspan="3" class="t-r">合計</td><td>${tt.toLocaleString()}</td><td>0</td><td>${tt.toLocaleString()}</td><td></td></tr></tbody></table><div class="flex jc-sb mt-2 fs-14 fw-7"><span>負責人：林柏衡</span><span>會計：侯淑芬</span><span>製表：______</span></div>`;
}

window.onload = () => { if(!ldg.length&&!emp.length) emp.push({name:"林柏衡",idNo:"A123456789",salary:37100}); loadCloud(); setTimeout(()=>$('splash-screen').style.opacity='0',1200); };
</script>
