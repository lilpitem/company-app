<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="蘊一財務">
<meta name="theme-color" content="#1a1a2e">
<title>Yun Yi Finance v2.6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg: #0f0f1a; --bg2: #1a1a2e; --bg3: #16213e; --card: #1e1e35;
  --accent: #7c6af7; --accent2: #a78bfa; --green: #34d399; --red: #f87171;
  --amber: #fbbf24; --text: #f0f0ff; --muted: #8888aa;
  --border: rgba(124,106,247,0.2); --radius: 16px; --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 430px; margin: 0 auto; overflow-x: hidden; }
.screen { display: none; min-height: 100vh; padding-bottom: 90px; }
.screen.active { display: block; }

/* Header & Navigation */
.header { padding: 56px 20px 20px; background: linear-gradient(180deg, var(--bg2) 0%, transparent 100%); }
.header-top { display: flex; justify-content: space-between; align-items: flex-start; }
.dropdown-title { position: relative; display: inline-flex; align-items: center; gap: 6px; font-size: 18px; padding: 4px 8px; margin-left: -8px; border-radius: 8px; transition: background 0.2s; overflow: hidden; }
.dropdown-title:active { background: rgba(255,255,255,0.05); }
.dropdown-title .muted { color: var(--muted); font-weight: 400; }
.dropdown-title .active-text { color: var(--text); font-weight: 700; }
.dropdown-title .chevron { color: var(--muted); font-size: 12px; margin-top: 2px; }
.native-date-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--bg2); border-top: 0.5px solid var(--border); display: flex; z-index: 100; padding: 8px 0 calc(20px + env(safe-area-inset-bottom)); }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
.nav-icon { font-size: 20px; color: var(--muted); }
.nav-label { font-size: 10px; color: var(--muted); }
.nav-item.active .nav-icon, .nav-item.active .nav-label { color: var(--accent2); }

/* Components */
.card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin: 0 16px 12px; }
.card-title { font-size: 12px; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; display: flex; justify-content: space-between; }

.list-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 0.5px solid rgba(255,255,255,0.05); }
.row-left { display: flex; align-items: center; gap: 10px; overflow: hidden; }
.row-info { overflow: hidden; }
.row-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-sub { font-size: 11px; color: var(--muted); }
.tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.05); color: var(--muted); margin-right: 4px; }

/* 長按互動樣式 */
.pressable-row {
  -webkit-touch-callout: none; /* 禁用系統選單 */
  -webkit-user-select: none;   /* 禁用文字選取 */
  user-select: none;
  transition: background 0.2s, transform 0.1s;
  border-radius: 8px;
  padding: 12px 8px; /* 增加一點點擊範圍 */
  margin: 0 -8px;
}
.pressable-row:active { background: rgba(255,255,255,0.05); transform: scale(0.98); }

/* Buttons & Inputs */
.icon-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--card); border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; }
.btn-add { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; background: rgba(124,106,247,0.1); border: 1px dashed var(--accent); border-radius: var(--radius-sm); color: var(--accent2); cursor: pointer; font-size: 14px; margin-top: 10px; }
.field { margin-bottom: 12px; }
.field label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; }
.field input, .field select { width: 100%; padding: 12px 10px; background: rgba(255,255,255,0.05); border: 0.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 15px; outline: none; -webkit-appearance: none; }
.btn-primary { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.1s, background 0.2s; }
.btn-primary:active { transform: scale(0.97); background: var(--accent2); }

/* Modals */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: flex-end; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg2); border-radius: 24px 24px 0 0; padding: 24px 20px calc(40px + env(safe-area-inset-bottom)); width: 100%; max-height: 85vh; overflow-y: auto; }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 15px; }

.empty { text-align: center; padding: 30px; color: var(--muted); font-size: 13px; }

/* Doughnut Chart */
.chart-center-text { position: absolute; text-align: center; pointer-events: none; }
.chart-center-text .label { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
.chart-center-text .value { font-size: 22px; font-weight: 700; color: var(--green); letter-spacing: -0.5px; }
.doughnut-legend { display: flex; justify-content: space-around; margin-top: 20px; text-align: center; padding-top: 16px; border-top: 0.5px solid var(--border); }
.doughnut-legend .ml { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.doughnut-legend .mv { font-size: 16px; font-weight: 700; }
</style>
</head>
<body>

<div class="screen active" id="s-home">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="dropdown-title">
          <span class="muted">蘊一財務 /</span>
          <span class="active-text" id="disp-date">2026年 05月</span>
          <span class="chevron">▼</span>
          <input type="month" id="native-month-picker" class="native-date-input" onchange="handleNativeDateChange(this)">
        </div>
      </div>
      <div class="icon-btn" onclick="openModal('modal-ledger')">＋</div>
    </div>
  </div>
  
  <div class="card" style="padding-top: 20px;">
    <div class="card-title">本月財務概覽</div>
    <div style="position: relative; height: 200px; display: flex; justify-content: center; align-items: center;">
      <canvas id="metricsChart"></canvas>
      <div class="chart-center-text">
        <div class="label">本月收入</div>
        <div class="value" id="m-income">$0</div>
      </div>
    </div>
    <div class="doughnut-legend">
      <div><div class="ml">本月支出</div><div class="mv" style="color:var(--red)" id="m-expense">$0</div></div>
      <div><div class="ml">薪資預算</div><div class="mv" style="color:var(--amber)" id="m-salary">$0</div></div>
      <div><div class="ml">專案淨利</div><div class="mv" style="color:var(--accent2)" id="m-profit">$0</div></div>
    </div>
  </div>

  <div class="card" style="padding-top: 20px;">
    <div class="card-title">近半年收支趨勢</div>
    <div style="height: 160px;"><canvas id="trendChart"></canvas></div>
  </div>
  
  <div class="card">
    <div class="card-title">專案盈虧概覽</div>
    <div id="project-summary"></div>
  </div>
</div>

<div class="screen" id="s-salary">
  <div class="header">
    <div class="header-top">
      <div class="dropdown-title"><span class="active-text">薪資清冊</span></div>
    </div>
    <div id="emp-count" class="row-sub" style="margin-left:8px; margin-top:4px;"></div>
  </div>
  <div class="card">
    <div class="card-title">員工名單</div>
    <div id="emp-list"></div>
    <div class="btn-add" onclick="prepareAddEmployee()">＋ 新增員工 / 兼職</div>
  </div>
</div>

<div class="screen" id="s-ledger">
  <div class="header">
    <div class="header-top">
      <div class="dropdown-title">
        <span class="muted">收支帳本 /</span>
        <span class="active-text" id="disp-date-ledger">2026年 05月</span>
        <span class="chevron">▼</span>
        <input type="month" id="native-month-picker-ledger" class="native-date-input" onchange="handleNativeDateChange(this)">
      </div>
      <div class="icon-btn" onclick="exportCSV()">💾</div>
    </div>
    <div style="font-size: 11px; color: var(--muted); margin-top: 8px; margin-left: 8px;">💡 提示：長按紀錄可進行刪除</div>
  </div>
  <div class="card">
    <div id="ledger-list"></div>
    <div class="btn-add" onclick="openModal('modal-ledger')">＋ 新增帳目</div>
  </div>
</div>

<nav class="bottom-nav">
  <div class="nav-item active" onclick="goTo('home',this)"><div class="nav-icon">📊</div><div class="nav-label">總覽</div></div>
  <div class="nav-item" onclick="goTo('salary',this)"><div class="nav-icon">👥</div><div class="nav-label">薪資</div></div>
  <div class="nav-item" onclick="goTo('ledger',this)"><div class="nav-icon">📒</div><div class="nav-label">帳本</div></div>
</nav>

<div class="modal-overlay" id="modal-delete" onclick="closeModal(event,'modal-delete')">
  <div class="modal" style="text-align: center;">
    <div class="modal-handle"></div>
    <div class="modal-title" style="margin-bottom:10px; font-weight:700;">刪除這筆紀錄</div>
    <p style="color:var(--muted); font-size:14px; margin-bottom:24px;">確定要刪除這筆帳目嗎？此動作無法復原。</p>
    <div style="display: flex; gap: 12px;">
      <button class="btn-primary" style="flex:1; background:rgba(255,255,255,0.08); color:var(--text);" onclick="closeModalById('modal-delete')">取消</button>
      <button class="btn-primary" style="flex:1; background:var(--red);" onclick="confirmDeleteLedger()">刪除</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-ledger" onclick="closeModal(event,'modal-ledger')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" style="margin-bottom:15px; font-weight:700;">新增帳目</div>
    <form onsubmit="event.preventDefault(); addLedger();">
      <div class="field"><label>日期</label><input type="date" id="l-date" required></div>
      <div class="field"><label>項目名稱</label><input type="text" id="l-name" placeholder="例如：DV茶會場地費" required></div>
      <div class="field"><label>金額</label><input type="number" id="l-amt" placeholder="0" required inputmode="numeric"></div>
      <div class="field"><label>分類 (科目)</label>
        <select id="l-cat">
          <option value="營業收入">營業收入</option>
          <option value="進貨成本">進貨成本</option>
          <option value="行銷費用">行銷費用</option>
          <option value="人事費用">人事費用</option>
          <option value="雜支">雜支</option>
        </select>
      </div>
      <div class="field"><label>歸屬專案</label>
        <select id="l-proj">
          <option value="一般常規">一般常規</option>
          <option value="DV門店-香包">DV門店-香包</option>
          <option value="DV門店-蠟燭">DV門店-蠟燭</option>
          <option value="DV門店-水晶">DV門店-水晶</option>
          <option value="DV門店-cocodor">DV門店-cocodor</option>
        </select>
      </div>
      <div class="field"><label>支付/收款方式</label>
        <select id="l-pay">
          <option value="公司轉帳">公司轉帳</option>
          <option value="現金">現金</option>
          <option value="個人代墊">個人代墊</option>
        </select>
      </div>
      <button type="submit" class="btn-primary">儲存紀錄</button>
    </form>
  </div>
</div>

<div class="modal-overlay" id="modal-emp" onclick="closeModal(event,'modal-emp')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="emp-modal-title" style="margin-bottom:15px; font-weight:700;">新增人員</div>
    
    <form onsubmit="event.preventDefault(); saveEmployee();">
      <input type="hidden" id="emp-edit-id">
      <div class="field"><label>姓名</label><input type="text" id="e-name" required></div>
      <div class="field"><label>職稱</label><input type="text" id="e-role" required></div>
      <div class="field"><label>底薪 / 基本薪資</label><input type="number" id="e-salary" required inputmode="numeric"></div>
      <div class="field"><label>本月獎金 / 代墊回補</label><input type="number" id="e-bonus" value="0" inputmode="numeric"></div>
      <button type="submit" class="btn-primary">儲存資料</button>
      <button type="button" style="width:100%; margin-top:10px; background:transparent; color:var(--red); border:none; font-size:14px; padding:10px;" onclick="deleteEmployee()">刪除人員</button>
    </form>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const fmt = n => '$' + Math.round(n).toLocaleString();

let employees = JSON.parse(localStorage.getItem('yunyi_emp') || '[]');
let ledger = JSON.parse(localStorage.getItem('yunyi_ledger') || '[]');
let trendChart = null;
let metricsChart = null;

// 長按刪除機制變數
let pressTimer;
let targetDeleteIndex = -1;

// 日期狀態管理
const now = new Date();
let currentYear = now.getFullYear();
let currentMonth = now.getMonth() + 1;

$('l-date').value = now.toISOString().slice(0,10);

function getCurrentMonthStr() {
  return `${currentYear}-${currentMonth.toString().padStart(2, '0')}`;
}

function updateDateUI() {
  const dateText = `${currentYear}年 ${currentMonth.toString().padStart(2, '0')}月`;
  $('disp-date').textContent = dateText;
  if($('disp-date-ledger')) $('disp-date-ledger').textContent = dateText;
  
  const val = getCurrentMonthStr();
  $('native-month-picker').value = val;
  if($('native-month-picker-ledger')) $('native-month-picker-ledger').value = val;
  
  renderAll();
}

function handleNativeDateChange(input) {
  if (!input.value) return;
  const parts = input.value.split('-');
  currentYear = parseInt(parts[0], 10);
  currentMonth = parseInt(parts[1], 10);
  updateDateUI();
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  else if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  updateDateUI();
}

function save() {
  try {
    localStorage.setItem('yunyi_emp', JSON.stringify(employees));
    localStorage.setItem('yunyi_ledger', JSON.stringify(ledger));
  } catch (error) {
    alert('儲存失敗！可能是因為您使用了「無痕模式」或手機容量已滿。');
  }
}

function goTo(page, el) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  $('s-' + page).classList.add('active');
  el.classList.add('active');
  renderAll();
}

function openModal(id) { $(id).classList.add('open'); }
function closeModal(e, id) { if(e.target === $(id)) $(id).classList.remove('open'); }
function closeModalById(id) { $(id).classList.remove('open'); }

// 左右滑動切換月份 (Swipe Left / Right)
let touchstartX = 0, touchstartY = 0, touchendX = 0, touchendY = 0;
document.addEventListener('touchstart', e => {
  if(e.target.closest('.modal-overlay') || e.target.closest('.card')) return; 
  touchstartX = e.changedTouches[0].screenX;
  touchstartY = e.changedTouches[0].screenY;
}, { passive: true });

document.addEventListener('touchend', e => {
  if(e.target.closest('.modal-overlay') || e.target.closest('.card')) return;
  touchendX = e.changedTouches[0].screenX;
  touchendY = e.changedTouches[0].screenY;
  
  let xDiff = touchstartX - touchendX;
  let yDiff = touchstartY - touchendY;
  
  if(Math.abs(xDiff) > Math.abs(yDiff) && Math.abs(xDiff) > 60) {
    if(xDiff > 0) changeMonth(1); 
    else changeMonth(-1); 
  }
}, { passive: true });


// ==== 長按刪除核心邏輯 ====
function startPress(e, idx) {
  targetDeleteIndex = idx;
  pressTimer = setTimeout(() => {
    // 觸發短暫震動 (Android支援)
    if(navigator.vibrate) navigator.vibrate(50);
    openModal('modal-delete');
  }, 600); // 600毫秒
}

function cancelPress() {
  clearTimeout(pressTimer);
}

function confirmDeleteLedger() {
  if(targetDeleteIndex !== -1) {
    ledger.splice(targetDeleteIndex, 1);
    save();
    renderAll();
  }
  closeModalById('modal-delete');
}
// ==========================

function renderEmployees() {
  const el = $('emp-list');
  $('emp-count').textContent = `目前共 ${employees.length} 位人員`;
  if(!employees.length) { el.innerHTML = '<div class="empty">尚未建立人員資料</div>'; return; }
  el.innerHTML = employees.map((e, i) => `
    <div class="list-row pressable-row" onclick="editEmployee(${i})">
      <div class="row-left">
        <div class="row-info">
          <div class="row-name">${e.name}</div>
          <div class="row-sub">${e.role} · 底薪 ${fmt(e.salary)}</div>
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-weight:700; color:var(--accent2)">${fmt(parseInt(e.salary) + parseInt(e.bonus))}</div>
        <div class="row-sub">含獎金代墊</div>
      </div>
    </div>
  `).join('');
}

function prepareAddEmployee() {
  $('emp-modal-title').textContent = '新增人員';
  $('emp-edit-id').value = '';
  $('e-name').value = ''; $('e-role').value = ''; $('e-salary').value = ''; $('e-bonus').value = 0;
  openModal('modal-emp');
}

function editEmployee(i) {
  const e = employees[i];
  $('emp-modal-title').textContent = '編輯人員資料';
  $('emp-edit-id').value = i;
  $('e-name').value = e.name; $('e-role').value = e.role; $('e-salary').value = e.salary; $('e-bonus').value = e.bonus;
  openModal('modal-emp');
}

function saveEmployee() {
  const name=$('e-name').value, role=$('e-role').value, salary=$('e-salary').value, bonus=$('e-bonus').value;
  if(!name || !salary) return;
  const id = $('emp-edit-id').value;
  const data = { name, role, salary: parseInt(salary), bonus: parseInt(bonus)||0 };
  if(id !== '') employees[id] = data; else employees.push(data);
  save(); renderAll(); closeModalById('modal-emp');
  if(document.activeElement) document.activeElement.blur();
}

function deleteEmployee() {
  if(!confirm('確定刪除？')) return;
  employees.splice($('emp-edit-id').value, 1);
  save(); renderAll(); closeModalById('modal-emp');
}

function addLedger() {
  const date=$('l-date').value, name=$('l-name').value, amt=$('l-amt').value, cat=$('l-cat').value, proj=$('l-proj').value, pay=$('l-pay').value;
  if(!name || !amt) return;
  ledger.unshift({ date, name, amt: parseInt(amt), cat, proj, pay });
  save(); renderAll(); closeModalById('modal-ledger');
  $('l-name').value = ''; $('l-amt').value = '';
  if(document.activeElement) document.activeElement.blur();
}

function renderLedger() {
  const selMonth = getCurrentMonthStr();
  const el = $('ledger-list');
  
  // 建立包含原始 index 的陣列，確保刪除時不會刪錯筆
  const renderedItems = [];
  ledger.forEach((r, idx) => {
    if(r.date.startsWith(selMonth)) {
      renderedItems.push({ ...r, originalIndex: idx });
    }
  });

  if(!renderedItems.length) { el.innerHTML = '<div class="empty">本月尚無帳目紀錄</div>'; return; }
  
  el.innerHTML = renderedItems.map(r => `
    <div class="list-row pressable-row"
         ontouchstart="startPress(event, ${r.originalIndex})" 
         ontouchend="cancelPress()" 
         ontouchmove="cancelPress()"
         onmousedown="startPress(event, ${r.originalIndex})"
         onmouseup="cancelPress()"
         onmouseleave="cancelPress()"
         oncontextmenu="return false;">
      <div class="row-left">
        <div style="width:4px; height:24px; background:${r.cat==='營業收入'?'var(--green)':'var(--red)'}; border-radius:2px;"></div>
        <div class="row-info">
          <div class="row-name">${r.name}</div>
          <div class="row-sub"><span class="tag">${r.proj}</span>${r.date} · ${r.pay}</div>
        </div>
      </div>
      <div style="font-weight:700; color:${r.cat==='營業收入'?'var(--green)':'var(--red)'}">
        ${r.cat==='營業收入'?'+':'-'}${fmt(r.amt)}
      </div>
    </div>
  `).join('');
}

function renderDashboard() {
  const selMonth = getCurrentMonthStr();
  const filtered = ledger.filter(r => r.date.startsWith(selMonth));
  
  const income = filtered.filter(r => r.cat === '營業收入').reduce((s, r) => s + r.amt, 0);
  const expense = filtered.filter(r => r.cat !== '營業收入').reduce((s, r) => s + r.amt, 0);
  const salTotal = employees.reduce((s, e) => s + e.salary + e.bonus, 0);
  const profit = income - expense - salTotal;
  
  $('m-income').textContent = fmt(income);
  $('m-expense').textContent = fmt(expense);
  $('m-salary').textContent = fmt(salTotal);
  $('m-profit').textContent = fmt(profit);
  $('m-profit').style.color = profit >= 0 ? 'var(--accent2)' : 'var(--red)';

  const ctx = $('metricsChart').getContext('2d');
  if (metricsChart) metricsChart.destroy();
  metricsChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['本月支出', '薪資預算', '專案淨利'],
      datasets: [{
        data: [expense, salTotal, Math.max(0, profit)], 
        backgroundColor: ['#f87171', '#fbbf24', '#a78bfa'],
        borderWidth: 0,
        hoverOffset: 4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '75%',
      plugins: { legend: { display: false } }
    }
  });

  const projs = {};
  filtered.forEach(r => {
    if(!projs[r.proj]) projs[r.proj] = 0;
    projs[r.proj] += (r.cat === '營業收入' ? r.amt : -r.amt);
  });
  
  const projEl = $('project-summary');
  const projKeys = Object.keys(projs);
  if(!projKeys.length) projEl.innerHTML = '<div class="empty">無專案數據</div>';
  else {
    projEl.innerHTML = projKeys.map(k => `
      <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:8px;">
        <span style="color:var(--muted)">${k}</span>
        <span style="font-weight:600; color:${projs[k]>=0?'var(--green)':'var(--red)'}">${fmt(projs[k])}</span>
      </div>
    `).join('');
  }
}

function renderChart() {
  const ctx = $('trendChart').getContext('2d');
  const months = [];
  for (let i = 5; i >= 0; i--) {
    let m = currentMonth - i;
    let y = currentYear;
    if(m <= 0) { m += 12; y -= 1; }
    months.push(`${y}-${m.toString().padStart(2, '0')}`);
  }
  
  const incomeData = months.map(m => ledger.filter(r => r.date.startsWith(m) && r.cat === '營業收入').reduce((s, r) => s + r.amt, 0));
  const expenseData = months.map(m => ledger.filter(r => r.date.startsWith(m) && r.cat !== '營業收入').reduce((s, r) => s + r.amt, 0));

  if (trendChart) trendChart.destroy();
  trendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: months.map(m => m.split('-')[1] + '月'),
      datasets: [
        { label: '收入', data: incomeData, borderColor: '#34d399', tension: 0.4, fill: false },
        { label: '支出', data: expenseData, borderColor: '#f87171', tension: 0.4, fill: false }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { 
        y: { grid: { display: false }, ticks: { display: false } },
        x: { grid: { display: false }, ticks: { color: '#888' } }
      }
    }
  });
}

function exportCSV() {
  let csv = "\uFEFF日期,項目,金額,分類,支付方式,專案\n";
  ledger.forEach(r => {
    csv += `${r.date},${r.name},${r.amt},${r.cat},${r.pay},${r.proj}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `蘊一創意財務報表_${getCurrentMonthStr()}.csv`;
  link.click();
}

function renderAll() {
  renderDashboard(); renderEmployees(); renderLedger(); renderChart();
}

updateDateUI();
</script>
</body>
</html>
