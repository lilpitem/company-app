<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
/>

<title>蘊一財務 Pro</title>

<link
  href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
  rel="stylesheet"
/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
  --bg:#0f111a;
  --bg2:#191c29;
  --card:#202434;
  --accent:#7c6af7;
  --accent2:#a78bfa;
  --green:#34d399;
  --red:#f87171;
  --amber:#fbbf24;
  --text:#f4f4ff;
  --muted:#8d92b3;
  --border:rgba(124,106,247,.14);
  --radius:18px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--bg);
  color:var(--text);
  max-width:430px;
  margin:0 auto;
  overflow-x:hidden;
  overscroll-behavior:none;
}

.screen{
  display:none;
  min-height:100vh;
  padding-bottom:120px;
}

.screen.active{
  display:block;
}

.header{
  padding:56px 20px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(180deg,var(--bg2),transparent);
}

.brand{
  font-size:20px;
  font-weight:700;
}

.top-month{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin-bottom:12px;
}

.month-btn{
  width:36px;
  height:36px;
  border:none;
  border-radius:10px;
  background:var(--card);
  color:var(--accent2);
  cursor:pointer;
  font-size:18px;
}

.month-label{
  min-width:120px;
  text-align:center;
  font-weight:700;
  font-size:16px;
  cursor:pointer;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  margin:0 16px 14px;
  padding:16px;
}

.card-title{
  font-size:12px;
  color:var(--muted);
  margin-bottom:14px;
}

.chart-box{
  height:220px;
  position:relative;
}

.chart-center{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  pointer-events:none;
}

.net{
  font-size:30px;
  font-weight:700;
}

.legend{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
  gap:10px;
}

.legend-item{
  flex:1;
  text-align:center;
}

.legend-label{
  font-size:11px;
  color:var(--muted);
  margin-bottom:5px;
}

.legend-value{
  font-weight:700;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:430px;
  display:flex;
  align-items:center;
  background:var(--bg2);
  border-top:1px solid var(--border);
  padding:10px 0 calc(14px + env(safe-area-inset-bottom));
  z-index:999;
}

.nav-item{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  color:var(--muted);
}

.nav-item.active{
  color:var(--accent2);
}

.nav-icon{
  font-size:20px;
}

.nav-label{
  font-size:10px;
}

.fab-wrap{
  flex:.7;
  position:relative;
}

.fab{
  position:absolute;
  top:-32px;
  left:50%;
  transform:translateX(-50%);
  width:58px;
  height:58px;
  border:none;
  border-radius:50%;
  background:var(--accent);
  color:#fff;
  font-size:28px;
  box-shadow:0 10px 25px rgba(124,106,247,.35);
}

.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}

.cal-head{
  text-align:center;
  color:var(--muted);
  font-size:11px;
}

.cal-day{
  aspect-ratio:1;
  border-radius:14px;
  background:rgba(255,255,255,.03);
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.cal-day.active{
  background:var(--accent);
}

.cal-day.today{
  border:1px solid var(--accent2);
}

.dot-wrap{
  position:absolute;
  bottom:5px;
  display:flex;
  gap:3px;
}

.dot{
  width:4px;
  height:4px;
  border-radius:50%;
}

.list-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,.04);
}

.row-info{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.row-main{
  font-size:15px;
}

.row-sub{
  font-size:11px;
  color:var(--muted);
}

.amount{
  font-weight:700;
}

.empty{
  padding:36px 0;
  text-align:center;
  color:var(--muted);
}

.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:flex-end;
  z-index:3000;
}

.modal-overlay.open{
  display:flex;
}

.modal{
  width:100%;
  background:var(--bg2);
  border-radius:28px 28px 0 0;
  padding:20px 20px calc(40px + env(safe-area-inset-bottom));
}

.modal-handle{
  width:42px;
  height:5px;
  border-radius:999px;
  background:rgba(255,255,255,.1);
  margin:0 auto 18px;
}

.field{
  margin-bottom:14px;
}

.field label{
  display:block;
  margin-bottom:6px;
  font-size:11px;
  color:var(--muted);
}

.field input,
.field select{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,.06);
  color:#fff;
}

.btn{
  width:100%;
  border:none;
  border-radius:14px;
  padding:15px;
  background:var(--accent);
  color:#fff;
  font-weight:700;
}

/* iOS Picker */

.picker-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:flex-end;
  z-index:5000;
}

.picker-overlay.open{
  display:flex;
}

.picker-modal{
  width:100%;
  background:var(--bg2);
  border-radius:28px 28px 0 0;
  padding:20px 20px calc(40px + env(safe-area-inset-bottom));
}

.picker-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.picker-btn{
  border:none;
  background:none;
  color:var(--accent2);
  font-size:16px;
}

.picker-wheel-wrap{
  display:flex;
  gap:12px;
}

.picker-wheel{
  flex:1;
  height:240px;
  overflow-y:auto;
  scroll-snap-type:y mandatory;
  -webkit-overflow-scrolling:touch;
  position:relative;
  scrollbar-width:none;
}

.picker-wheel::-webkit-scrollbar{
  display:none;
}

.picker-item{
  height:48px;
  display:flex;
  justify-content:center;
  align-items:center;
  scroll-snap-align:center;
  color:var(--muted);
  font-size:20px;
}

.picker-item.active{
  color:#fff;
  font-weight:700;
}

.picker-highlight{
  position:absolute;
  left:0;
  right:0;
  top:96px;
  height:48px;
  border-top:1px solid rgba(255,255,255,.08);
  border-bottom:1px solid rgba(255,255,255,.08);
  pointer-events:none;
}

</style>
</head>

<body>

<div class="header">
  <div class="brand">蘊一財務</div>
</div>

<div class="top-month">
  <button class="month-btn" id="prevMonth">‹</button>

  <div class="month-label" id="monthLabel"></div>

  <button class="month-btn" id="nextMonth">›</button>
</div>

<section class="screen active" id="screen-home">

  <div class="card">

    <div class="card-title">
      本月財務概覽
    </div>

    <div class="chart-box">

      <canvas id="mainChart"></canvas>

      <div class="chart-center">
        <div class="net" id="netValue">$0</div>
      </div>

    </div>

    <div class="legend">

      <div class="legend-item">
        <div class="legend-label">收入</div>
        <div class="legend-value" id="incomeValue">$0</div>
      </div>

      <div class="legend-item">
        <div class="legend-label">支出</div>
        <div class="legend-value" id="expenseValue">$0</div>
      </div>

      <div class="legend-item">
        <div class="legend-label">薪資</div>
        <div class="legend-value" id="salaryValue">$0</div>
      </div>

    </div>

  </div>

</section>

<section class="screen" id="screen-calendar">

  <div class="card">
    <div id="calendar"></div>
  </div>

  <div class="card">
    <div class="card-title" id="dayTitle"></div>
    <div id="dayList"></div>
  </div>

</section>

<nav class="bottom-nav">

  <div class="nav-item active">
    <div class="nav-icon">📊</div>
    <div class="nav-label">總覽</div>
  </div>

  <div class="nav-item">
    <div class="nav-icon">📅</div>
    <div class="nav-label">日曆</div>
  </div>

  <div class="fab-wrap">
    <button class="fab" id="addBtn">＋</button>
  </div>

</nav>

<!-- iOS Picker -->

<div class="picker-overlay" id="pickerOverlay">

  <div class="picker-modal">

    <div class="picker-top">

      <button class="picker-btn" id="pickerCancel">
        取消
      </button>

      <div>
        選擇年月
      </div>

      <button class="picker-btn" id="pickerDone">
        完成
      </button>

    </div>

    <div style="position:relative">

      <div class="picker-highlight"></div>

      <div class="picker-wheel-wrap">

        <div class="picker-wheel" id="yearWheel"></div>

        <div class="picker-wheel" id="monthWheel"></div>

      </div>

    </div>

  </div>

</div>

<script>

const state = {

  currentYear:new Date().getFullYear(),
  currentMonth:new Date().getMonth(),

  selectedDate:new Date()
    .toISOString()
    .slice(0,10),

  ldg:[],

  charts:{}

}

const el = id => document.getElementById(id)

function money(n){

  return '$' + Math.round(n)
    .toLocaleString()

}

function renderMonth(){

  el('monthLabel').textContent =
    `${state.currentYear} 年 ${state.currentMonth+1} 月`

}

function renderSummary(){

  let income = 0
  let expense = 0

  state.ldg.forEach(v=>{

    if(v.type === 'income'){
      income += v.amount
    }else{
      expense += v.amount
    }

  })

  const net = income - expense

  el('incomeValue').textContent = money(income)
  el('expenseValue').textContent = money(expense)
  el('salaryValue').textContent = money(0)

  el('netValue').textContent = money(net)

  if(!state.charts.main){

    state.charts.main =
      new Chart(el('mainChart'),{

        type:'doughnut',

        data:{
          datasets:[{
            data:[
              expense,
              income || 1
            ],
            backgroundColor:[
              '#f87171',
              '#34d399'
            ],
            borderWidth:0
          }]
        },

        options:{
          responsive:true,
          maintainAspectRatio:false,
          cutout:'82%'
        }

      })

  }else{

    state.charts.main
      .data.datasets[0].data = [
        expense,
        income || 1
      ]

    state.charts.main.update()

  }

}

function renderCalendar(){

  const firstDay =
    new Date(
      state.currentYear,
      state.currentMonth,
      1
    ).getDay()

  const totalDays =
    new Date(
      state.currentYear,
      state.currentMonth+1,
      0
    ).getDate()

  let html = `
  <div class="cal-grid">
  `

  ;['日','一','二','三','四','五','六']
  .forEach(v=>{

    html += `
    <div class="cal-head">${v}</div>
    `

  })

  for(let i=0;i<firstDay;i++){
    html += `<div></div>`
  }

  for(let d=1;d<=totalDays;d++){

    html += `
    <div class="cal-day">
      ${d}
    </div>
    `

  }

  html += `</div>`

  el('calendar').innerHTML = html

}

function render(){

  renderMonth()
  renderSummary()
  renderCalendar()

}

function prevMonth(){

  state.currentMonth--

  if(state.currentMonth < 0){

    state.currentMonth = 11
    state.currentYear--

  }

  render()

}

function nextMonth(){

  state.currentMonth++

  if(state.currentMonth > 11){

    state.currentMonth = 0
    state.currentYear++

  }

  render()

}

el('prevMonth')
  .addEventListener('click',prevMonth)

el('nextMonth')
  .addEventListener('click',nextMonth)

/* Swipe */

let touchStartX = 0
let touchEndX = 0

el('screen-home')
.addEventListener('touchstart',(e)=>{

  touchStartX =
    e.changedTouches[0].screenX

},{passive:true})

el('screen-home')
.addEventListener('touchend',(e)=>{

  touchEndX =
    e.changedTouches[0].screenX

  const diff =
    touchEndX - touchStartX

  if(Math.abs(diff) < 60) return

  if(diff < 0){

    nextMonth()

  }else{

    prevMonth()

  }

},{passive:true})

/* Picker */

const pickerOverlay = el('pickerOverlay')
const yearWheel = el('yearWheel')
const monthWheel = el('monthWheel')

let pickerYear = state.currentYear
let pickerMonth = state.currentMonth

function buildPicker(){

  let yearHTML =
    '<div style="height:96px"></div>'

  for(let y=2020;y<=2045;y++){

    yearHTML += `
    <div
      class="
        picker-item
        ${y===pickerYear?'active':''}
      "
      data-year="${y}"
    >
      ${y}年
    </div>
    `

  }

  yearHTML +=
    '<div style="height:96px"></div>'

  yearWheel.innerHTML = yearHTML

  let monthHTML =
    '<div style="height:96px"></div>'

  for(let m=1;m<=12;m++){

    monthHTML += `
    <div
      class="
        picker-item
        ${m-1===pickerMonth?'active':''}
      "
      data-month="${m-1}"
    >
      ${m}月
    </div>
    `

  }

  monthHTML +=
    '<div style="height:96px"></div>'

  monthWheel.innerHTML = monthHTML

  requestAnimationFrame(()=>{

    yearWheel.scrollTop =
      (pickerYear - 2020) * 48

    monthWheel.scrollTop =
      pickerMonth * 48

  })

}

function openPicker(){

  pickerYear = state.currentYear
  pickerMonth = state.currentMonth

  buildPicker()

  pickerOverlay.classList.add('open')

}

function closePicker(){

  pickerOverlay.classList.remove('open')

}

function bindWheel(wheel,type){

  wheel.addEventListener('scroll',()=>{

    clearTimeout(wheel.timer)

    wheel.timer = setTimeout(()=>{

      const index =
        Math.round(wheel.scrollTop / 48)

      const items =
        wheel.querySelectorAll('.picker-item')

      items.forEach(v=>
        v.classList.remove('active')
      )

      const target = items[index]

      if(!target) return

      target.classList.add('active')

      if(type === 'year'){

        pickerYear =
          Number(target.dataset.year)

      }else{

        pickerMonth =
          Number(target.dataset.month)

      }

    },40)

  })

}

bindWheel(yearWheel,'year')
bindWheel(monthWheel,'month')

el('monthLabel')
.addEventListener('click',openPicker)

el('pickerCancel')
.addEventListener('click',closePicker)

el('pickerDone')
.addEventListener('click',()=>{

  state.currentYear = pickerYear
  state.currentMonth = pickerMonth

  render()

  closePicker()

})

pickerOverlay
.addEventListener('click',(e)=>{

  if(e.target === pickerOverlay){

    closePicker()

  }

})

render()

</script>

</body>
</html>
