<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Yun Yi Finance v3.3 | iOS Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* ── iOS 標準色彩系統 (Dark Mode) ── */
:root { --bg:#000000; --bg-elevated:#1C1C1E; --bg-grouped:#1C1C1E; --card:#1C1C1E; --bg-modal:#2C2C2E; --input-bg:#3A3A3C; --accent:#5E5CE6; --accent-light:#7D7AFF; --green:#32D74B; --red:#FF453A; --amber:#FF9F0A; --text:#FFFFFF; --muted:#8E8E93; --muted-light:#C7C7CC; --border:rgba(255,255,255,0.15); --radius-card:14px; --radius-btn:12px; --radius-input:10px; }
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; outline:none; }
body { font-family:-apple-system,BlinkMacSystemFont,"SF Pro NT","Noto Sans TC","Helvetica Neue",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; max-width:430px; margin:0 auto; overflow-x:hidden; line-height:1.4; -webkit-font-smoothing:antialiased; }
.list-row { display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:.5px solid var(--border); }
.list-row:last-child { border-bottom:none; }
.row-info { display:flex; flex-direction:column; gap:2px; flex:1; margin-right:10px; }
.row-main { font-size:17px; font-weight:500; color:var(--text); }
.row-sub { font-size:13px; color:var(--muted); }
.amt { font-weight:600; font-size:17px; text-align:right; white-space:nowrap; }
.chevron { width:14px; height:14px; margin-left:8px; flex-shrink:0; background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%238E8E93" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>'); background-size:contain; background-repeat:no-repeat; }
.empty { text-align:center; padding:50px 0; color:var(--muted); font-size:15px; }
.screen { display:none; min-height:100vh; padding-bottom:120px; }
.screen.active { display:block; }
.card { background:var(--card); border-radius:var(--radius-card); padding:18px; margin:0 16px 12px; }
.card-title { font-size:14px; color:var(--muted); margin-bottom:15px; text-transform:uppercase; letter-spacing:.5px; }
.header { padding:56px 20px 20px; display:flex; justify-content:space-between; align-items:center; }
.brand { font-size:22px; font-weight:800; letter-spacing:-.5px; }
#sync-status { font-size:11px; padding:6px 12px; border-radius:20px; background:var(--input-bg); transition:.3s; font-weight:600; }
.syncing { color:var(--amber); animation:pulse 1s infinite; }
.sync-ok { color:var(--green); background:rgba(50,215,75,.1); }
.sync-err { color:var(--red); background:rgba(255,69,58,.1); cursor:pointer; }
@keyframes pulse { 50% { opacity:.5; } }
.month-nav { display:flex; align-items:center; justify-content:center; gap:8px; padding:0 16px 16px; }
.m-btn { background:none; border:none; color:var(--accent); border-radius:8px; padding:8px 12px; font-size:24px; cursor:pointer; line-height:1; font-weight:300; }
.m-btn:active { background:rgba(255,255,255,.05); }
.m-picker-wrapper { position:relative; text-align:center; padding:10px 20px; background:var(--bg-modal); border-radius:12px; min-width:130px; }
#hdr-m { font-size:17px; font-weight:600; color:var(--accent); }
#m-input { position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer; }
.bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:rgba(10,10,10,.95); border-top:.5px solid var(--border); display:flex; z-index:100; padding:8px 0 calc(env(safe-area-inset-bottom) + 8px); -webkit-backdrop-filter:blur(20px); backdrop-filter:blur(20px); }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; color:var(--muted); }
.nav-item.active { color:var(--accent); }
.nav-icon-svg { width:26px; height:26px; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.nav-item.active .nav-icon-svg.fill { fill:var(--accent); }
.nav-label { font-size:10px; font-weight:600; letter-spacing:.2px; }
.fab-item { flex:.6; position:relative; }
.fab-btn-wrap { position:absolute; top:-35px; left:50%; transform:translateX(-50%); }
.fab { width:60px; height:60px; background:var(--accent); border-radius:50%; display:flex; justify-content:center; align-items:center; color:#fff; border:5px solid #0a0a0a; box-shadow:0 4px 15px rgba(94,92,230,.3); }
.fab-icon-svg { width:28px; height:28px; stroke:#FFFFFF; stroke-width:3.5; stroke-linecap:round; stroke-linejoin:round; }
.cal-grid { display:flex; flex-wrap:wrap; width:100%; }
.cal-h, .cal-c { width:14.285%; text-align:center; }
.cal-h { font-size:12px; color:var(--muted); padding-bottom:10px; font-weight:700; }
.cal-c { height:48px; display:flex; justify-content:center; position:relative; }
.cal-d { width:36px; height:36px; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:50%; font-size:18px; font-weight:400; position:relative; }
.cal-d.active { background:var(--accent); color:#fff; font-weight:600; }
.cal-d.today:not(.active) { color:var(--accent); font-weight:600; }
.cal-d.today:not(.active)::after { content:''; position:absolute; bottom:2px; width:4px; height:4px; border-radius:50%; background:var(--accent); }
.dots { display:flex; gap:2.5px; position:absolute; bottom:3px; }
.dot { width:4px; height:4px; border-radius:50%; }
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; align-items:flex-end; opacity:0; transition:opacity .3s; }
.modal-overlay.open { display:flex; opacity:1; }
.modal { background:var(--bg-modal); border-radius:20px 20px 0 0; padding:20px 20px calc(20px + env(safe-area-inset-bottom)); width:100%; max-height:90vh; overflow-y:auto; transform:translateY(100%); transition:transform .3s ease-out; }
.modal-overlay.open .modal { transform:translateY(0); }
.modal-h { width:36px; height:5px; background:var(--muted); border-radius:3px; margin:0 auto 20px; opacity:.5; }
.modal-actions { display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; }
.modal-title { font-size:18px; font-weight:700; text-align:center; flex:1; }
.m-act-btn { background:none; border:none; font-size:17px; font-weight:600; color:var(--accent); cursor:pointer; padding:5px; }
.m-act-btn.del-btn { color:var(--red); font-weight:400; }
.m-act-btn.cancel-btn { color:var(--accent); font-weight:400; }
.t-toggle { display:flex; background:rgba(118,118,128,.24); border-radius:9px; padding:2px; margin-bottom:25px; }
.t-btn { flex:1; text-align:center; padding:8px; font-size:14px; border-radius:7px; color:var(--text); font-weight:600; border:none; background:none; }
.t-btn.active { background:rgba(255,255,255,.12); box-shadow:0 3px 8px rgba(0,0,0,.12); }
.t-btn.active.exp { color:var(--red); }
.t-btn.active.inc { color:var(--green); }
.field { margin-bottom:20px; }
.field label { font-size:13px; color:var(--muted); display:block; margin-bottom:6px; margin-left:4px; text-transform:uppercase; letter-spacing:.5px; }
.field input, .field select { width:100%; padding:14px 16px; background:var(--input-bg); border:none; border-radius:var(--radius-input); color:#fff; font-size:17px; }
.field select { -webkit-appearance:none; background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%238E8E93" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10l5 5 5-5"/></svg>'); background-repeat:no-repeat; background-position:right 14px center; background-size:18px; }
.field input[type="file"] { padding:12px; font-size:13px; color:var(--muted); }
.btn-p { width:100%; padding:16px; background:var(--accent); color:#fff; border:none; border-radius:var(--radius-btn); font-size:17px; font-weight:700; cursor:pointer; transition:opacity .2s; }
.btn-p:active { opacity:.8; }
.btn-secondary { width:100%; padding:16px; background:var(--input-bg); border:none; border-radius:var(--radius-btn); color:var(--accent-light); font-size:17px; font-weight:600; cursor:pointer; }
.chart-box { position:relative; height:180px; display:flex; justify-content:center; align-items:center; margin:10px 0; }
.chart-center { position:absolute; text-align:center; pointer-events:none; }
.chart-val { font-size:24px; font-weight:800; letter-spacing:-1px; }
.legend { display:flex; justify-content:space-around; padding-top:18px; border-top:.5px solid var(--border); text-align:center; }
.legend-item div:first-child { font-size:11px; color:var(--muted); margin-bottom:4px; font-weight:600; text-transform:uppercase; }
.legend-item div:last-child { font-size:16px; font-weight:700; }
</style>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
</head>
<body id="swipe-area">

<!-- SVG Icons -->
<svg style="display:none;">
  <symbol id="icon-home" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></symbol>
  <symbol id="icon-cal" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></symbol>
  <symbol id="icon-plus" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></symbol>
  <symbol id="icon-ldg" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></symbol>
  <symbol id="icon-pay" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></symbol>
</svg>

<div class="header">
  <div class="brand">蘊一財務</div>
  <div id="sync-status" onclick="loadCloud()">點擊讀取雲端</div>
</div>

<div class="month-nav">
  <button onclick="shiftMonth(-1)" class="m-btn">‹</button>
  <div class="m-picker-wrapper"><span id="hdr-m"></span><input type="month" id="m-input" onchange="pickMonth(this.value)"></div>
  <button onclick="shiftMonth(1)" class="m-btn">›</button>
  <button onclick="resetMonth()" style="font-size:12px;background:var(--input-bg);color:var(--accent-light);border:none;border-radius:15px;padding:6px 12px;cursor:pointer;font-weight:600;">本月</button>
</div>

<div id="s-home" class="screen active">
  <div class="card" style="padding-top:25px;">
    <div class="card-title">本月盈餘概覽</div>
    <div class="chart-box"><canvas id="c-main"></canvas><div class="chart-center"><div class="chart-val" id="val-p">$0</div></div></div>
    <div class="legend">
      <div class="legend-item"><div>本月收入</div><div style="color:var(--green)" id="val-inc">$0</div></div>
      <div class="legend-item"><div>本月支出</div><div style="color:var(--red)" id="val-exp">$0</div></div>
      <div class="legend-item"><div>薪資預算</div><div style="color:var(--amber)" id="val-sal">$0</div></div>
    </div>
  </div>
</div>

<div id="s-cal" class="screen">
  <div class="card"><div id="cal-grid"></div></div>
  <div class="card"><div class="card-title" id="cal-title" style="color:var(--text); font-size:17px; font-weight:700; text-transform:none; border-bottom:.5px solid var(--border); padding-bottom:12px; margin-bottom:5px;"></div><div id="cal-list"></div></div>
</div>

<div id="s-ldg" class="screen">
  <div class="card"><div class="card-title">帳目明細 <span style="font-size:11px;color:var(--accent-light);font-weight:600;cursor:pointer;text-transform:none; float:right;" onclick="loadCloud()">🔄 更新</span></div><div id="ldg-list"></div></div>
</div>

<div id="s-pay" class="screen">
  <div class="card"><div id="emp-list"></div><button class="btn-secondary" style="margin-top:20px; font-weight:700;" onclick="prepEmp()">＋ 新增人員</button></div>
</div>

<nav class="bottom-nav">
  <div class="nav-item active" onclick="go('home',this)"><svg class="nav-icon-svg fill"><use href="#icon-home"></use></svg><div class="nav-label">總覽</div></div>
  <div class="nav-item" onclick="go('cal',this)"><svg class="nav-icon-svg fill"><use href="#icon-cal"></use></svg><div class="nav-label">記帳本</div></div>
  <div class="nav-item fab-item" onclick="prepLdg()"><div class="fab-btn-wrap"><div class="fab"><svg class="fab-icon-svg"><use href="#icon-plus"></use></svg></div></div><div class="nav-label" style="opacity:0;">新增</div></div>
  <div class="nav-item" onclick="go('ldg',this)"><svg class="nav-icon-svg fill"><use href="#icon-ldg"></use></svg><div class="nav-label">明細</div></div>
  <div class="nav-item" onclick="go('pay',this)"><svg class="nav-icon-svg fill"><use href="#icon-pay"></use></svg><div class="nav-label">薪資</div></div>
</nav>

<!-- 刪除確認 Modal -->
<div class="modal-overlay" id="m-del" onclick="closeM(event,'m-del')">
  <div class="modal" style="text-align:center;">
    <div class="modal-h"></div>
    <div class="modal-title" style="margin-bottom:25px; color:var(--text);">確定刪除此筆紀錄嗎？<br><span style="font-weight:400; font-size:14px; color:var(--muted);">此動作無法還原</span></div>
    <div style="display:flex;flex-direction:column; gap:12px;"><button class="btn-p" style="background:var(--red);" onclick="execDel()">刪除</button><button class="btn-secondary" onclick="closeMById('m-del')">取消</button></div>
  </div>
</div>

<!-- 新增帳目 Modal -->
<div class="modal-overlay" id="m-ldg" onclick="closeM(event,'m-ldg')">
  <div class="modal">
    <div class="modal-h"></div>
    <div class="modal-actions"><button class="m-act-btn cancel-btn" onclick="closeMById('m-ldg')">取消</button><div class="modal-title">新增項目</div><button class="m-act-btn" onclick="$('ldg-form').requestSubmit()">儲存</button></div>
    <form id="ldg-form" onsubmit="event.preventDefault(); saveLdg();">
      <input type="hidden" id="l-t" value="expense">
      <div class="field"><label>日期</label><input type="date" id="l-d" required></div>
      <div class="t-toggle">
        <button type="button" class="t-btn active exp" id="tb-exp" onclick="setT('expense')">支出</button>
        <button type="button" class="t-btn inc" id="tb-inc" onclick="setT('income')">收入</button>
      </div>
      <div class="field"><label>金額</label><input type="number" id="l-a" placeholder="$0" required inputmode="numeric"></div>
      <div class="field"><label>項目內容</label><input type="text" id="l-c" placeholder="例如：租金" required></div>
      <div class="field"><label>歸屬成員</label><select id="l-m"></select></div>
      <div class="field"><label>上傳照片 (目前僅供展示不佔用空間)</label><input type="file" id="l-p" accept="image/*"></div>
      <div class="field"><label>發票號碼</label><input type="text" id="l-inv" placeholder="AB-12345678"></div>
      <div class="field"><label>報帳狀態</label><select id="l-clm"><option value="請款">請款</option><option value="不請款">不請款</option></select></div>
      <div class="field"><label>憑證類型</label><select id="l-vt"><option value="電子發票">電子發票</option><option value="三聯單">三聯單</option><option value="三聯單收銀機">三聯單收銀機</option><option value="免用統一發票">免用統一發票</option><option value="無憑證">無憑證</option></select></div>
      <div class="field"><label>備註</label><input type="text" id="l-n" placeholder="補充說明..."></div>
    </form>
  </div>
</div>

<!-- 新增人員 Modal -->
<div class="modal-overlay" id="m-emp" onclick="closeM(event,'m-emp')">
  <div class="modal">
    <div class="modal-h"></div>
    <div class="modal-actions"><button class="m-act-btn del-btn" id="btn-del-emp" onclick="delEmp()" style="display:none;">刪除</button><div class="modal-title" id="m-emp-title">新增人員</div><button class="m-act-btn" onclick="$('emp-form').requestSubmit()">完成</button></div>
    <form id="emp-form" onsubmit="event.preventDefault(); saveEmp();">
      <input type="hidden" id="e-id">
      <div class="field"><label>姓名</label><input type="text" id="e-n" required></div>
      <div class="field"><label>底薪</label><input type="number" id="e-s" required inputmode="numeric"></div>
      <div class="field"><label>獎金代墊</label><input type="number" id="e-b" value="0" inputmode="numeric"></div>
      <div style="padding-top:10px;"><button type="button" class="btn-secondary" onclick="closeMById('m-emp')">取消</button></div>
    </form>

<!-- 人員詳情 Modal -->
<div class="modal-overlay" id="m-det" onclick="closeM(event,'m-det')">
  <div class="modal">
    <div class="modal-h"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px; border-bottom:.5px solid var(--border); padding-bottom:15px;">
      <h2 id="det-n" style="font-size:20px; font-weight:800;"></h2>
      <div style="display:flex; gap:8px;"><button class="btn-p" id="det-e-btn" style="width:auto;padding:8px 16px;font-size:14px;border-radius:20px;">✏️ 編輯人員</button><button class="btn-secondary" onclick="closeMById('m-det')" style="width:auto;padding:8px 16px;font-size:14px;border-radius:20px;">關閉</button></div>
    </div>
    <div class="chart-box"><canvas id="c-emp"></canvas></div>
    <div class="card-title" style="margin-top:20px;">當月相關收支</div>
    <div id="det-list"></div>
  </div>
</div>

<script>
const CURRENT_VERSION = '3.3.0_iOS'; 
if (localStorage.getItem('app_version') !== CURRENT_VERSION) {
    localStorage.setItem('app_version', CURRENT_VERSION);
    window.location.reload(true); 
}

const GAS_URL = 'https://script.google.com/macros/s/AKfycbzsCdf4E4p52LOIvRM7n_UMoAcMz05kTAM4zKf72KIzFPzcTi5ShA1xMAOlDoghhKR-/exec';
const $ = id => document.getElementById(id), $$ = s => document.querySelectorAll(s), qV = id => $(id).value;
const fmt = n => '$' + Math.round(n).toLocaleString();

// 💡 修正 1：修正為抓取本地正確時區，避免早上 8 點前判定為昨天的 Bug
const toIsoD = d => [d.getFullYear(), String(d.getMonth()+1).padStart(2,'0'), String(d.getDate()).padStart(2,'0')].join('-');

const setSync = (txt, cls) => { const s = $('sync-status'); s.textContent = txt; s.className = cls; };

let emp = JSON.parse(localStorage.getItem('ye') || '[]'), ldg = JSON.parse(localStorage.getItem('yl') || '[]');
const today = new Date();
let calYear = today.getFullYear(), calMonth = today.getMonth(), selD = toIsoD(today);
let charts = {}, delIdx = -1, pressT; // 💡 修正 4：宣告全域變數 pressT 避免記憶體洩漏

Chart.defaults.color = '#8E8E93'; Chart.defaults.font.family = '-apple-system, system-ui, sans-serif';

const shiftMonth = delta => { const d = new Date(calYear, calMonth + delta, 1); calYear = d.getFullYear(); calMonth = d.getMonth(); render(); };
const resetMonth = () => { const d = new Date(); calYear = d.getFullYear(); calMonth = d.getMonth(); selD = toIsoD(d); render(); };
const pickMonth = val => { if(!val) return; const [y, m] = val.split('-'); calYear = parseInt(y); calMonth = parseInt(m)-1; render(); };

let touchStartX = 0;
$('swipe-area').addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX, {passive: true});
$('swipe-area').addEventListener('touchend', e => {
    const diff = e.changedTouches[0].screenX - touchStartX;
    if (Math.abs(diff) > 70 && ($('s-home').classList.contains('active') || $('s-cal').classList.contains('active'))) shiftMonth(diff > 0 ? -1 : 1);
}, {passive: true});

const jsonpFetch = url => new Promise((res, rej) => {
    const cb = '_cb_' + Date.now(), s = document.createElement('script'), t = setTimeout(() => clean(rej(new Error('逾時'))), 10000);
    const clean = () => { clearTimeout(t); delete window[cb]; s.remove(); };
    window[cb] = d => clean(res(d)); s.onerror = () => clean(rej(new Error('失敗')));
    s.src = `${url}${url.includes('?')?'&':'?'}callback=${cb}`; document.head.appendChild(s);
});

async function sync() { setSync('上傳中...', 'syncing'); try { await fetch(GAS_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({emp, ldg})}); setSync('✅ 雲端已同步', 'sync-ok'); } catch(e) { setSync('📵 離線儲存', ''); } }
async function loadCloud() { setSync('讀取中...', 'syncing'); try { const d = await jsonpFetch(GAS_URL); if (d?.emp || d?.ldg) { emp = d.emp || []; ldg = d.ldg || []; saveLoc(); render(); updateMem(); setSync('✅ 雲端已同步', 'sync-ok'); } else await sync(); } catch(e) { setSync('⚠️ 讀取失敗', 'sync-err'); } }

const saveLoc = () => { localStorage.setItem('ye', JSON.stringify(emp)); localStorage.setItem('yl', JSON.stringify(ldg)); };
const go = (p, el) => { $$('.screen, .nav-item').forEach(e => e.classList.remove('active')); $(`s-${p}`).classList.add('active'); el.classList.add('active'); };
const openM = id => $(id).classList.add('open');
const closeM = (e, id) => { if(e.target === $(id)) $(id).classList.remove('open'); };
const closeMById = id => $(id).classList.remove('open');
const setT = t => { $('l-t').value=t; $('tb-exp').className=t==='expense'?'t-btn active exp':'t-btn'; $('tb-inc').className=t==='income'?'t-btn active inc':'t-btn'; };

const prepLdg = () => { $('ldg-form').reset(); setT('expense'); $('l-d').value = selD; openM('m-ldg'); };
const prepEmp = () => { $('emp-form').reset(); $('e-id').value = ''; $('m-emp-title').textContent = "新增人員"; $('btn-del-emp').style.display='none'; openM('m-emp'); };

function saveLdg() { 
  ldg.unshift({ date: qV('l-d'), type: qV('l-t'), amt: Number(qV('l-a')), cat: qV('l-c'), mem: qV('l-m'), inv: qV('l-inv'), clm: qV('l-clm'), vt: qV('l-vt'), note: qV('l-n') }); 
  updateState('m-ldg'); 
}
function saveEmp() { const id = qV('e-id'), d = {name:qV('e-n'), salary:Number(qV('e-s')), bonus:Number(qV('e-b'))}; id ? emp[id]=d : emp.push(d); updateState('m-emp'); }
const delEmp = () => { if(confirm('確定刪除此人員及其所有薪資預算？此動作無法還原。')){ emp.splice(qV('e-id'),1); updateState('m-emp'); } };

// 💡 修正 5：成功刪除後，要將 delIdx 歸零以免下次誤觸
const execDel = () => { if(delIdx!==-1){ ldg.splice(delIdx,1); delIdx=-1; updateState('m-del', true); } };

const updateState = (mId, skipMems) => { saveLoc(); sync(); render(); if(!skipMems) updateMem(); closeMById(mId); };
const updateMem = () => $('l-m').innerHTML = '<option value="公司">🏛 公司帳戶</option>' + emp.map(e=>`<option value="${e.name}">👤 ${e.name}</option>`).join('');

// 💡 修正 2：加入了 ontouchmove 立即清除長按事件，避免滑動時跳出刪除對話框
const rowTemplate = (r, showMember=true) => `<div class="list-row" ontouchstart="pressT=setTimeout(()=>{delIdx=${r.oid};openM('m-del')},600)" ontouchmove="clearTimeout(pressT)" ontouchend="clearTimeout(pressT)"><div class="row-info"><div class="row-main">${r.cat}${r.clm==='請款'?' <small style="color:var(--amber);font-size:11px;">[請款]</small>':''}</div><div class="row-sub">${r.date}${showMember ? ' · '+r.mem : ''}${r.note?' · '+r.note:''}</div></div><div class="amt" style="color:var(--${r.type==='income'?'green':'red'})">${r.type==='income'?'+':'-'}${fmt(r.amt)}</div></div>`;

function render() {
    const mStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}`;
    $('hdr-m').textContent = `${calYear}年 ${calMonth+1}月`; $('m-input').value = mStr;
    
    let curLdg = [], inc = 0, exp = 0, dateDots = {};
    ldg.forEach((r, i) => {
        if(r.date.startsWith(mStr)) {
            curLdg.push({...r, oid: i});
            if(r.type === 'income') inc += r.amt; else exp += r.amt;
            if(!dateDots[r.date]) dateDots[r.date] = {i: false, e: false};
            if(r.type === 'income') dateDots[r.date].i = true; else dateDots[r.date].e = true;
        }
    });

    $('ldg-list').innerHTML = curLdg.map(r=>rowTemplate(r)).join('') || '<div class="empty">本月無帳目</div>';
    $('emp-list').innerHTML = emp.map((e,i)=>`<div class="list-row" onclick="showDet(${i})"><div class="row-info"><div class="row-main">${e.name}</div><div class="row-sub">本月預算：${fmt(e.salary+e.bonus)}</div></div><div class="chevron"></div></div>`).join('') || '<div class="empty">無人員</div>';
    
    let sal = emp.reduce((a,b)=>a+b.salary+b.bonus, 0), net = inc-exp-sal;
    $('val-p').textContent=fmt(net); $('val-p').style.color = net>=0 ? 'var(--text)' : 'var(--red)';
    $('val-inc').textContent=fmt(inc); $('val-exp').textContent=fmt(exp); $('val-sal').textContent=fmt(sal);
    
    if(charts.m) charts.m.destroy();
    charts.m = new Chart($('c-main'), {type:'doughnut', data:{datasets:[{data:[exp,sal,inc||1], backgroundColor:['#FF453A','#FF9F0A','#32D74B'], borderWidth:0}]}, options:{responsive:true, maintainAspectRatio:false, cutout:'85%'} });
    
    const dInM = new Date(calYear, calMonth+1, 0).getDate(), fDay = new Date(calYear, calMonth, 1).getDay();
    let calH = '<div class="cal-grid">' + ['日','一','二','三','四','五','六'].map(w=>`<div class="cal-h">${w}</div>`).join('') + '<div class="cal-c"></div>'.repeat(fDay);
    
    for(let d=1; d<=dInM; d++) {
        const dS = `${mStr}-${String(d).padStart(2,'0')}`;
        const dotStatus = dateDots[dS];
        const dotsHTML = dotStatus ? (dotStatus.i ? `<div class="dot" style="background:var(--green)"></div>` : '') + (dotStatus.e ? `<div class="dot" style="background:var(--red)"></div>` : '') : '';
        calH += `<div class="cal-c"><div class="cal-d ${dS===selD?'active':''} ${dS===toIsoD(new Date())?'today':''}" onclick="selD='${dS}';render();">${d}<div class="dots">${dotsHTML}</div></div></div>`;
    }
    $('cal-grid').innerHTML = calH+'</div>';
    
    const dObj = new Date(selD);
    $('cal-title').textContent = `${dObj.getMonth()+1}月${dObj.getDate()}日 星期${['日','一','二','三','四','五','六'][dObj.getDay()]}`;
    $('cal-list').innerHTML = ldg.map((r,ix)=>({...r,oid:ix})).filter(r=>r.date===selD).map(r=>rowTemplate(r,false)).join('') || '<div class="empty">本日無紀錄</div>';
}

function showDet(i) {
    const e = emp[i]; $('det-n').textContent = e.name;
    const curMonthLdg = ldg.map((r,ix)=>({...r,oid:ix})).filter(r=>r.date.startsWith(`${calYear}-${String(calMonth+1).padStart(2,'0')}`) && r.mem === e.name);

    $('det-list').innerHTML = curMonthLdg.map(r=>rowTemplate(r, false)).join('') || '<div class="empty">本月無相關支薪</div>';

    $('det-e-btn').onclick = () => {
      closeMById('m-det'); $('m-emp-title').textContent = "編輯人員";
      $('e-id').value=i; $('e-n').value=e.name; $('e-s').value=e.salary; $('e-b').value=e.bonus;
      $('btn-del-emp').style.display='block'; openM('m-emp');
    }; 
    
    // 💡 修正 3：先開啟彈窗 (讓 Canvas 有尺寸)，延遲 50 微秒後再繪製圖表，避免圖表變為 0x0
    openM('m-det');
    setTimeout(() => {
        if(charts.e) charts.e.destroy();
        charts.e = new Chart($('c-emp'), {type:'doughnut', data:{datasets:[{data:[e.salary, e.bonus], backgroundColor:['#5E5CE6','#FF9F0A'], borderWidth:0}]}, options:{responsive:true, maintainAspectRatio:false, cutout:'80%'} });
    }, 50);
}

window.onload = () => { render(); updateMem(); loadCloud(); };
</script>
</body>
</html>
