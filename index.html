<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Yun Yi Finance v3.8.2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* ── iOS 標準色彩系統 ── */
:root { --bg:#000000; --bg-elevated:#1C1C1E; --card:#1C1C1E; --bg-modal:rgba(44,44,46,0.94); --input-bg:#3A3A3C; --accent:#5E5CE6; --green:#32D74B; --red:#FF453A; --amber:#FF9F0A; --text:#FFFFFF; --muted:#8E8E93; --border:rgba(255,255,255,0.12); --radius-card:14px; --radius-btn:12px; }
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; outline:none; }
body { font-family:-apple-system,BlinkMacSystemFont,"SF Pro NT","Noto Sans TC",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; max-width:430px; margin:0 auto; overflow-x:hidden; -webkit-font-smoothing:antialiased; }

/* ── 啟動畫面 ── */
#splash-screen { position: fixed; inset: 0; background:#000; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.6s; }
.splash-logo { width: 90px; animation: splashAnim 1.8s forwards; }
@keyframes splashAnim { 0% { opacity: 0; transform: scale(0.96); } 30%, 85% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(1.02); } }

/* ── Header ── */
.header { padding:56px 20px 10px; display:flex; justify-content:space-between; align-items:center; }
.menu-trigger { padding:10px; margin-left:-10px; cursor:pointer; }
#sync-status { font-size:11px; padding:6px 12px; border-radius:20px; background:var(--input-bg); font-weight:600; cursor:pointer; min-width: 80px; text-align: center; }
.sync-ok { color:var(--green); background:rgba(50,215,75,0.1); }
.sync-err { color:var(--red); background:rgba(255,69,58,0.1); }
.syncing { color:var(--amber); }

/* ── 側邊選單 Drawer ── */
.drawer-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:4000; opacity:0; transition:0.3s; }
.drawer { position:fixed; top:0; left:-280px; width:280px; height:100%; background:var(--bg-elevated); z-index:4001; transition:0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 60px 20px; }
.drawer.open { left:0; }
.drawer-item { display:flex; align-items:center; gap:15px; padding:15px 0; border-bottom:0.5px solid var(--border); color:var(--text); font-size:17px; cursor:pointer; }
.drawer-item svg { width:22px; height:22px; stroke:var(--accent); fill:none; stroke-width:2; }

/* ── 通用 UI ── */
.global-nav { display: none; justify-content:center; align-items:center; gap:10px; padding: 10px 16px 15px; }
body.nav-active .global-nav { display: flex; }
.m-btn { background:none; border:none; color:var(--accent); font-size:24px; cursor:pointer; width: 40px; }
.m-picker-wrapper { position:relative; background:var(--bg-elevated); padding:8px 18px; border-radius:12px; min-width: 140px; text-align: center; }
#hdr-m { font-weight:600; color:var(--accent); font-size: 17px; }
#m-input { position:absolute; inset:0; opacity:0; width:100%; cursor:pointer; }

.screen { display:none; min-height:100vh; padding-bottom:140px; }
.screen.active { display:block; }
.card { background:var(--card); border-radius:var(--radius-card); padding:18px; margin:0 16px 12px; }

/* ── 圖表與日曆 ── */
.chart-box { position:relative; height:200px; width:100%; display:flex; justify-content:center; align-items:center; margin:10px 0; }
.chart-center { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center; pointer-events:none; }
.chart-val { font-size:24px; font-weight:800; }
.cal-grid { display:flex; flex-wrap:wrap; width:100%; padding: 5px 0; }
.cal-h, .cal-c { width: 14.285%; text-align:center; }
.cal-h { font-size:12px; color:var(--muted); padding-bottom:12px; font-weight:700; }
.cal-c { height:52px; display:flex; justify-content:center; align-items:center; }
.cal-d { width:38px; height:38px; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:50%; font-size:17px; position:relative; }
.cal-d.active { background:var(--accent); color:#fff; font-weight:600; }
.dots { display:flex; gap:2.5px; position:absolute; bottom:4px; }
.dot { width:4px; height:4px; border-radius:50%; }

/* ── 個人頁面 ── */
.profile-header { padding:20px 20px 10px; }
.profile-main { display:flex; align-items:center; gap:20px; margin-bottom:18px; }
.avatar-wrap { position:relative; width:82px; height:82px; border-radius:50%; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); padding:3px; cursor:pointer; flex-shrink:0; }
.avatar { width:100%; height:100%; border-radius:50%; background:#111; border:2px solid #000; display:flex; justify-content:center; align-items:center; font-weight:700; font-size:22px; }
.stats { display:flex; flex:1; justify-content:space-between; text-align:center; }
.stat-val { font-size:16px; font-weight:700; display:block; }
.stat-lab { font-size:12px; color:var(--muted); display:block; }
.profile-bio { margin-bottom:20px; padding:0 4px; }
.bio-name { font-weight:700; font-size:16px; margin-bottom:4px; }
.bio-text { font-size:14px; line-height:1.4; white-space: pre-wrap; color: var(--muted); }

/* ── Apple Action Sheet ── */
.action-sheet-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:3000; align-items:flex-end; opacity:0; transition:0.3s; padding:10px; }
.action-sheet-overlay.open { display:flex; opacity:1; }
.action-sheet { width:100%; max-width:410px; margin:0 auto; transform:translateY(100%); transition:0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.action-sheet-overlay.open .action-sheet { transform:translateY(0); }
.as-group { background:var(--bg-modal); backdrop-filter:blur(25px); -webkit-backdrop-filter:blur(25px); border-radius:14px; overflow:hidden; margin-bottom:10px; }
.as-item { padding:18px; text-align:center; font-size:18px; color:#0A84FF; border-bottom: 0.5px solid rgba(255,255,255,0.1); cursor:pointer; }
.as-item.add-btn { font-weight: 600; color: var(--green); }
.as-cancel { background: #FFFFFF; color: #000; font-weight: 600; border-radius: 14px; padding: 18px; text-align: center; font-size: 18px; cursor: pointer; margin-bottom: calc(env(safe-area-inset-bottom) + 5px); }

/* ── 底部導覽 ── */
.bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:rgba(10,10,10,0.92); border-top:0.5px solid var(--border); display:flex; z-index:100; padding:8px 0 calc(env(safe-area-inset-bottom) + 8px); backdrop-filter:blur(20px); }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; color:var(--muted); }
.nav-item.active { color:var(--accent); }
.nav-icon-svg { width:24px; height:24px; stroke:currentColor; stroke-width:2; fill:none; }
.fab { width:56px; height:56px; background:var(--accent); border-radius:50%; display:flex; justify-content:center; align-items:center; border:4px solid #000; margin-top:-32px; box-shadow:0 4px 15px rgba(94,92,230,0.3); }

/* ── 彈窗 Modal ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:5000; align-items:flex-end; opacity:0; transition:0.3s; }
.modal-overlay.open { display:flex; opacity:1; }
.modal { background:var(--bg-elevated); border-radius:20px 20px 0 0; padding:20px 20px calc(20px + env(safe-area-inset-bottom)); width:100%; max-height:90vh; overflow-y:auto; transform:translateY(100%); transition:0.3s; }
.modal-overlay.open .modal { transform:translateY(0); }
.modal-h { width:36px; height:5px; background:var(--muted); border-radius:3px; margin:0 auto 20px; opacity:0.5; }
.field { margin-bottom:18px; }
.field label { font-size:12px; color:var(--muted); display:block; margin-bottom:6px; margin-left:4px; text-transform:uppercase; }
.field input, .field select { width:100%; height:48px; padding:0 16px; background:var(--input-bg); border:none; border-radius:10px; color:#fff; font-size:16px; -webkit-appearance:none; }

.t-toggle { display:flex; background:rgba(118,118,128,0.24); border-radius:9px; padding:2px; margin-bottom:25px; height: 38px; }
.t-btn { flex:1; border:none; background:transparent; color:#fff; font-size:14px; font-weight:600; border-radius:7px; cursor:pointer; }
.t-btn.active.exp { background: var(--red); }
.t-btn.active.inc { background: var(--green); }
</style>
</head>
<body class="nav-active">

<div id="splash-screen"><img src="蘊一記帳小卡.png" class="splash-logo"></div>

<div class="drawer-overlay" id="d-overlay" onclick="toggleDrawer(false)"></div>
<div class="drawer" id="drawer">
  <div class="drawer-item" onclick="go('ldg'); toggleDrawer(false);"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg><span>帳目明細</span></div>
  <div class="drawer-item" onclick="go('pay'); toggleDrawer(false);"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/></svg><span>人員管理</span></div>
</div>

<div class="header">
  <div class="menu-trigger" onclick="toggleDrawer(true)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></div>
  <div id="sync-status" onclick="loadCloud()">讀取雲端</div>
</div>

<div class="global-nav">
  <button onclick="shiftMonth(-1)" class="m-btn">‹</button>
  <div class="m-picker-wrapper"><span id="hdr-m"></span><input type="month" id="m-input" onchange="pickMonth(this.value)"></div>
  <button onclick="shiftMonth(1)" class="m-btn">›</button>
</div>

<div id="s-home" class="screen active"><div class="card"><div class="chart-box"><canvas id="c-main"></canvas><div class="chart-center"><div class="chart-val" id="val-p">$0</div></div></div></div></div>
<div id="s-cal" class="screen"><div class="card"><div id="cal-grid"></div></div><div class="card"><div id="cal-title" style="color:var(--text); font-size:17px; margin-bottom:10px;"></div><div id="cal-list"></div></div></div>
<div id="s-search" class="screen"><div class="card"><input type="text" placeholder="搜尋項目、成員或備註..." oninput="handleSearch(this.value)" style="width:100%; background:var(--input-bg); border:none; padding:12px; border-radius:10px; color:#fff;"></div><div class="card"><div id="search-list"></div></div></div>
<div id="s-me" class="screen">
  <div class="profile-header">
    <div class="profile-main">
      <div class="avatar-wrap" onclick="openProfilePicker()"><div class="avatar" id="me-avatar-txt">蘊</div></div>
      <div class="stats">
        <div class="stat-item"><span class="stat-val" id="stat-count">0</span><span class="stat-lab">筆數</span></div>
        <div class="stat-item"><span class="stat-val" id="stat-inc">0</span><span class="stat-lab">收入</span></div>
        <div class="stat-item"><span class="stat-val" id="stat-exp">0</span><span class="stat-lab">支出</span></div>
      </div>
    </div>
    <div class="profile-bio"><div class="bio-name" id="me-name">蘊一創意</div><div class="bio-text" id="me-desc"></div></div>
  </div>
</div>
<div id="s-ldg" class="screen"><div class="card" id="ldg-list"></div></div>
<div id="s-pay" class="screen"><div class="card" id="emp-list"></div></div>

<nav class="bottom-nav">
  <div class="nav-item active" onclick="go('home',this)"><svg class="nav-icon-svg"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div>
  <div class="nav-item" onclick="go('cal',this)"><svg class="nav-icon-svg"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
  <div class="nav-item" onclick="prepLdg()"><div class="fab"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div></div>
  <div class="nav-item" onclick="go('search',this)"><svg class="nav-icon-svg"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
  <div class="nav-item" onclick="resetAndGoMe(this)"><svg class="nav-icon-svg"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
</nav>

<div class="modal-overlay" id="m-ldg" onclick="closeM(event,'m-ldg')">
  <div class="modal">
    <div class="modal-h"></div>
    <div class="modal-actions" style="display:flex; justify-content:space-between; margin-bottom:20px;"><button onclick="closeMById('m-ldg')" style="background:none; border:none; color:var(--accent); font-size:17px;">取消</button><b style="font-size:17px;">記一筆</b><button onclick="$('ldg-form').requestSubmit()" style="background:none; border:none; color:var(--accent); font-size:17px; font-weight:700;">儲存</button></div>
    <form id="ldg-form" onsubmit="event.preventDefault(); saveLdg();">
      <input type="hidden" id="l-t" value="expense">
      <div class="field"><label>日期</label><input type="date" id="l-d" required></div>
      <div class="t-toggle"><button type="button" class="t-btn" id="tb-exp" onclick="setT('expense')">支出</button><button type="button" class="t-btn" id="tb-inc" onclick="setT('income')">收入</button></div>
      <div class="field"><label>金額</label><input type="number" id="l-a" placeholder="$0" required inputmode="numeric"></div>
      <div class="field"><label>項目內容</label><input type="text" id="l-c" placeholder="例如：租金" required></div>
      <div class="field"><label>歸屬成員</label><select id="l-m"></select></div>
      <div class="field"><label>發票號碼</label><input type="text" id="l-inv" placeholder="AB-12345678"></div>
      <div class="field"><label>憑證類型</label><select id="l-vt"><option value="電子發票">電子發票</option><option value="三聯單">三聯單</option><option value="免用統一發票">免用統一發票</option><option value="無憑證">無憑證</option></select></div>
      <div class="field"><label>備註</label><input type="text" id="l-n" placeholder="補充說明..."></div>
    </form>
  </div>
</div>

<div class="modal-overlay" id="m-add-emp" onclick="closeM(event,'m-add-emp')">
  <div class="modal">
    <div class="modal-h"></div>
    <div class="modal-actions" style="display:flex; justify-content:space-between; margin-bottom:20px;"><button onclick="closeMById('m-add-emp')" style="background:none; border:none; color:var(--accent); font-size:17px;">取消</button><b style="font-size:17px;">新增人員</b><button onclick="saveEmp()" style="background:none; border:none; color:var(--accent); font-size:17px; font-weight:700;">完成</button></div>
    <div class="field"><label>人員名稱</label><input type="text" id="new-e-name" placeholder="請輸入姓名"></div>
    <div class="field"><label>月薪預算 (選填)</label><input type="number" id="new-e-salary" placeholder="$0" inputmode="numeric"></div>
  </div>
</div>

<div class="action-sheet-overlay" id="as-picker" onclick="closeAS(event)">
  <div class="action-sheet">
    <div class="as-group" id="as-list"></div>
    <div class="as-group"><div class="as-item add-btn" onclick="openAddEmpModal()">➕ 新增人員</div></div>
    <div class="as-cancel" onclick="closeASById()">取消</div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id), $$ = s => document.querySelectorAll(s);
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzsCdf4E4p52LOIvRM7n_UMoAcMz05kTAM4zKf72KIzFPzcTi5ShA1xMAOlDoghhKR-/exec';
let emp = JSON.parse(localStorage.getItem('ye') || '[]'), ldg = JSON.parse(localStorage.getItem('yl') || '[]');
let charts = {}, calYear = new Date().getFullYear(), calMonth = new Date().getMonth(), selD = new Date().toISOString().split('T')[0], currentMe = "蘊一創意";

const fmtK = n => n >= 1000 ? (n / 1000).toFixed(1) + 'k' : n;
const setSync = (txt, cls) => { const s = $('sync-status'); s.textContent = txt; s.className = cls; };
const toggleDrawer = (open) => { const d = $('drawer'), o = $('d-overlay'); if(open){ o.style.display='block'; setTimeout(()=>{o.style.opacity='1'; d.classList.add('open');},10); } else { d.classList.remove('open'); o.style.opacity='0'; setTimeout(()=>o.style.display='none',300); } };

async function loadCloud() {
    setSync('讀取中...', 'syncing');
    const cb = '_cb_' + Date.now();
    const s = document.createElement('script');
    let timeout = setTimeout(() => { setSync('⚠️ 連線超時', 'sync-err'); delete window[cb]; s.remove(); }, 7000);
    window[cb] = (d) => {
        clearTimeout(timeout);
        if (d) { 
            emp = d.emp || []; ldg = d.ldg || [];
            localStorage.setItem('ye', JSON.stringify(emp)); localStorage.setItem('yl', JSON.stringify(ldg));
            render(); setSync('✅ 雲端同步', 'sync-ok');
        }
        s.remove(); delete window[cb];
    };
    s.src = `${GAS_URL}?callback=${cb}`;
    document.head.appendChild(s);
}

const go = (p, el) => { $$('.screen, .nav-item').forEach(e => e.classList.remove('active')); $(`s-${p}`).classList.add('active'); if(el) el.classList.add('active'); document.body.classList.toggle('nav-active', p==='home' || p==='cal'); if(p==='me') updateMeUI(); render(); };
const resetAndGoMe = (el) => { currentMe = "蘊一創意"; go('me', el); };
const shiftMonth = (d) => { const dt = new Date(calYear, calMonth+d, 1); calYear=dt.getFullYear(); calMonth=dt.getMonth(); render(); };
const pickMonth = (v) => { if(!v) return; const [y, m] = v.split('-'); calYear=parseInt(y); calMonth=parseInt(m)-1; render(); };

function updateMeUI() {
    const isDefault = currentMe === "蘊一創意";
    let fLdg = isDefault ? ldg : ldg.filter(r => r.mem === currentMe);
    let inc = fLdg.filter(r => r.type === 'income').reduce((a, b) => a + b.amt, 0);
    let exp = fLdg.filter(r => r.type === 'expense').reduce((a, b) => a + b.amt, 0);
    $('stat-count').textContent = fLdg.length; $('stat-inc').textContent = fmtK(inc); $('stat-exp').textContent = fmtK(exp);
    if(isDefault) { $('me-avatar-txt').textContent = "蘊"; $('me-name').textContent = "蘊一創意"; $('me-desc').innerHTML = ""; } 
    else { $('me-avatar-txt').textContent = currentMe.charAt(0); $('me-name').textContent = currentMe; const e = emp.find(x=>x.name===currentMe); $('me-desc').innerHTML = e ? `團隊成員\n預算：$${e.salary.toLocaleString()}` : ""; }
}

function render() {
    const mStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}`;
    $('hdr-m').textContent = `${calYear}年 ${calMonth+1}月`;
    let inc=0, exp=0, dots={};
    ldg.filter(r => r.date.startsWith(mStr)).forEach(r => { if(r.type==='income') inc+=r.amt; else exp+=r.amt; dots[r.date]=true; });
    $('val-p').textContent = `$${(inc-exp).toLocaleString()}`;
    if(charts.m) charts.m.destroy();
    charts.m = new Chart($('c-main'), { type:'doughnut', data:{ datasets:[{ data:[exp, inc||1], backgroundColor:['#FF453A','#32D74B'], borderWidth:0 }] }, options:{ cutout:'85%', responsive:true, maintainAspectRatio:false } });

    const dInM = new Date(calYear, calMonth+1, 0).getDate(), fDay = new Date(calYear, calMonth, 1).getDay();
    let calH = '<div class="cal-grid">' + ['日','一','二','三','四','五','六'].map(w=>`<div class="cal-h">${w}</div>`).join('') + '<div class="cal-c"></div>'.repeat(fDay);
    for(let d=1; d<=dInM; d++){
        const dS = `${mStr}-${String(d).padStart(2,'0')}`;
        calH += `<div class="cal-c"><div class="cal-d ${dS===selD?'active':''}" onclick="selD='${dS}';render();">${d}${dots[dS]?'<div class="dots"><div class="dot" style="background:var(--accent)"></div></div>':''}</div></div>`;
    }
    $('cal-grid').innerHTML = calH + '</div>';
    $('cal-title').textContent = selD;
    $('cal-list').innerHTML = ldg.filter(r => r.date === selD).map(r => `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:0.5px solid var(--border);"><div>${r.cat} <small style="color:var(--muted)">${r.mem}</small></div><b>$${r.amt.toLocaleString()}</b></div>`).join('') || '<div style="padding:20px; text-align:center; color:var(--muted);">本日無紀錄</div>';
    $('ldg-list').innerHTML = ldg.map(r => `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:0.5px solid var(--border);"><div>${r.cat}<br><small style="color:var(--muted)">${r.date} · ${r.mem}</small></div><b>$${r.amt.toLocaleString()}</b></div>`).join('');
    $('emp-list').innerHTML = emp.map(e => `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:0.5px solid var(--border);"><div>${e.name}</div><small>$${e.salary.toLocaleString()}</small></div>`).join('');
}

const openProfilePicker = () => { $('as-list').innerHTML = `<div class="as-item" onclick="selectMe('蘊一創意')">蘊一創意 (總覽)</div>` + emp.map(e => `<div class="as-item" onclick="selectMe('${e.name}')">${e.name}</div>`).join(''); $('as-picker').classList.add('open'); };
const openAddEmpModal = () => { closeASById(); $('m-add-emp').classList.add('open'); };
const saveEmp = () => {
    const name = $('new-e-name').value.trim();
    if(!name) return alert('請輸入名稱');
    emp.push({ name, salary: Number($('new-e-salary').value) || 0 });
    localStorage.setItem('ye', JSON.stringify(emp));
    $('new-e-name').value = ''; $('new-e-salary').value = '';
    closeMById('m-add-emp'); sync(); render();
};
const selectMe = (n) => { currentMe = n; updateMeUI(); closeASById(); };
const closeASById = () => { $('as-picker').classList.remove('open'); };
const closeAS = (e) => { if(e.target === $('as-picker')) closeASById(); };

const prepLdg = () => { 
    $('ldg-form').reset(); setT('expense'); $('l-d').value = selD; 
    $('l-m').innerHTML = '<option value="公司">公司帳戶</option>' + emp.map(e => `<option value="${e.name}">${e.name}</option>`).join(''); 
    $('m-ldg').classList.add('open'); 
};

function setT(t) {
    $('l-t').value = t;
    const btnExp = $('tb-exp'), btnInc = $('tb-inc');
    btnExp.classList.toggle('active', t === 'expense'); btnExp.classList.toggle('exp', t === 'expense');
    btnInc.classList.toggle('active', t === 'income'); btnInc.classList.toggle('inc', t === 'income');
}

const closeMById = id => $(id).classList.remove('open');
const closeM = (e, id) => { if(e.target === $(id)) $(id).classList.remove('open'); };

async function sync() { try { await fetch(GAS_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({emp, ldg})}); } catch(e) {} }
function saveLdg() { 
  ldg.unshift({ date: $('l-d').value, type: $('l-t').value, amt: Number($('l-a').value), cat: $('l-c').value, mem: $('l-m').value, inv: $('l-inv').value, vt: $('l-vt').value, note: $('l-n').value }); 
  localStorage.setItem('yl', JSON.stringify(ldg)); 
  closeMById('m-ldg'); sync(); render(); 
}

function handleSearch(v) { 
  if(!v){ $('search-list').innerHTML=''; return; } 
  $('search-list').innerHTML = ldg.filter(r => r.cat.includes(v) || r.mem.includes(v)).map(r => `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:0.5px solid var(--border);"><div>${r.cat}<br><small>${r.date}</small></div><b>$${r.amt.toLocaleString()}</b></div>`).join(''); 
}

window.onload = () => { loadCloud(); render(); setTimeout(() => { $('splash-screen').style.opacity='0'; setTimeout(()=>$('splash-screen').style.display='none', 600); }, 1500); };
</script>
</body>
</html>
